name: DPRO ESTATE NEXT-6 iPad Staff UX

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/estate-next-6.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: dpro-estate-next-6
  cancel-in-progress: false

jobs:
  estate-next-6:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: main
      WORKFLOW_PATH: .github/workflows/estate-next-6.yml
      STEP_BACKUP_TAG: dpro-estate-next-6-before-20260724
      EXPECTED_IPAD_BLOB: a638fec4a10425e8c9de46e0db3498bd805ea127
      EXPECTED_CONFIG_BLOB: a31c8cfcb6a2c701b395b18e23721cd0a4fea809
      EXPECTED_EXTENSION_BLOB: 18a595db1a070bccc3e722fed7d6c23b889b374c

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Verify previous STEP and resolve baseline
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          test -f dpro-next/estate-progress.yml
          grep -q '^current_step: ESTATE-NEXT-5-COMPLETE$' dpro-next/estate-progress.yml
          grep -q '^next_step: ESTATE-NEXT-6$' dpro-next/estate-progress.yml
          BASE_COMMIT="$(git rev-parse HEAD)"
          changed="$(git diff-tree --no-commit-id --name-only -r HEAD | sed '/^$/d' || true)"
          if [ -n "$changed" ] && [ "$(printf '%s\n' "$changed" | wc -l | tr -d ' ')" = "1" ] && [ "$changed" = "$WORKFLOW_PATH" ]; then
            BASE_COMMIT="$(git rev-parse HEAD^)"
          fi
          echo "BASE_COMMIT=$BASE_COMMIT" >> "$GITHUB_ENV"
          test "$(git rev-parse "$BASE_COMMIT:owner-ipad.html")" = "$EXPECTED_IPAD_BLOB"
          test "$(git rev-parse "$BASE_COMMIT:config.js")" = "$EXPECTED_CONFIG_BLOB"
          test "$(git rev-parse "$BASE_COMMIT:extension.js")" = "$EXPECTED_EXTENSION_BLOB"

      - name: Create or verify STEP backup tag
        shell: bash
        run: |
          set -Eeuo pipefail
          if git rev-parse "$STEP_BACKUP_TAG" >/dev/null 2>&1; then
            test "$(git rev-list -n 1 "$STEP_BACKUP_TAG")" = "$BASE_COMMIT"
          else
            git tag -a "$STEP_BACKUP_TAG" "$BASE_COMMIT" -m "DPRO ESTATE NEXT-6 before iPad staff UX"
            git push origin "$STEP_BACKUP_TAG"
          fi

      - name: Install NEXT-6 iPad staff screen
        shell: bash
        env:
          OWNER_IPAD_B64: 
          CONFIG_B64: 
        run: |
          set -Eeuo pipefail
          printf '%s' "$OWNER_IPAD_B64" | base64 --decode > owner-ipad.html
          printf '%s' "$CONFIG_B64" | base64 --decode > config.js

      - name: Validate HTML JavaScript and operational UX
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY_CHECK'
          from html.parser import HTMLParser
          from pathlib import Path
          import re, sys
          text=Path('owner-ipad.html').read_text(encoding='utf-8')
          class P(HTMLParser):
              pass
          P().feed(text)
          ids=re.findall(r'\bid=["\']([^"\']+)["\']',text)
          dup=sorted({x for x in ids if ids.count(x)>1})
          if dup: raise SystemExit(f'duplicate html ids: {{dup}}')
          required=[
            '現場スタッフ用','今日・明日の内見','本日対応の追客','申込・書類案件','空室確認',
            '個別LINE文面','この端末から削除','application_intent','required_documents',
            'initial_cost_status','operation_id','runBusy','loadCases','openCaseForReservation',
            'recordVacancyCheck','自動送信はしません'
          ]
          missing=[item for item in required if item not in text]
          if missing: raise SystemExit(f'missing features: {{missing}}')
          forbidden=['STEP ESTATE-12','管理コード 1234','apiBaseInput','demoBtn','system-check?admin_code=','画面URL','Cloudflare Worker API']
          found=[item for item in forbidden if item in text]
          if found: raise SystemExit(f'forbidden internal/daily elements: {{found}}')
          if 'admin_code' in re.sub(r'JSON\.stringify\([^)]*\)','',text) and 'searchParams.set(\'admin_code\'' in text:
              raise SystemExit('admin code must not be put in URL query')
          print('HTML and staff UX checks PASS')
          PY_CHECK
          python3 - <<'PY_JS'
          from pathlib import Path
          import re
          text=Path('owner-ipad.html').read_text(encoding='utf-8')
          blocks=re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>',text,re.S|re.I)
          Path('/tmp/owner-ipad-inline.js').write_text('\n'.join(blocks),encoding='utf-8')
          PY_JS
          node --check /tmp/owner-ipad-inline.js
          node --check config.js
          test "$(grep -c 'data-panel=' owner-ipad.html)" -ge 10
          test "$(wc -c < owner-ipad.html)" -lt 160000

      - name: Verify existing features and unchanged system files
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD:owner.html)" = "$(git rev-parse "$BASE_COMMIT:owner.html")"
          test "$(git rev-parse HEAD:extension.js)" = "$EXPECTED_EXTENSION_BLOB"
          test "$(git rev-parse HEAD:domain.js)" = "$(git rev-parse "$BASE_COMMIT:domain.js")"
          test "$(git rev-parse HEAD:index.html)" = "$(git rev-parse "$BASE_COMMIT:index.html")"
          grep -q '確認済み' owner-ipad.html
          grep -q '内見済み' owner-ipad.html
          grep -q '申込検討' owner-ipad.html
          grep -q '3日後追客' owner-ipad.html
          grep -q '対応済み' owner-ipad.html
          grep -q '延期' owner-ipad.html
          grep -q '空室確認履歴' owner-ipad.html
          grep -q '必要書類' owner-ipad.html
          grep -q '初期費用' owner-ipad.html
          grep -q 'LINE文面' owner-ipad.html
          echo 'Existing feature preservation PASS'

      - name: Test local HTTP delivery
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -m http.server 8765 >/tmp/estate-next6-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          sleep 1
          curl --fail --silent http://127.0.0.1:8765/owner-ipad.html -o /tmp/owner-ipad-live.html
          grep -q '現場スタッフ用' /tmp/owner-ipad-live.html
          grep -q 'extension.js?v=estate-next-6' /tmp/owner-ipad-live.html

      - name: Record ESTATE-NEXT-6 completion
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p dpro-next
          cat > dpro-next/estate-progress.yml <<'EOF_PROGRESS'
          system: DPRO 不動産・賃貸内見 LINE
          repository: dpromstk2000-lab/dpro-estate-line-liff
          previous_step: ESTATE-NEXT-5-COMPLETE
          current_step: ESTATE-NEXT-6-COMPLETE
          next_step: ESTATE-NEXT-7
          baseline_tag: dpro-estate-next-baseline-20260723
          step_backup_tag: dpro-estate-next-6-before-20260724
          completed_at_jst: "__COMPLETED_AT__"
          modified_files:
            - owner-ipad.html
            - config.js
          ipad_staff_today_first: true
          ipad_bottom_navigation: true
          ipad_lazy_case_loading: true
          ipad_reservation_quick_actions: true
          ipad_followup_quick_actions: true
          ipad_case_quick_update: true
          ipad_required_documents_update: true
          ipad_vacancy_history_update: true
          ipad_individual_line_copy: true
          admin_code_local_delete: true
          demo_prepare_removed_from_daily_screen: true
          internal_urls_removed: true
          admin_code_query_removed: true
          duplicate_operation_guard_used: true
          worker_changed: false
          supabase_changed: false
          api_changed: false
          existing_features_preserved: true
          html_syntax_check: PASS
          javascript_syntax_check: PASS
          html_id_duplicate_check: PASS
          local_http_check: PASS
          EOF_PROGRESS
          completed_at="$(TZ=Asia/Tokyo date --iso-8601=seconds)"
          sed -i "s|__COMPLETED_AT__|$completed_at|" dpro-next/estate-progress.yml
          cat >> dpro-next/estate-feature-ledger.yml <<'EOF_LEDGER'

          estate_next_6:
            status: COMPLETE
            target: owner-ipad.html
            features:
              - 今日・明日の内見を最優先表示
              - 予約ステータスの現場クイック更新
              - 追客の対応済み・延期
              - 申込意思・必要書類・次回期限の案件クイック更新
              - 空室確認履歴の記録
              - 個別LINE文面コピー
              - 管理コードの端末削除
            performance:
              - 初期表示はdashboardとtemplatesのみ
              - 案件・顧客・物件は案件タブを開いた時だけ取得
            excluded:
              - 営業前demo_prepare
              - API入力欄
              - 管理コード入りURL
              - 内部STEP・Worker情報
            worker_changed: false
            supabase_changed: false
            api_changed: false
          EOF_LEDGER
          cat >> dpro-next/estate-risk-report.txt <<'EOF_RISK'

          [ESTATE-NEXT-6 COMPLETE]
          owner-ipad.htmlを現場スタッフの日常操作へ限定しました。
          管理コードをURLへ含めず、デモ準備・API入力・内部URL一覧を日常画面から除外しました。
          案件更新と空室確認にはNEXT-5のoperation_idを使用し、連続操作を防止します。
          Worker・Supabase・APIの変更はありません。
          EOF_RISK
          grep -q '^current_step: ESTATE-NEXT-6-COMPLETE$' dpro-next/estate-progress.yml
          grep -q '^next_step: ESTATE-NEXT-7$' dpro-next/estate-progress.yml

      - name: Confirm allowed change scope
        shell: bash
        run: |
          set -Eeuo pipefail
          allowed='^(owner-ipad\.html|config\.js|dpro-next/estate-progress\.yml|dpro-next/estate-feature-ledger\.yml|dpro-next/estate-risk-report\.txt|\.github/workflows/estate-next-6\.yml)$'
          unexpected="$(git diff --name-only "$BASE_COMMIT" | grep -Ev "$allowed" || true)"
          if [ -n "$unexpected" ]; then
            echo 'Unexpected changed files:' >&2
            printf '%s\n' "$unexpected" >&2
            exit 1
          fi

      - name: Delete workflow and commit completion
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$WORKFLOW_PATH"
          git add -A
          git diff --cached --quiet && { echo 'No changes to commit' >&2; exit 1; }
          git commit -m "ESTATE-NEXT-6 COMPLETE: optimize iPad staff workflow"
          git push origin "HEAD:$TARGET_BRANCH"

      - name: Publish STEP summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF_SUMMARY'
          # ESTATE-NEXT-6 COMPLETE

          | 項目 | 結果 |
          |---|---|
          | 今日・明日の内見優先 | PASS |
          | 予約・追客クイック操作 | PASS |
          | 案件・必要書類更新 | PASS |
          | 空室確認履歴 | PASS |
          | 個別LINE文面 | PASS |
          | 管理コードURL非表示 | PASS |
          | デモ操作の分離 | PASS |
          | Worker / Supabase変更 | なし |
          | 次STEP | ESTATE-NEXT-7 |

          実行YML自身を削除し、完成台帳を保存しました。
          EOF_SUMMARY
