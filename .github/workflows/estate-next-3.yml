      - name: Inspect live API contract without storing customer values
        shell: bash
        env:
          API_BASE: https://dpro-estate-line-api.dpromstk2000.workers.dev
          SHOP_CODE: dpro_estate_demo
          ADMIN_CODE: ${{ env.DPRO_DEMO_ADMIN_CODE }}
        run: |
          set -Eeuo pipefail
          mkdir -p dpro-next

          python3 <<'PY_API_AUDIT'
          from __future__ import annotations

          import json
          import os
          import re
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime, timedelta
          from pathlib import Path
          from zoneinfo import ZoneInfo

          api_base = os.environ['API_BASE'].rstrip('/')
          shop_code = os.environ['SHOP_CODE']
          admin_code = os.environ['ADMIN_CODE']
          jst = ZoneInfo('Asia/Tokyo')
          today = datetime.now(jst).date()

          endpoints = {
              'health': ('GET', '/api/health', {}),
              'login': ('POST', '/api/admin/login', {}),
              'system_check': ('GET', '/api/admin/system-check', {}),
              'settings': ('GET', '/api/admin/settings', {}),
              'dashboard': ('GET', '/api/admin/dashboard', {}),
              'reservations': ('GET', '/api/admin/reservations', {'from': today.isoformat(), 'to': (today + timedelta(days=30)).isoformat(), 'limit': '5'}),
              'customers': ('GET', '/api/admin/customers', {'limit': '5'}),
              'properties': ('GET', '/api/admin/properties', {'include_private': 'true', 'limit': '5'}),
              'followups': ('GET', '/api/admin/followups', {'limit': '5'}),
          }

          def describe(value, depth=0):
              if depth >= 5:
                  return {'type': type(value).__name__}
              if isinstance(value, dict):
                  return {
                      'type': 'object',
                      'keys': sorted(value.keys()),
                      'fields': {key: describe(value[key], depth + 1) for key in sorted(value.keys())},
                  }
              if isinstance(value, list):
                  return {
                      'type': 'array',
                      'count': len(value),
                      'item': describe(value[0], depth + 1) if value else None,
                  }
              if value is None:
                  return {'type': 'null'}
              if isinstance(value, bool):
                  return {'type': 'boolean'}
              if isinstance(value, (int, float)):
                  return {'type': 'number'}
              return {'type': 'string'}

          def collect_keys(value, result):
              if isinstance(value, dict):
                  for key, item in value.items():
                      result.add(str(key))
                      collect_keys(item, result)
              elif isinstance(value, list):
                  for item in value[:3]:
                      collect_keys(item, result)

          results = {}
          all_keys = set()
          success_count = 0

          for name, (method, path, extra_query) in endpoints.items():
              query = {'shop_code': shop_code}
              if name != 'health':
                  query['admin_code'] = admin_code
              query.update(extra_query)
              url = api_base + path
              if method == 'GET':
                  url += '?' + urllib.parse.urlencode(query)
                  body = None
              else:
                  body = json.dumps({'code': admin_code, 'admin_code': admin_code, 'shop_code': shop_code}).encode('utf-8')
              request = urllib.request.Request(
                  url,
                  data=body,
                  method=method,
                  headers={
                      'Content-Type': 'application/json',
                      'X-DPRO-Admin-Code': admin_code,
                      'X-Admin-Code': admin_code,
                      'User-Agent': 'DPRO-ESTATE-NEXT-3-Audit/1.0',
                  },
              )
              try:
                  with urllib.request.urlopen(request, timeout=20) as response:
                      raw = response.read().decode('utf-8', errors='replace')
                      data = json.loads(raw) if raw else {}
                      collect_keys(data, all_keys)
                      results[name] = {
                          'ok': 200 <= response.status < 300 and data.get('ok', True) is not False,
                          'http_status': response.status,
                          'schema': describe(data),
                      }
                      if results[name]['ok']:
                          success_count += 1
              except urllib.error.HTTPError as exc:
                  results[name] = {'ok': False, 'http_status': exc.code, 'error_type': 'HTTPError'}
              except Exception as exc:
                  results[name] = {'ok': False, 'http_status': None, 'error_type': type(exc).__name__}

          # Static endpoint references are useful when the live endpoint is temporarily unavailable.
          static_text = '\n'.join(
              Path(path).read_text(encoding='utf-8', errors='replace')
              for path in ['owner.html', 'owner-settings.html', 'member.html', 'index.html', 'system-check.html']
              if Path(path).exists()
          )
          static_endpoints = sorted(set(re.findall(r"/api/[A-Za-z0-9_?=&{}./:-]+", static_text)))
          static_tokens = set(re.findall(r"[A-Za-z][A-Za-z0-9_]+", static_text))
          evidence_keys = all_keys | static_tokens

          application_tokens = {'applications', 'application_cases', 'application_id', 'application_case_id'}
          persistent_application = bool(application_tokens & evidence_keys)
          capability_tokens = {
              'assigned_staff': {'assigned_staff_id', 'assignee_id', 'case_staff_id'},
              'next_action': {'next_action', 'next_action_date', 'next_action_at', 'due_date'},
              'lost_reason': {'lost_reason', 'close_reason', 'decline_reason'},
              'vacancy_history': {'vacancy_checked_at', 'vacancy_check_history', 'last_vacancy_check_at'},
              'required_documents': {'required_documents', 'document_checklist', 'application_documents'},
          }
          capabilities = {key: bool(tokens & evidence_keys) for key, tokens in capability_tokens.items()}

          inspection_status = 'complete' if success_count >= 7 and results.get('dashboard', {}).get('ok') else 'partial'
          report = {
              'system': 'DPRO 不動産・賃貸内見 LINE',
              'step': 'ESTATE-NEXT-3',
              'generated_at_jst': datetime.now(jst).isoformat(timespec='seconds'),
              'inspection_status': inspection_status,
              'successful_endpoint_count': success_count,
              'endpoint_count': len(endpoints),
              'privacy': 'Only field names, value types, array counts, and HTTP status were stored. Customer values were discarded.',
              'endpoints': results,
              'static_endpoint_references': static_endpoints,
              'detected_field_names': sorted(all_keys),
              'persistent_application_case_detected': persistent_application,
              'detected_capabilities': capabilities,
          }
          Path('dpro-next/estate-current-api-contract.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print(f'API inspection status: {inspection_status} / {success_count} of {len(endpoints)} endpoints successful')
          print('Raw customer/property/reservation values were not saved.')
          PY_API_AUDIT

      - name: Generate domain model and Worker Supabase decision ledger
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 <<'PY_DOMAIN_LEDGER'
          from __future__ import annotations

          import json
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo

          contract = json.loads(Path('dpro-next/estate-current-api-contract.json').read_text(encoding='utf-8'))
          jst_now = datetime.now(ZoneInfo('Asia/Tokyo')).isoformat(timespec='seconds')
          persistent = bool(contract.get('persistent_application_case_detected'))
          capabilities = contract.get('detected_capabilities') or {}
          missing = [name for name, ok in capabilities.items() if not ok]

          domain_model = '''system: DPRO 不動産・賃貸内見 LINE
          step: ESTATE-NEXT-3
          model_version: ESTATE-DOMAIN-1
          units:
            customer:
              label: 顧客
              current_source:
                - /api/admin/customers
                - reservation.customer
              identity:
                - customer.id
                - customer_id
            property:
              label: 物件
              current_source:
                - /api/admin/properties
                - reservation.property
              identity:
                - property.id
                - property_id
            viewing:
              label: 内見予約
              current_source:
                - /api/admin/reservations
              identity:
                - reservation.id
            application_case:
              label: 申込案件
              current_step_behavior: 顧客状態・内見状態から統合表示
              persistence: NEXT-3では追加しない
          pipeline:
            - key: inquiry
              label: 新規問い合わせ
            - key: conditions
              label: 希望条件確認
            - key: proposal
              label: 物件提案
            - key: viewing
              label: 内見調整・予約
            - key: viewed
              label: 内見済み
            - key: application
              label: 申込検討・希望
            - key: contracted
              label: 成約
            - key: closed
              label: 見送り
          preservation:
            reservation_operations: true
            customer_search: true
            property_status_operations: true
            individual_line_copy: true
            demo_prepare: true
          '''.replace('\n          ', '\n').lstrip()
          Path('dpro-next/estate-domain-model.yml').write_text(domain_model, encoding='utf-8')

          next_worker = not persistent or bool(missing)
          next_supabase = not persistent or bool(missing)
          decision_lines = [
              'system: DPRO 不動産・賃貸内見 LINE',
              'step: ESTATE-NEXT-3',
              f'generated_at_jst: "{jst_now}"',
              f'api_inspection_status: {contract.get("inspection_status", "partial")}',
              f'persistent_application_case_detected: {str(persistent).lower()}',
              'worker_changed_this_step: false',
              'supabase_changed_this_step: false',
              'api_changed_this_step: false',
              f'worker_change_required_next_step: {str(next_worker).lower()}',
              f'supabase_change_required_next_step: {str(next_supabase).lower()}',
              'worker_source_in_current_repository: false',
              'next_step_guard: Worker原本または正式なWorker配置先を確認してから変更する',
              'missing_persistent_capabilities:',
          ]
          for item in missing:
              decision_lines.append(f'  - {item}')
          if not missing:
              decision_lines.append('  - none')
          decision_lines.extend([
              'reason:',
              '  - 現在の顧客・予約・物件データで案件進捗の統合表示は可能',
              '  - 担当者・次アクション期限・見送り理由・空室確認履歴・必要書類は永続保存が必要',
              '  - NEXT-3では実データを変更せず、画面統合と契約調査だけを実施',
          ])
          Path('dpro-next/estate-next-3-decision.yml').write_text('\n'.join(decision_lines) + '\n', encoding='utf-8')

          report = {
              'system': 'DPRO 不動産・賃貸内見 LINE',
              'step': 'ESTATE-NEXT-3',
              'generated_at_jst': jst_now,
              'modified_files': ['owner.html', 'config.js', 'domain.js'],
              'domain_units': ['customer', 'property', 'viewing', 'application_case'],
              'derived_pipeline_enabled': True,
              'persistent_application_case_detected': persistent,
              'missing_persistent_capabilities': missing,
              'worker_changed': False,
              'supabase_changed': False,
              'api_changed': False,
              'raw_personal_data_committed': False,
              'next_step': 'ESTATE-NEXT-4',
          }
          Path('dpro-next/estate-next-3-report.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          print('Domain model and change decision ledgers created.')
          PY_DOMAIN_LEDGER

      - name: Validate HTML JavaScript domain logic and existing features
        shell: bash
        run: |
          set -Eeuo pipefail

          node --check config.js
          node --check domain.js

          python3 <<'PY_VALIDATE'
          from collections import Counter
          from html.parser import HTMLParser
          from pathlib import Path
          import json
          import re
          import subprocess
          import tempfile

          class IdCollector(HTMLParser):
              def __init__(self):
                  super().__init__(convert_charrefs=True)
                  self.ids = []
              def handle_starttag(self, tag, attrs):
                  for key, value in attrs:
                      if key.lower() == 'id' and value:
                          self.ids.append(value)

          owner = Path('owner.html').read_text(encoding='utf-8')
          parser = IdCollector()
          parser.feed(owner)
          parser.close()
          duplicates = sorted(item for item, count in Counter(parser.ids).items() if count > 1)
          if duplicates:
              raise SystemExit(f'Duplicate HTML IDs: {duplicates}')

          scripts = re.findall(r'<script\b[^>]*>(.*?)</script\s*>', owner, re.I | re.S)
          checked = 0
          for index, script in enumerate(scripts, 1):
              if not script.strip():
                  continue
              checked += 1
              with tempfile.NamedTemporaryFile('w', suffix='.js', encoding='utf-8', delete=False) as temp:
                  temp.write(script)
                  temp_path = temp.name
              result = subprocess.run(['node', '--check', temp_path], text=True, capture_output=True)
              Path(temp_path).unlink(missing_ok=True)
              if result.returncode:
                  raise SystemExit(f'owner.html inline JS {index} failed: {result.stderr or result.stdout}')

          required_owner = [
              "openPanel('today')", "openPanel('reservations')", "openPanel('customers')",
              "openPanel('properties')", "openPanel('cases')", "openPanel('messages')",
              '/api/admin/dashboard', '/api/admin/reservations', '/api/admin/customers',
              '/api/admin/properties', '/api/admin/followups', '/api/admin/demo/prepare',
              'clearSavedAdminCode', 'selectCustomerForSuggestion', 'updateReservationStatus',
              'updatePropertyStatus', 'completeFollowup', 'domain.js?v=estate-next-3',
              'casePipeline', 'caseList', 'applicationState', 'nextAction',
          ]
          missing_owner = [item for item in required_owner if item not in owner]
          if missing_owner:
              raise SystemExit(f'NEXT-3 owner feature missing: {missing_owner}')

          forbidden_visible = ['STEP ESTATE-', 'admin_code=1234', 'API: https://']
          visible = owner.split('<script src="config.js', 1)[0]
          leaked = [item for item in forbidden_visible if item in visible]
          if leaked:
              raise SystemExit(f'Internal information visible in owner UI: {leaked}')

          contract = json.loads(Path('dpro-next/estate-current-api-contract.json').read_text(encoding='utf-8'))
          if contract.get('privacy', '').startswith('Only field names') is False:
              raise SystemExit('API contract privacy declaration missing.')
          print(f'owner HTML IDs: {len(parser.ids)} / inline scripts checked: {checked}')
          print('Existing NEXT-2 operations and NEXT-3 case integration: PASS')
          PY_VALIDATE

          cat > /tmp/estate-domain-test.js <<'JS_DOMAIN_TEST'
          global.window = {};
          require(process.cwd() + '/domain.js');
          const domain = window.DPRO_ESTATE_DOMAIN;
          const cases = domain.buildCases(
            [
              {id:'c1', customer_name:'A', customer_status:'申込希望'},
              {id:'c2', customer_name:'B', customer_status:'初回問い合わせ'}
            ],
            [
              {id:'r1', customer_id:'c1', status:'内見済み', reservation_date:'2026-07-23', reservation_time:'10:00', customer:{id:'c1',customer_name:'A',customer_status:'申込希望'}, property:{property_name:'物件A'}}
            ]
          );
          if (domain.version !== 'ESTATE-NEXT-3') throw new Error('domain version mismatch');
          if (cases.length !== 2) throw new Error('case integration count mismatch');
          const application = cases.find(item => item.id === 'c1');
          if (!application || application.stageKey !== 'application' || application.applicationState !== '申込希望') throw new Error('application stage mapping mismatch');
          if (domain.counts(cases).all !== 2) throw new Error('case count mismatch');
          console.log('Estate domain fixture test: PASS');
          JS_DOMAIN_TEST
          node /tmp/estate-domain-test.js

          python3 -m json.tool dpro-next/estate-current-api-contract.json >/dev/null
          python3 -m json.tool dpro-next/estate-next-3-report.json >/dev/null
          ruby -e 'require "psych"; ARGV.each { |f| Psych.parse_file(f); puts "YML ledger PASS: #{f}" }' \
            dpro-next/estate-domain-model.yml dpro-next/estate-next-3-decision.yml

      - name: Confirm non-target application files are unchanged
        shell: bash
        run: |
          set -Eeuo pipefail

          unchanged_files=(
            index.html
            property.html
            member.html
            owner-ipad.html
            owner-settings.html
            system-check.html
            reservation-test.html
          )
          for file in "${unchanged_files[@]}"; do
            baseline_hash="$(git show "${APP_SHA}:${file}" | sha256sum | awk '{print $1}')"
            current_hash="$(sha256sum "$file" | awk '{print $1}')"
            if [ "$baseline_hash" != "$current_hash" ]; then
              echo "ERROR: non-target file changed: $file" >&2
              exit 1
            fi
          done
          echo "Non-target application preservation: PASS"

      - name: Run local HTTP display checks
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -m http.server 8765 --bind 127.0.0.1 >/tmp/estate-next3-http.log 2>&1 &
          server_pid=$!
          trap 'kill $server_pid 2>/dev/null || true' EXIT
          sleep 1
          curl --fail --silent --show-error http://127.0.0.1:8765/owner.html >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:8765/config.js >/dev/null
          curl --fail --silent --show-error http://127.0.0.1:8765/domain.js >/dev/null
          echo "Local HTTP display files: PASS"

      - name: Update NEXT progress and persistent ledgers
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 <<'PY_UPDATE_LEDGERS'
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo
          import json

          completed = datetime.now(ZoneInfo('Asia/Tokyo')).isoformat(timespec='seconds')
          report = json.loads(Path('dpro-next/estate-next-3-report.json').read_text(encoding='utf-8'))
          contract = json.loads(Path('dpro-next/estate-current-api-contract.json').read_text(encoding='utf-8'))
          persistent = bool(report.get('persistent_application_case_detected'))
          missing = report.get('missing_persistent_capabilities') or []

          progress = f'''system: DPRO 不動産・賃貸内見 LINE
          repository: dpromstk2000-lab/dpro-estate-line-liff
          previous_step: ESTATE-NEXT-2-COMPLETE
          current_step: ESTATE-NEXT-3-COMPLETE
          next_step: ESTATE-NEXT-4
          baseline_tag: dpro-estate-next-baseline-20260723
          step_backup_tag: dpro-estate-next-3-before-20260723
          completed_at_jst: "{completed}"
          modified_files:
            - owner.html
            - config.js
            - domain.js
          domain_units_integrated: true
          derived_application_case_view: true
          api_inspection_status: {contract.get('inspection_status', 'partial')}
          persistent_application_case_detected: {str(persistent).lower()}
          worker_change_required_next_step: {str((not persistent) or bool(missing)).lower()}
          supabase_change_required_next_step: {str((not persistent) or bool(missing)).lower()}
          raw_personal_data_committed: false
          worker_changed: false
          supabase_changed: false
          api_changed: false
          existing_features_preserved: true
          html_syntax_check: PASS
          javascript_syntax_check: PASS
          workflow_yml_syntax_check: PASS
          html_id_duplicate_check: PASS
          domain_fixture_check: PASS
          local_http_check: PASS
          '''.replace('\n          ', '\n').lstrip()
          Path('dpro-next/estate-progress.yml').write_text(progress, encoding='utf-8')

          feature_path = Path('dpro-next/estate-feature-ledger.yml')
          feature = feature_path.read_text(encoding='utf-8') if feature_path.exists() else 'system: DPRO 不動産・賃貸内見 LINE\n'
          feature += f'''
          next_3:
            completed_at_jst: "{completed}"
            added:
              - 顧客・物件・内見・申込案件の統合表示
              - 8段階の不動産案件パイプライン
              - 既存データからの申込状態・次アクション算出
              - 個人情報の値を保存しないAPIフィールド監査
            preserved:
              - 今日やること
              - 内見予約ステータス変更
              - 顧客検索と連絡済み更新
              - 物件ステータス変更
              - 個別確認型LINE文面コピー
              - 営業前デモ準備
            change_record:
              worker: unchanged
              supabase: unchanged
              api: unchanged
          '''.replace('\n          ', '\n').lstrip()
          feature_path.write_text(feature, encoding='utf-8')

          risk_path = Path('dpro-next/estate-risk-report.txt')
          risk = risk_path.read_text(encoding='utf-8') if risk_path.exists() else ''
          missing_text = '、'.join(missing) if missing else 'なし'
          risk += f'''

          [ESTATE-NEXT-3 / {completed}]
          - OK: 顧客・物件・内見予約を既存APIのまま案件単位で統合表示した。
          - OK: API監査では個人名・電話番号・物件値などを保存せず、項目名・型・件数だけを記録した。
          - 注意: NEXT-3の申込案件は既存データから算出した表示であり、独立した案件レコードではない。
          - 注意: 永続化不足候補: {missing_text}
          - 注意: 現リポジトリにWorker原本がないため、NEXT-4で正式配置先を確認してからWorkerを変更する。
          - 変更記録: Workerなし / Supabaseなし / APIなし。
          '''.replace('\n          ', '\n').lstrip()
          risk_path.write_text(risk, encoding='utf-8')
          print('Persistent ledgers updated for ESTATE-NEXT-3.')
          PY_UPDATE_LEDGERS

      - name: Verify final change scope and completion ledgers
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 <<'PY_FINAL'
          from pathlib import Path

          progress = Path('dpro-next/estate-progress.yml').read_text(encoding='utf-8')
          required = [
              'current_step: ESTATE-NEXT-3-COMPLETE',
              'next_step: ESTATE-NEXT-4',
              'domain_units_integrated: true',
              'derived_application_case_view: true',
              'raw_personal_data_committed: false',
              'worker_changed: false',
              'supabase_changed: false',
              'api_changed: false',
              'existing_features_preserved: true',
          ]
          missing = [item for item in required if item not in progress]
          if missing:
              raise SystemExit(f'Final progress ledger missing: {missing}')
          for path in [
              'dpro-next/estate-current-api-contract.json',
              'dpro-next/estate-domain-model.yml',
              'dpro-next/estate-next-3-decision.yml',
              'dpro-next/estate-next-3-report.json',
          ]:
              if not Path(path).is_file() or Path(path).stat().st_size == 0:
                  raise SystemExit(f'Missing NEXT-3 ledger: {path}')
          print('NEXT-3 completion ledgers: PASS')
          PY_FINAL

          mapfile -t changed_files < <(git status --short | sed -E 's/^.. //')
          for file in "${changed_files[@]}"; do
            case "$file" in
              owner.html|config.js|domain.js|dpro-next/*|.github/workflows/estate-next-3.yml)
                ;;
              *)
                echo "ERROR: unexpected changed file: $file" >&2
                exit 1
                ;;
            esac
          done

          for required in owner.html config.js domain.js; do
            printf '%s\n' "${changed_files[@]}" | grep -Fx "$required" >/dev/null || {
              echo "ERROR: required target was not changed: $required" >&2
              exit 1
            }
          done
          echo "Final change scope: PASS"

      - name: Publish STEP result to Actions summary
        shell: bash
        run: |
          set -Eeuo pipefail
          inspection="$(python3 -c 'import json; print(json.load(open("dpro-next/estate-current-api-contract.json"))["inspection_status"])')"
          persistent="$(python3 -c 'import json; print(str(json.load(open("dpro-next/estate-next-3-report.json"))["persistent_application_case_detected"]).lower())')"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # DPRO 不動産 LINE / ESTATE-NEXT-3

          | 項目 | 結果 |
          |---|---|
          | 前STEP ESTATE-NEXT-2 | PASS |
          | STEP前バックアップ | \`$DPRO_BACKUP_TAG\` |
          | 顧客・物件・内見・申込案件統合 | PASS |
          | 案件パイプライン | 8段階 |
          | APIフィールド監査 | $inspection |
          | 個人情報の値を台帳へ保存 | なし |
          | 永続申込案件の検出 | $persistent |
          | HTML / JavaScript / ID重複 | PASS |
          | 既存NEXT-2機能維持 | PASS |
          | Worker変更 | なし |
          | Supabase変更 | なし |
          | API変更 | なし |
          | 次STEP | ESTATE-NEXT-4 |

          詳細は \`dpro-next/estate-domain-model.yml\`、\`estate-current-api-contract.json\`、\`estate-next-3-decision.yml\` に保存しました。
          EOF

      - name: Delete workflow and commit STEP completion
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$WORKFLOW_PATH"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- owner.html config.js domain.js dpro-next "$WORKFLOW_PATH"

          mapfile -t staged < <(git diff --cached --name-only)
          [ "${#staged[@]}" -gt 0 ] || { echo "ERROR: no files staged." >&2; exit 1; }
          for file in "${staged[@]}"; do
            case "$file" in
              owner.html|config.js|domain.js|dpro-next/*|.github/workflows/estate-next-3.yml)
                ;;
              *)
                echo "ERROR: unexpected staged file: $file" >&2
                exit 1
                ;;
            esac
          done

          git commit -m "feat(estate): complete ESTATE-NEXT-3 domain integration"
          git push origin "HEAD:$TARGET_BRANCH"
          echo "ESTATE-NEXT-3 completed and workflow self-deleted."
