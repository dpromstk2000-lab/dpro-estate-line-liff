name: DPRO ESTATE NEXT-3 Domain Integration

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/estate-next-3.yml

permissions:
  contents: write

concurrency:
  group: dpro-estate-next-3-${{ github.ref }}
  cancel-in-progress: false

env:
  DPRO_STEP_NAME: ESTATE-NEXT-3
  DPRO_PREVIOUS_STEP: ESTATE-NEXT-2-COMPLETE
  DPRO_NEXT_STEP: ESTATE-NEXT-4
  DPRO_TARGET_FILES: owner.html, config.js, domain.js
  DPRO_CHANGE_SUMMARY: Integrate customer, property, viewing, and application progress into one owner-side case view and inspect the current API contract without changing Worker or Supabase.
  DPRO_FEATURE_SCOPE: Canonical estate pipeline, derived application-case view, sanitized API field audit, persistent-case gap decision, existing NEXT-2 owner operations preservation.
  DPRO_BACKUP_TAG: dpro-estate-next-3-before-20260723
  DPRO_WORKER_CHANGED: "false"
  DPRO_SUPABASE_CHANGED: "false"
  DPRO_API_CHANGED: "false"
  DPRO_DEMO_ADMIN_CODE: "1234"

jobs:
  estate-next-3:
    name: Integrate estate domain units and inspect current API
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Resolve application commit and verify NEXT-2 completion
        shell: bash
        run: |
          set -Eeuo pipefail

          WORKFLOW_PATH=".github/workflows/estate-next-3.yml"
          APP_SHA="$(git rev-parse HEAD)"
          SKIPPED=0

          while git rev-parse "${APP_SHA}^" >/dev/null 2>&1; do
            mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r "$APP_SHA")
            if [ "${#changed[@]}" -eq 1 ] && [ "${changed[0]}" = "$WORKFLOW_PATH" ]; then
              APP_SHA="$(git rev-parse "${APP_SHA}^")"
              SKIPPED=$((SKIPPED + 1))
            else
              break
            fi
          done

          git cat-file -e "${APP_SHA}:dpro-next/estate-progress.yml"
          git show "${APP_SHA}:dpro-next/estate-progress.yml" > /tmp/estate-progress-before.yml

          python3 <<'PY_VERIFY_PROGRESS'
          from pathlib import Path

          text = Path('/tmp/estate-progress-before.yml').read_text(encoding='utf-8')
          values = {}
          for raw in text.splitlines():
              if ':' not in raw:
                  continue
              key, value = raw.split(':', 1)
              values[key.strip()] = value.strip().strip('"').strip("'")

          required = {
              'current_step': 'ESTATE-NEXT-2-COMPLETE',
              'next_step': 'ESTATE-NEXT-3',
              'worker_changed': 'false',
              'supabase_changed': 'false',
              'api_changed': 'false',
              'existing_features_preserved': 'true',
          }
          failed = {key: (values.get(key), expected) for key, expected in required.items() if values.get(key) != expected}
          if failed:
              raise SystemExit(f'NEXT-2 completion ledger mismatch: {failed}')
          print('ESTATE-NEXT-2 completion ledger: PASS')
          PY_VERIFY_PROGRESS

          for file in owner.html owner-settings.html config.js index.html member.html property.html system-check.html reservation-test.html; do
            git cat-file -e "${APP_SHA}:${file}"
          done

          expected_owner="815b6047b2a691b7bacc67b2221167cb53fe7e5c26ba80e28935ab936c30d481"
          expected_config="ec2072b4c8529fb2f0a599c854e256e941d431ac9300ecdfcfe406d0a31e365e"
          actual_owner="$(git show "${APP_SHA}:owner.html" | sha256sum | awk '{print $1}')"
          actual_config="$(git show "${APP_SHA}:config.js" | sha256sum | awk '{print $1}')"
          [ "$actual_owner" = "$expected_owner" ] || { echo "ERROR: owner.html does not match completed NEXT-2." >&2; exit 1; }
          [ "$actual_config" = "$expected_config" ] || { echo "ERROR: config.js does not match completed NEXT-2." >&2; exit 1; }

          echo "WORKFLOW_PATH=$WORKFLOW_PATH" >> "$GITHUB_ENV"
          echo "APP_SHA=$APP_SHA" >> "$GITHUB_ENV"
          echo "TARGET_BRANCH=${{ github.ref_name }}" >> "$GITHUB_ENV"
          echo "WORKFLOW_ONLY_COMMITS_SKIPPED=$SKIPPED" >> "$GITHUB_ENV"
          echo "Application commit: $APP_SHA"
          echo "Workflow-only commits skipped: $SKIPPED"

      - name: Create or verify pre-STEP backup tag
        shell: bash
        run: |
          set -Eeuo pipefail
          git fetch --force --tags origin

          if git rev-parse -q --verify "refs/tags/$DPRO_BACKUP_TAG" >/dev/null; then
            existing="$(git rev-list -n 1 "$DPRO_BACKUP_TAG")"
            if [ "$existing" != "$APP_SHA" ]; then
              echo "ERROR: $DPRO_BACKUP_TAG points to $existing, expected $APP_SHA" >&2
              exit 1
            fi
            echo "Backup tag already exists and matches application commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$DPRO_BACKUP_TAG" "$APP_SHA" -m "DPRO ESTATE before ESTATE-NEXT-3"
            git push origin "refs/tags/$DPRO_BACKUP_TAG"
            echo "Created backup tag: $DPRO_BACKUP_TAG"
          fi

      - name: Validate workflow YML syntax
        shell: bash
        run: |
          set -Eeuo pipefail
          ruby -e 'require "psych"; Psych.parse_file(ARGV[0]); puts "Workflow YML syntax: PASS"' "$WORKFLOW_PATH"

