      - name: Verify changed-file scope and preserved application files
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 <<'PY'
          import os
          import subprocess

          app_sha = os.environ["APP_SHA"]
          changed = set(subprocess.check_output(
              ["git", "diff", "--name-only", app_sha, "--"],
              text=True,
          ).splitlines())
          changed.update(subprocess.check_output(
              ["git", "ls-files", "--others", "--exclude-standard"],
              text=True,
          ).splitlines())

          allowed = {
              "owner.html",
              "owner-settings.html",
              "config.js",
              "dpro-next/estate-progress.yml",
              "dpro-next/estate-feature-ledger.yml",
              "dpro-next/estate-risk-report.txt",
              "dpro-next/estate-next-2-report.json",
              ".github/workflows/estate-next-2.yml",
          }
          unexpected = sorted(changed - allowed)
          missing = sorted({"owner.html", "owner-settings.html", "config.js"} - changed)
          if unexpected:
              raise SystemExit(f"Unexpected changed files: {unexpected}")
          if missing:
              raise SystemExit(f"Expected NEXT-2 files are not changed: {missing}")
          print("Changed-file scope: PASS")
          print("\n".join(sorted(changed)))
          PY

          for file in index.html property.html member.html owner-ipad.html system-check.html reservation-test.html; do
            current_hash="$(sha256sum "$file" | awk '{print $1}')"
            before_hash="$(git show "${APP_SHA}:${file}" | sha256sum | awk '{print $1}')"
            test "$current_hash" = "$before_hash" || {
              echo "ERROR: non-target application file changed: $file" >&2
              exit 1
            }
          done
          echo "Non-target application preservation: PASS"

