          python3 <<'PY'
          from datetime import datetime
          from pathlib import Path
          from zoneinfo import ZoneInfo
          import os

          now = datetime.now(ZoneInfo("Asia/Tokyo")).isoformat(timespec="seconds")
          progress = f"""system: DPRO 不動産・賃貸内見 LINE
          repository: dpromstk2000-lab/dpro-estate-line-liff
          previous_step: ESTATE-NEXT-1-COMPLETE
          current_step: ESTATE-NEXT-2-COMPLETE
          next_step: ESTATE-NEXT-3
          baseline_tag: dpro-estate-next-baseline-20260723
          step_backup_tag: dpro-estate-next-2-before-20260723
          completed_at_jst: "{now}"
          modified_files:
            - owner.html
