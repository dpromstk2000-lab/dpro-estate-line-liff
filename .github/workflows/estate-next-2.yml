      - name: Run static UI, syntax, preservation, and performance checks
        shell: bash
        run: |
          set -Eeuo pipefail

          node --check config.js

          python3 <<'PY'
          from __future__ import annotations

          from collections import Counter
          from html.parser import HTMLParser
          from pathlib import Path
          import hashlib
          import json
          import re
          import subprocess
          import tempfile

          targets = ["owner.html", "owner-settings.html"]
          result = {
              "step": "ESTATE-NEXT-2",
              "status": "PASS",
              "modified_files": ["owner.html", "owner-settings.html", "config.js"],
              "worker_changed": False,
              "supabase_changed": False,
              "api_changed": False,
              "checks": {},
          }

          class Collector(HTMLParser):
              def __init__(self) -> None:
                  super().__init__(convert_charrefs=True)
                  self.ids: list[str] = []

              def handle_starttag(self, tag: str, attrs: list[tuple[str, str | None]]) -> None:
                  for key, value in attrs:
                      if key.lower() == "id" and value:
                          self.ids.append(value)

          script_re = re.compile(r"<script\b(?![^>]*\bsrc=)[^>]*>(.*?)</script\s*>", re.I | re.S)
          html_checks = []

          for path in targets:
              text = Path(path).read_text(encoding="utf-8")
              parser = Collector()
              parser.feed(text)
              parser.close()
              duplicates = sorted([key for key, count in Counter(parser.ids).items() if count > 1])
              if duplicates:
                  raise SystemExit(f"Duplicate HTML IDs in {path}: {duplicates}")

              scripts = script_re.findall(text)
              for index, script in enumerate(scripts, start=1):
                  with tempfile.NamedTemporaryFile("w", suffix=".js", encoding="utf-8", delete=False) as temp:
                      temp.write(script)
                      temp_path = temp.name
                  proc = subprocess.run(["node", "--check", temp_path], text=True, capture_output=True)
                  Path(temp_path).unlink(missing_ok=True)
                  if proc.returncode != 0:
                      raise SystemExit(f"JavaScript syntax error in {path} script {index}:\n{proc.stderr}")

              html_checks.append({
                  "file": path,
                  "id_count": len(parser.ids),
                  "duplicate_ids": duplicates,
                  "inline_scripts_checked": len(scripts),
                  "bytes": Path(path).stat().st_size,
                  "sha256": hashlib.sha256(Path(path).read_bytes()).hexdigest(),
              })

          owner = Path("owner.html").read_text(encoding="utf-8")
          settings = Path("owner-settings.html").read_text(encoding="utf-8")
          config = Path("config.js").read_text(encoding="utf-8")

          required_owner = [
              'data-panel="today"', 'data-panel="reservations"', 'data-panel="customers"',
              'data-panel="properties"', 'data-panel="messages"', "openPanel(", "loadDashboard(",
              "loadReservations(", "loadCustomers(", "loadProperties(", "loadTemplates(",
              "clearSavedAdminCode(", "localStorage.removeItem(STORAGE_KEY)",
              "/api/admin/dashboard", "/api/admin/reservations", "/api/admin/customers",
              "/api/admin/properties", "/api/admin/followups", "/api/admin/templates",
              "/api/admin/demo/prepare", "updateReservationStatus(", "createFollowupFromReservation(",
              "completeFollowup(", "touchCustomer(", "updatePropertyStatus(", "prepareDemo(",
              "limits:{reservations:30,customers:30,properties:30}",
          ]
          required_settings = [
              'data-settings-panel="basic"', 'data-settings-panel="booking"',
              'data-settings-panel="areas"', 'data-settings-panel="templates"',
              'data-settings-panel="system"', "openSettingsPanel(", "clearSavedAdminCode(",
              'id="saveBasicBtn"', 'id="areaList"', 'id="templateSelect"',
              "/api/admin/settings", "/api/admin/areas", "/api/admin/templates",
              "/api/admin/demo/prepare", "saveBasic(", "addArea(", "saveArea(",
              "toggleArea(", "saveTemplate(", "prepareDemo(",
          ]
          required_config = [
              "DPRO_ESTATE_CONFIG", "ESTATE-NEXT-2",
              "dpro-estate-line-api.dpromstk2000.workers.dev",
              "dpro_estate_admin_code", "dpro_estate_owner_panel",
              "dpro_estate_settings_panel",
          ]

          missing_owner = [item for item in required_owner if item not in owner]
          missing_settings = [item for item in required_settings if item not in settings]
          missing_config = [item for item in required_config if item not in config]
          if missing_owner or missing_settings or missing_config:
              raise SystemExit(json.dumps({
                  "missing_owner": missing_owner,
                  "missing_settings": missing_settings,
                  "missing_config": missing_config,
              }, ensure_ascii=False, indent=2))

          if "Promise.all" in owner:
              raise SystemExit("Owner initial bulk Promise.all loading must not remain.")

          visible_owner = owner.split('<script src="config.js', 1)[0]
          visible_settings = settings.split('<script src="config.js', 1)[0]
          forbidden_visible = [
              "dpro-estate-line-api.dpromstk2000.workers.dev",
              "STEP ESTATE-12",
              "STEP ESTATE-NEXT-2",
              "system-check?admin_code=",
          ]
          exposure = {
              "owner.html": [item for item in forbidden_visible if item in visible_owner],
              "owner-settings.html": [item for item in forbidden_visible if item in visible_settings],
          }
          if any(exposure.values()):
              raise SystemExit(f"Internal information is visible in daily UI: {exposure}")

          if "system-check?admin_code=" in owner or "system-check?admin_code=" in settings:
              raise SystemExit("Admin code must not be embedded in a system-check URL.")

          size_limits = {"owner.html": 120_000, "owner-settings.html": 120_000, "config.js": 10_000}
          oversized = {
              path: (Path(path).stat().st_size, limit)
              for path, limit in size_limits.items()
              if Path(path).stat().st_size > limit
          }
          if oversized:
              raise SystemExit(f"NEXT-2 file size limit exceeded: {oversized}")

          result["checks"] = {
              "html_and_inline_js": html_checks,
              "config_js_syntax": "PASS",
              "duplicate_html_ids": "PASS",
              "existing_owner_operations": "PASS",
              "settings_operations": "PASS",
              "today_first_navigation": "PASS",
              "left_menu_switching": "PASS",
              "lazy_loading_30_increment": "PASS",
              "admin_code_local_delete": "PASS",
              "daily_demo_separation": "PASS",
              "visible_internal_information_removed": "PASS",
              "admin_code_query_leak_removed": "PASS",
              "file_size": {
                  path: Path(path).stat().st_size for path in size_limits
              },
          }

          Path("dpro-next/estate-next-2-report.json").write_text(
              json.dumps(result, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(result["checks"], ensure_ascii=False, indent=2))
          PY

          python3 -m http.server 8765 >/tmp/estate-next-2-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          sleep 1
          for path in owner.html owner-settings.html config.js; do
            code="$(curl -sS -o /dev/null -w '%{http_code}' "http://127.0.0.1:8765/$path")"
            test "$code" = "200" || {
              echo "ERROR: local HTTP check failed for $path: $code" >&2
              exit 1
            }
          done
          echo "Local HTTP checks: PASS"

      - name: Update NEXT ledgers
