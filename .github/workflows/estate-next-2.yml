name: DPRO ESTATE NEXT-2 Owner UX

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/estate-next-2.yml

permissions:
  contents: write

concurrency:
  group: dpro-estate-next-2-${{ github.ref }}
  cancel-in-progress: false

env:
  DPRO_STEP_NAME: ESTATE-NEXT-2
  DPRO_PREVIOUS_STEP: ESTATE-NEXT-1-COMPLETE
  DPRO_NEXT_STEP: ESTATE-NEXT-3
  DPRO_TARGET_FILES: owner.html, owner-settings.html, config.js
  DPRO_CHANGE_SUMMARY: PC owner daily-operation navigation, settings left-menu switching, lazy loading, admin-code local deletion, demo separation, common configuration.
  DPRO_FEATURE_SCOPE: Today-first dashboard, lazy resource loading in 30-record increments, existing reservation/customer/property/follow-up/message operations, settings menu separation, hidden internal information.
  DPRO_BACKUP_TAG: dpro-estate-next-2-before-20260723
  DPRO_BASELINE_TAG: dpro-estate-next-baseline-20260723
  DPRO_WORKER_CHANGED: "false"
  DPRO_SUPABASE_CHANGED: "false"
  DPRO_API_CHANGED: "false"

jobs:
  estate-next-2:
    name: Rebuild owner UX without Worker or database changes
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Resolve application commit and verify NEXT-1 completion
        shell: bash
        run: |
          set -Eeuo pipefail

          WORKFLOW_PATH=".github/workflows/estate-next-2.yml"
          APP_SHA="$(git rev-parse HEAD)"
          SKIPPED=0

          while git rev-parse "${APP_SHA}^" >/dev/null 2>&1; do
            mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r "$APP_SHA")
            if [ "${#changed[@]}" -eq 1 ] && [ "${changed[0]}" = "$WORKFLOW_PATH" ]; then
              APP_SHA="$(git rev-parse "${APP_SHA}^")"
              SKIPPED=$((SKIPPED + 1))
            else
              break
            fi
          done

          git cat-file -e "${APP_SHA}:dpro-next/estate-progress.yml"
          git show "${APP_SHA}:dpro-next/estate-progress.yml" > /tmp/estate-progress-before.yml

          python3 <<'PY'
          from pathlib import Path

          text = Path("/tmp/estate-progress-before.yml").read_text(encoding="utf-8")
          required = {
              "current_step": "ESTATE-NEXT-1-COMPLETE",
              "next_step": "ESTATE-NEXT-2",
              "worker_changed": "false",
              "supabase_changed": "false",
              "api_changed": "false",
              "existing_features_preserved": "true",
          }
          values = {}
          for raw in text.splitlines():
              if ":" not in raw:
                  continue
              key, value = raw.split(":", 1)
              values[key.strip()] = value.strip().strip('"').strip("'")
          failed = {key: (values.get(key), expected) for key, expected in required.items() if values.get(key) != expected}
          if failed:
              raise SystemExit(f"NEXT-1 completion ledger mismatch: {failed}")
          print("ESTATE-NEXT-1 completion ledger: PASS")
          PY

          git rev-parse -q --verify "refs/tags/$DPRO_BASELINE_TAG" >/dev/null || {
            echo "ERROR: protected baseline tag is missing: $DPRO_BASELINE_TAG" >&2
            exit 1
          }

          for file in owner.html owner-settings.html; do
            git cat-file -e "${APP_SHA}:${file}"
          done

          if ! git diff --quiet "$DPRO_BASELINE_TAG" "$APP_SHA" -- owner.html owner-settings.html; then
            echo "ERROR: owner files changed after NEXT-1 baseline and before NEXT-2." >&2
            git diff --stat "$DPRO_BASELINE_TAG" "$APP_SHA" -- owner.html owner-settings.html >&2
            exit 1
          fi

          echo "WORKFLOW_PATH=$WORKFLOW_PATH" >> "$GITHUB_ENV"
          echo "APP_SHA=$APP_SHA" >> "$GITHUB_ENV"
          echo "TARGET_BRANCH=${{ github.ref_name }}" >> "$GITHUB_ENV"
          echo "WORKFLOW_ONLY_COMMITS_SKIPPED=$SKIPPED" >> "$GITHUB_ENV"
          echo "Application commit: $APP_SHA"
          echo "Workflow-only commits skipped: $SKIPPED"

      - name: Create or verify pre-STEP backup tag
        shell: bash
        run: |
          set -Eeuo pipefail
          git fetch --force --tags origin

          if git rev-parse -q --verify "refs/tags/$DPRO_BACKUP_TAG" >/dev/null; then
            existing="$(git rev-list -n 1 "$DPRO_BACKUP_TAG")"
            if [ "$existing" != "$APP_SHA" ]; then
              echo "ERROR: $DPRO_BACKUP_TAG points to $existing, expected $APP_SHA" >&2
              exit 1
            fi
            echo "Pre-STEP tag already exists and matches."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$DPRO_BACKUP_TAG" "$APP_SHA" -m "DPRO ESTATE before ESTATE-NEXT-2"
            git push origin "refs/tags/$DPRO_BACKUP_TAG"
            echo "Created backup tag: $DPRO_BACKUP_TAG"
          fi

      - name: Validate workflow YML syntax
        shell: bash
        run: |
          set -Eeuo pipefail
          ruby -e 'require "psych"; Psych.parse_file(ARGV[0]); puts "Workflow YML syntax: PASS"' "$WORKFLOW_PATH"

