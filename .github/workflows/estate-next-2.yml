          | API変更 | なし |
          | 次STEP | ESTATE-NEXT-3 |

          詳細検査結果は \`dpro-next/estate-next-2-report.json\` に保存します。
          EOF

      - name: Delete workflow and commit NEXT-2 completion
        shell: bash
        run: |
          set -Eeuo pipefail

          rm -f "$WORKFLOW_PATH"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A --             owner.html             owner-settings.html             config.js             dpro-next             "$WORKFLOW_PATH"

          mapfile -t staged < <(git diff --cached --name-only)
          test "${#staged[@]}" -gt 0

          for file in "${staged[@]}"; do
            case "$file" in
              owner.html|owner-settings.html|config.js|dpro-next/*|.github/workflows/estate-next-2.yml)
                ;;
              *)
                echo "ERROR: unexpected staged file: $file" >&2
                exit 1
                ;;
            esac
          done

          git commit -m "feat(estate): complete ESTATE-NEXT-2 owner UX"
          git push origin "HEAD:$TARGET_BRANCH"

          echo "ESTATE-NEXT-2 completed and workflow self-deleted."
