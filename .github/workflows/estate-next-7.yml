name: DPRO ESTATE NEXT-7 Secure Member

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/estate-next-7.yml
  workflow_dispatch:
    inputs:
      mode:
        description: prepare=配備準備 / verify=SQL・Worker適用後の完成確認
        required: true
        type: choice
        default: verify
        options:
          - prepare
          - verify

permissions:
  contents: write

concurrency:
  group: dpro-estate-next-7
  cancel-in-progress: false

jobs:
  estate-next-7:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TARGET_BRANCH: main
      WORKFLOW_PATH: .github/workflows/estate-next-7.yml
      STEP_BACKUP_TAG: dpro-estate-next-7-before-20260724
      NEXT_API_BASE: https://dpro-estate-next4-api.dpromstk2000.workers.dev
      LEGACY_API_BASE: https://dpro-estate-line-api.dpromstk2000.workers.dev
      SHOP_CODE: dpro_estate_demo
      EXPECTED_INDEX_BLOB: 77671a24e9e28e432133fc76921093c6388aae3c
      EXPECTED_MEMBER_BLOB: 323f91653b4f7f253cd6e337f210e93a0da2e6c1
      EXPECTED_CONFIG_BLOB: 25782dbd31c57ca783020c528855b9dc8b1196b5
      EXPECTED_EXTENSION_BLOB: 18a595db1a070bccc3e722fed7d6c23b889b374c
      EXPECTED_WORKER_BLOB: 8a91811a0161d61fce561f783275609d3a755568
      ADMIN_CODE_SECRET: ${{ secrets.DPRO_ESTATE_ADMIN_CODE }}

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve execution mode and verify previous STEP
        id: context
        shell: bash
        run: |
          set -Eeuo pipefail
          MODE="${{ inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="prepare"; fi
          case "$MODE" in prepare|verify) ;; *) echo "ERROR: invalid mode: $MODE" >&2; exit 1;; esac
          test -s dpro-next/estate-progress.yml || { echo 'ERROR: progress ledger is missing.' >&2; exit 1; }
          current_step="$(awk -F': ' '/^current_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
          next_step="$(awk -F': ' '/^next_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
          if [ "$MODE" = "prepare" ]; then
            case "$current_step" in ESTATE-NEXT-6-COMPLETE|ESTATE-NEXT-7-DEPLOY-PENDING) ;; *) echo "ERROR: expected ESTATE-NEXT-6-COMPLETE or pending, got $current_step" >&2; exit 1;; esac
            case "$next_step" in ESTATE-NEXT-7|ESTATE-NEXT-7-VERIFY) ;; *) echo "ERROR: unexpected next_step: $next_step" >&2; exit 1;; esac
          else
            test "$current_step" = "ESTATE-NEXT-7-DEPLOY-PENDING" || { echo "ERROR: prepare mode has not completed: $current_step" >&2; exit 1; }
            test "$next_step" = "ESTATE-NEXT-7-VERIFY" || { echo "ERROR: next_step is not verify: $next_step" >&2; exit 1; }
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "current_step=$current_step" >> "$GITHUB_OUTPUT"

      - name: Create or verify STEP backup tag
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$STEP_BACKUP_TAG" >/dev/null 2>&1; then
            echo "Backup tag already exists: $STEP_BACKUP_TAG"
          else
            base_sha="$(git rev-parse HEAD)"
            while true; do
              changed="$(git diff-tree --no-commit-id --name-only -r "$base_sha" | sed '/^$/d')"
              if [ "$changed" = "$WORKFLOW_PATH" ]; then base_sha="$(git rev-parse "${base_sha}^")"; else break; fi
            done
            git tag -a "$STEP_BACKUP_TAG" "$base_sha" -m "DPRO ESTATE before NEXT-7 secure member"
            git push origin "$STEP_BACKUP_TAG"
          fi

      - name: Guard current application version
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          current_step="${{ steps.context.outputs.current_step }}"
          if [ "$current_step" = "ESTATE-NEXT-6-COMPLETE" ]; then
            test "$(git hash-object index.html)" = "$EXPECTED_INDEX_BLOB" || { echo 'ERROR: index.html differs from verified version.' >&2; exit 1; }
            test "$(git hash-object member.html)" = "$EXPECTED_MEMBER_BLOB" || { echo 'ERROR: member.html differs from verified version.' >&2; exit 1; }
            test "$(git hash-object config.js)" = "$EXPECTED_CONFIG_BLOB" || { echo 'ERROR: config.js differs from NEXT-6.' >&2; exit 1; }
            test "$(git hash-object extension.js)" = "$EXPECTED_EXTENSION_BLOB" || { echo 'ERROR: extension.js differs from NEXT-5.' >&2; exit 1; }
            test "$(git hash-object deploy/estate-next-5/worker.js)" = "$EXPECTED_WORKER_BLOB" || { echo 'ERROR: protected NEXT-5 Worker source differs.' >&2; exit 1; }
          else
            grep -q 'member-api.js?v=estate-next-7' member.html
            grep -q "version: 'ESTATE-NEXT-7'" config.js
            grep -q 'ESTATE-NEXT-7-EXTENSION-20260724' deploy/estate-next-7/worker.js
          fi

      - name: Install NEXT-7 member UI and deployment package
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY_INSTALL'
          from pathlib import Path
          import base64
          files = {
            'member.html': '',
            'member-api.js': '',
            'config.js': '',
            'deploy/estate-next-7/worker.js': '',
            'deploy/estate-next-7/wrangler.toml': '',
            'deploy/estate-next-7/sql/estate-next-7.sql': '',
            'deploy/estate-next-7/sql/estate-next-7-rollback.sql': '',
            'deploy/estate-next-7/sql/estate-next-7-verify.sql': '',
            'deploy/estate-next-7/DEPLOY-ORDER.txt': '',
            '/tmp/patch-index-next7.py': '',
            '/tmp/next7-worker-mock.mjs': '',
          }
          for name, payload in files.items():
            path=Path(name)
            path.parent.mkdir(parents=True,exist_ok=True)
            path.write_bytes(base64.b64decode(payload))
          PY_INSTALL
          python3 /tmp/patch-index-next7.py
          python3 - <<'PY_ZIP'
          from pathlib import Path
          from zipfile import ZipFile, ZIP_DEFLATED
          root=Path('deploy/estate-next-7')
          with ZipFile(root/'ESTATE-NEXT-7-WORKER.zip','w',ZIP_DEFLATED) as z: z.write(root/'worker.js','worker.js')
          with ZipFile(root/'ESTATE-NEXT-7-SQL.zip','w',ZIP_DEFLATED) as z:
            for name in ['estate-next-7.sql','estate-next-7-rollback.sql','estate-next-7-verify.sql']: z.write(root/'sql'/name,name)
          PY_ZIP

      - name: Validate member UI index Worker SQL and packages
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          ruby -e "require 'yaml'; Psych.parse_file('$WORKFLOW_PATH'); puts 'YML PASS'"
          node --check config.js
          node --check member-api.js
          node --check extension.js
          node --check deploy/estate-next-7/worker.js
          python3 - <<'PY_HTML'
          from html.parser import HTMLParser
          from pathlib import Path
          from collections import Counter
          import re
          class P(HTMLParser):
            def __init__(self): super().__init__(); self.ids=[]; self.scripts=[]; self.ins=False; self.buf=[]
            def handle_starttag(self,t,a):
              d=dict(a)
              if 'id' in d:self.ids.append(d['id'])
              if t=='script' and 'src' not in d:self.ins=True;self.buf=[]
            def handle_data(self,d):
              if self.ins:self.buf.append(d)
            def handle_endtag(self,t):
              if t=='script' and self.ins:self.scripts.append(''.join(self.buf));self.ins=False
          for filename in ['member.html','index.html']:
            p=P();p.feed(Path(filename).read_text(encoding='utf-8'))
            dup=[k for k,v in Counter(p.ids).items() if v>1]
            if dup: raise SystemExit(f'{filename} duplicate HTML IDs: {dup}')
            Path(f'/tmp/{filename}-inline.js').write_text('\n'.join(p.scripts),encoding='utf-8')
          member=Path('member.html').read_text(encoding='utf-8')
          index=Path('index.html').read_text(encoding='utf-8')
          required_member=['reservationCodeInput','sessionStorage','前回の条件でもう一度探す','過去の内見履歴','member-api.js?v=estate-next-7','line_id_token','required_documents']
          missing=[x for x in required_member if x not in member]
          if missing: raise SystemExit(f'member NEXT-7 markers missing: {missing}')
          forbidden_member=['/api/public/member?phone=','estate_last_phone','STEP ESTATE-12','API: https://','localStorage.setItem']
          found=[x for x in forbidden_member if x in member]
          if found: raise SystemExit(f'insecure/hidden member patterns found: {found}')
          required_index=['安全な予約確認','memberPageOpenBtn','memberPageBtn','受付番号','dpro_estate_last_reservation_code']
          missing=[x for x in required_index if x not in index]
          if missing: raise SystemExit(f'index NEXT-7 markers missing: {missing}')
          forbidden_index=['/api/public/member?phone=','memberSearchBtn','memberPhone',"localStorage.setItem('estate_last_phone'","params.get('phone')"]
          found=[x for x in forbidden_index if x in index]
          if found: raise SystemExit(f'legacy phone-only index patterns found: {found}')
          print('HTML security checks PASS')
          PY_HTML
          node --check /tmp/member.html-inline.js
          node --check /tmp/index.html-inline.js
          cp deploy/estate-next-7/worker.js /tmp/worker.mjs
          cp /tmp/next7-worker-mock.mjs /tmp/worker-mock-test.mjs
          (cd /tmp && node worker-mock-test.mjs)
          grep -q 'create table if not exists public.estate_member_sessions' deploy/estate-next-7/sql/estate-next-7.sql
          grep -q 'create table if not exists public.estate_member_auth_attempts' deploy/estate-next-7/sql/estate-next-7.sql
          grep -q 'create table if not exists public.estate_member_revisit_requests' deploy/estate-next-7/sql/estate-next-7.sql
          unzip -t deploy/estate-next-7/ESTATE-NEXT-7-WORKER.zip
          unzip -t deploy/estate-next-7/ESTATE-NEXT-7-SQL.zip
          test "$(wc -c < member.html)" -lt 130000

      - name: Confirm existing features and allowed change scope
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          for protected in owner.html owner-ipad.html owner-settings.html extension.js domain.js property.html system-check.html; do
            test "$(git hash-object "$protected")" = "$(git rev-parse "$STEP_BACKUP_TAG:$protected")" || { echo "ERROR: protected file changed: $protected" >&2; exit 1; }
          done
          allowed='^(index\.html|member\.html|member-api\.js|config\.js|deploy/estate-next-7/|dpro-next/|\.github/workflows/estate-next-7\.yml)'
          unexpected="$(git diff --name-only "$STEP_BACKUP_TAG" | grep -Ev "$allowed" || true)"
          if [ -n "$unexpected" ]; then echo 'Unexpected changed files:' >&2; printf '%s\n' "$unexpected" >&2; exit 1; fi

      - name: Record deployment pending state
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          prepared_at="$(TZ=Asia/Tokyo date --iso-8601=seconds)"
          mkdir -p dpro-next
          cat > dpro-next/estate-progress.yml <<EOF
          system: DPRO 不動産・賃貸内見 LINE
          repository: $GITHUB_REPOSITORY
          previous_step: ESTATE-NEXT-6-COMPLETE
          current_step: ESTATE-NEXT-7-DEPLOY-PENDING
          next_step: ESTATE-NEXT-7-VERIFY
          baseline_tag: dpro-estate-next-baseline-20260723
          step_backup_tag: $STEP_BACKUP_TAG
          prepared_at_jst: "$prepared_at"
          modified_files:
            - index.html
            - member.html
            - member-api.js
            - config.js
          extension_worker_name: dpro-estate-next4-api
          extension_worker_url: $NEXT_API_BASE
          secure_member_session_ui: true
          reservation_code_verification_ui: true
          line_id_token_ready: true
          phone_only_production_removed: true
          phone_only_demo_limited: true
          past_viewing_history_ui: true
          previous_preferences_ui: true
          revisit_request_ui: true
          raw_phone_local_storage_removed: true
          legacy_phone_only_endpoint_ui_removed: true
          legacy_phone_only_endpoint_source_unavailable: true
          legacy_phone_only_endpoint_direct_blocked: false
          worker_update_prepared: true
          supabase_migration_prepared: true
          worker_changed: false
          supabase_changed: false
          api_changed: false
          existing_features_preserved: true
          manual_sql_required: true
          manual_worker_deploy_required: true
          EOF
          cat > dpro-next/estate-next-7-deployment.yml <<EOF
          system: DPRO 不動産・賃貸内見 LINE
          step: ESTATE-NEXT-7
          status: DEPLOY-PENDING
          worker_name: dpro-estate-next4-api
          worker_url: $NEXT_API_BASE
          sql_file: deploy/estate-next-7/sql/estate-next-7.sql
          worker_file: deploy/estate-next-7/worker.js
          secure_member_session: prepared
          reservation_code_verification: prepared
          line_id_token_verification: ready_optional
          auth_rate_limit: prepared
          previous_preferences: prepared
          revisit_request: prepared
          next_step: ESTATE-NEXT-7-VERIFY
          EOF
          cat >> dpro-next/estate-feature-ledger.yml <<'EOF'

          estate_next_7:
            status: DEPLOY-PENDING
            secure_member_session: prepared
            reservation_code_verification: prepared
            line_id_token_verification: ready_optional
            phone_only_production: removed
            phone_only_demo: limited
            past_viewing_history: prepared
            previous_preferences: prepared
            revisit_request: prepared
            legacy_phone_only_endpoint_direct_block: pending_legacy_worker_source
          EOF
          cat >> dpro-next/estate-risk-report.txt <<'EOF_RISK'

          [ESTATE-NEXT-7 DEPLOY-PENDING]
          新しいindex.html・member.htmlは電話番号だけの照会を廃止し、拡張Workerの安全な会員セッションへ移行します。
          既存legacy Worker原本は現在のリポジトリにないため、旧 /api/public/member?phone= エンドポイント自体の停止は本STEPでは行いません。
          公開画面からの呼出し・リンク・電話番号保存は除去し、旧エンドポイントの完全停止はWorker統合を行うセキュリティSTEPで対応します。
          EOF_RISK

      - name: Commit preparation files and keep workflow for verification
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html member.html member-api.js config.js deploy/estate-next-7 dpro-next
          git commit -m "feat(estate): prepare ESTATE-NEXT-7 secure member"
          git push origin "HEAD:$TARGET_BRANCH"

      - name: Publish preparation summary
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          # ESTATE-NEXT-7 配備準備完了

          | 項目 | 結果 |
          |---|---|
          | 本人確認 | 電話番号＋受付番号、LINE IDトークン対応準備 |
          | 電話番号だけの確認 | 本番廃止。demo=1のデモ店舗のみ |
          | 会員セッション | 生トークンを保存しない12時間セッション |
          | 予約履歴 | 今後・過去を分離表示 |
          | 希望条件 | 前回条件を安全に表示 |
          | 再相談 | 「前回の条件でもう一度探す」を永続化 |
          | 現在状態 | ESTATE-NEXT-7-DEPLOY-PENDING |

          `deploy/estate-next-7/DEPLOY-ORDER.txt` の順でSQLとWorkerを適用し、mode=verifyを実行してください。
          EOF

      - name: Verify deployed NEXT-7 Worker and member security
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          set -Eeuo pipefail
          curl --silent --show-error --retry 4 --retry-delay 3 "$NEXT_API_BASE/api/health" -o /tmp/next7-health.json
          python3 - <<'PY_HEALTH'
          import json
          from pathlib import Path
          data=json.loads(Path('/tmp/next7-health.json').read_text())
          assert data.get('ok') is True, data
          assert data.get('version') == 'ESTATE-NEXT-7-EXTENSION-20260724', data
          member=data.get('member_security',{})
          assert member.get('secure_session') is True, member
          assert member.get('reservation_code_verification') is True, member
          assert member.get('phone_only_production') is False, member
          assert member.get('phone_only_demo') is True, member
          assert member.get('rate_limit') is True, member
          assert member.get('revisit_request') is True, member
          PY_HEALTH
          candidates=()
          if [ -n "$ADMIN_CODE_SECRET" ]; then candidates+=("$ADMIN_CODE_SECRET"); fi
          if [ "$ADMIN_CODE_SECRET" != "1234" ]; then candidates+=("1234"); fi
          valid_code=''
          for candidate in "${candidates[@]}"; do
            [ -z "$candidate" ] && continue
            echo "::add-mask::$candidate"
            legacy_status="$(curl --silent --show-error -o /tmp/legacy-login.json -w '%{http_code}' -X POST -H 'Content-Type: application/json' -H "X-DPRO-Admin-Code: $candidate" -H "X-Admin-Code: $candidate" --data "{\"code\":\"$candidate\",\"admin_code\":\"$candidate\",\"shop_code\":\"$SHOP_CODE\"}" "$LEGACY_API_BASE/api/admin/login")"
            [ "$legacy_status" = '200' ] || continue
            next_status="$(curl --silent --show-error -o /tmp/next7-check.json -w '%{http_code}' -H "X-DPRO-Admin-Code: $candidate" -H "X-Admin-Code: $candidate" "$NEXT_API_BASE/api/admin/system-check?shop_code=$SHOP_CODE&write_test=1")"
            if [ "$next_status" = '200' ]; then valid_code="$candidate"; break; fi
          done
          test -n "$valid_code" || { echo 'ERROR: DPRO_ESTATE_ADMIN_CODEを現在の管理コードへ更新してください。' >&2; cat /tmp/next7-check.json 2>/dev/null || true; exit 1; }
          curl --fail --silent --show-error --retry 4 --retry-delay 3 "$LEGACY_API_BASE/api/health" -o /tmp/legacy-health.json
          phone_only_status="$(curl --silent --show-error -o /tmp/phone-only.json -w '%{http_code}' -X POST -H 'Content-Type: application/json' --data '{"shop_code":"dpro_estate_demo","phone":"00000000000"}' "$NEXT_API_BASE/api/public/member/session")"
          test "$phone_only_status" = '400' -o "$phone_only_status" = '401'
          python3 - <<'PY_VERIFY'
          import json
          from pathlib import Path
          health=json.loads(Path('/tmp/next7-health.json').read_text())
          check=json.loads(Path('/tmp/next7-check.json').read_text())
          legacy=json.loads(Path('/tmp/legacy-health.json').read_text())
          assert check.get('ok') is True, check
          tables={x.get('table'):x.get('ok') for x in check.get('tables',[])}
          required=['estate_application_cases','estate_case_events','estate_vacancy_checks','estate_member_sessions','estate_member_auth_attempts','estate_member_revisit_requests']
          assert all(tables.get(x) is True for x in required), tables
          features=check.get('features',{})
          assert all(features.get(x) is True for x in ['secure_member_session','reservation_code_verification','line_id_token_ready','previous_preferences','revisit_request']), features
          member_test=check.get('member_security_test',{})
          assert member_test.get('ok') is True, member_test
          assert member_test.get('token_hash_only') is True, member_test
          assert member_test.get('revisit_duplicate_guard') is True, member_test
          assert member_test.get('session_expiry_set') is True, member_test
          assert legacy.get('ok') is True, legacy
          safe={'extension_health':health,'system_check':check,'legacy_health':{'ok':legacy.get('ok'),'service':legacy.get('service'),'version':legacy.get('version')},'phone_only_production_rejected':True}
          Path('dpro-next/estate-next-7-live-verification.json').write_text(json.dumps(safe,ensure_ascii=False,indent=2)+'\n')
          print('NEXT-7 LIVE VERIFICATION PASS')
          PY_VERIFY

      - name: Verify published member and reservation pages
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          set -Eeuo pipefail
          curl --fail --silent --show-error --retry 8 --retry-delay 5 "https://dpromstk2000-lab.github.io/dpro-estate-line-liff/member.html?v=estate-next-7-${GITHUB_RUN_ID}" -o /tmp/member-live.html
          curl --fail --silent --show-error --retry 8 --retry-delay 5 "https://dpromstk2000-lab.github.io/dpro-estate-line-liff/index.html?v=estate-next-7-${GITHUB_RUN_ID}" -o /tmp/index-live.html
          grep -q 'member-api.js?v=estate-next-7' /tmp/member-live.html
          grep -q 'reservationCodeInput' /tmp/member-live.html
          grep -q '前回の条件でもう一度探す' /tmp/member-live.html
          grep -q '過去の内見履歴' /tmp/member-live.html
          ! grep -q '/api/public/member?phone=' /tmp/member-live.html
          grep -q '安全な予約確認' /tmp/index-live.html
          grep -q 'memberPageOpenBtn' /tmp/index-live.html
          ! grep -q '/api/public/member?phone=' /tmp/index-live.html

      - name: Record ESTATE-NEXT-7 completion
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          set -Eeuo pipefail
          completed_at="$(TZ=Asia/Tokyo date --iso-8601=seconds)"
          cat > dpro-next/estate-progress.yml <<EOF
          system: DPRO 不動産・賃貸内見 LINE
          repository: $GITHUB_REPOSITORY
          previous_step: ESTATE-NEXT-7-DEPLOY-PENDING
          current_step: ESTATE-NEXT-7-COMPLETE
          next_step: ESTATE-NEXT-8
          baseline_tag: dpro-estate-next-baseline-20260723
          step_backup_tag: $STEP_BACKUP_TAG
          completed_at_jst: "$completed_at"
          modified_files:
            - index.html
            - member.html
            - member-api.js
            - config.js
          extension_worker_name: dpro-estate-next4-api
          extension_worker_url: $NEXT_API_BASE
          worker_changed: true
          supabase_changed: true
          api_changed: true
          secure_member_session: true
          reservation_code_verification: true
          line_id_token_ready: true
          phone_only_production_removed: true
          phone_only_demo_limited: true
          auth_attempt_rate_limit: true
          session_token_hash_only: true
          past_viewing_history: true
          previous_preferences: true
          revisit_request_persistent: true
          raw_phone_local_storage_removed: true
          legacy_phone_only_endpoint_ui_removed: true
          legacy_phone_only_endpoint_source_unavailable: true
          legacy_phone_only_endpoint_direct_blocked: false
          existing_features_preserved: true
          live_health_check: PASS
          live_schema_check: PASS
          live_member_security_test: PASS
          live_phone_only_rejection: PASS
          published_member_check: PASS
          published_index_check: PASS
          EOF
          python3 - <<'PY_LEDGER'
          from pathlib import Path
          path=Path('dpro-next/estate-next-7-deployment.yml')
          text=path.read_text().replace('status: DEPLOY-PENDING','status: COMPLETE').replace('next_step: ESTATE-NEXT-7-VERIFY','next_step: ESTATE-NEXT-8')
          text += 'live_verification: PASS\nmember_security_test: PASS\n'
          path.write_text(text)
          ledger=Path('dpro-next/estate-feature-ledger.yml')
          text=ledger.read_text().replace('estate_next_7:\n            status: DEPLOY-PENDING','estate_next_7:\n            status: COMPLETE')
          ledger.write_text(text)
          PY_LEDGER

      - name: Delete workflow and commit verified completion
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$WORKFLOW_PATH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dpro-next "$WORKFLOW_PATH"
          mapfile -t staged < <(git diff --cached --name-only)
          test "${#staged[@]}" -gt 0 || { echo 'ERROR: no completion files staged.' >&2; exit 1; }
          for file in "${staged[@]}"; do case "$file" in dpro-next/*|.github/workflows/estate-next-7.yml) ;; *) echo "ERROR: unexpected completion file: $file" >&2; exit 1;; esac; done
          git commit -m "feat(estate): complete ESTATE-NEXT-7 secure member"
          git push origin "HEAD:$TARGET_BRANCH"

      - name: Publish completion summary
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          # ESTATE-NEXT-7 COMPLETE

          | 項目 | 結果 |
          |---|---|
          | 電話番号＋受付番号本人確認 | PASS |
          | LINE IDトークン対応 | READY |
          | 電話番号だけの本番確認廃止 | PASS |
          | 会員セッション・試行制限 | PASS |
          | 過去の内見履歴 | PASS |
          | 前回の希望条件 | PASS |
          | 同じ条件で再相談 | PASS |
          | 次STEP | ESTATE-NEXT-8 |

          実行YML自身を削除し、完成台帳を保存しました。
          EOF
