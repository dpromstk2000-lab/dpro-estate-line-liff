name: DPRO ESTATE NEXT-10 Final Delivery

'on':
  push:
    branches: [main]
    paths:
      - .github/workflows/estate-next-10.yml
  workflow_dispatch:
    inputs:
      mode:
        description: Product site completion verification
        required: true
        default: verify
        type: choice
        options:
          - verify

permissions:
  contents: write

concurrency:
  group: dpro-estate-next-10
  cancel-in-progress: false

jobs:
  estate-next-10:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      TARGET_BRANCH: main
      WORKFLOW_PATH: .github/workflows/estate-next-10.yml
      STEP_BACKUP_TAG: dpro-estate-next-10-before-20260724
      PAGE_BASE: https://dpromstk2000-lab.github.io/dpro-estate-line-liff
      NEXT_API_BASE: https://dpro-estate-next4-api.dpromstk2000.workers.dev
      LEGACY_API_BASE: https://dpro-estate-line-api.dpromstk2000.workers.dev
      PRODUCT_SITE_BASE: https://dpromstk2000-lab.github.io/dpro-line-systems-site
      SHOP_CODE: dpro_estate_demo
      ADMIN_CODE_SECRET: ${{ secrets.DPRO_ESTATE_ADMIN_CODE }}
      ASSET_DIR: assets/estate-next-10
      PDF_NAME: dpro-estate-operation-experience.pdf
      PNG_NAME: dpro-estate-operation-experience.png

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve execution mode
        id: mode
        shell: bash
        run: |
          set -Eeuo pipefail
          if [ "${{ github.event_name }}" = 'workflow_dispatch' ]; then
            mode='verify'
          else
            mode='prepare'
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "ESTATE-NEXT-10 mode: $mode"

      - name: Verify previous STEP and backup current version
        if: steps.mode.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          test -s dpro-next/estate-progress.yml || { echo 'ERROR: progress ledger is missing.' >&2; exit 1; }
          current_step="$(awk -F': ' '/^current_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
          next_step="$(awk -F': ' '/^next_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
          test "$current_step" = 'ESTATE-NEXT-9-COMPLETE' || { echo "ERROR: expected ESTATE-NEXT-9-COMPLETE, got $current_step" >&2; exit 1; }
          test "$next_step" = 'ESTATE-NEXT-10' || { echo "ERROR: expected ESTATE-NEXT-10, got $next_step" >&2; exit 1; }

          if git rev-parse -q --verify "refs/tags/$STEP_BACKUP_TAG" >/dev/null 2>&1; then
            backup_commit="$(git rev-parse "$STEP_BACKUP_TAG^{commit}")"
            git merge-base --is-ancestor "$backup_commit" HEAD || { echo 'ERROR: NEXT-10 backup tag is not an ancestor of main.' >&2; exit 1; }
            mapfile -t changed_since_backup < <(git diff --name-only "$backup_commit"..HEAD)
            for file in "${changed_since_backup[@]}"; do
              case "$file" in
                "$WORKFLOW_PATH"|config.js|system-check.html|system-check-api.js|assets/estate-next-10/*|dpro-next/estate-next-10-*) ;;
                *) echo "ERROR: unexpected file changed after NEXT-10 backup: $file" >&2; exit 1;;
              esac
            done
            echo "Reusing backup tag $STEP_BACKUP_TAG at $backup_commit"
          else
            tag_commit="$(git rev-parse HEAD)"
            while true; do
              mapfile -t changed < <(git diff-tree --no-commit-id --name-only -r "$tag_commit")
              only_workflow=true
              if [ "${#changed[@]}" -eq 0 ]; then only_workflow=false; fi
              for file in "${changed[@]}"; do
                if [ "$file" != "$WORKFLOW_PATH" ]; then only_workflow=false; break; fi
              done
              if [ "$only_workflow" = false ]; then break; fi
              parent="$(git rev-parse "$tag_commit^")"
              test "$parent" != "$tag_commit" || { echo 'ERROR: could not resolve backup commit.' >&2; exit 1; }
              tag_commit="$parent"
            done
            git tag -a "$STEP_BACKUP_TAG" "$tag_commit" -m 'DPRO ESTATE before NEXT-10 final delivery'
            git push origin "$STEP_BACKUP_TAG"
          fi

      - name: Prepare final version markers
        if: steps.mode.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY_VERSION'
          from pathlib import Path

          replacements = {
              'config.js': [("version: 'ESTATE-NEXT-9'", "version: 'ESTATE-NEXT-10'")],
              'system-check.html': [('ESTATE-NEXT-9', 'ESTATE-NEXT-10')],
              'system-check-api.js': [('ESTATE-NEXT-9', 'ESTATE-NEXT-10')],
          }
          for name, pairs in replacements.items():
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              original = text
              for old, new in pairs:
                  text = text.replace(old, new)
              if text == original and 'ESTATE-NEXT-10' not in text:
                  raise SystemExit(f'ERROR: final version marker was not applied to {name}')
              path.write_text(text, encoding='utf-8')

          Path('dpro-next/estate-next-10-version.yml').write_text(
              '\n'.join([
                  'step: ESTATE-NEXT-10',
                  'status: FINAL-ASSET-PREPARATION',
                  'version_marker: ESTATE-NEXT-10',
                  'worker_changed: false',
                  'supabase_changed: false',
                  'api_changed: false',
                  '',
              ]), encoding='utf-8'
          )
          PY_VERSION

          git add config.js system-check.html system-check-api.js dpro-next/estate-next-10-version.yml
          if ! git diff --cached --quiet; then
            git commit -m 'Prepare DPRO ESTATE NEXT-10 final version markers'
            git push origin "$TARGET_BRANCH"
          fi

      - name: Wait for final version publication
        if: steps.mode.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          for attempt in $(seq 1 36); do
            config="$(curl --silent --show-error "$PAGE_BASE/config.js?v=estate-next-10-${GITHUB_RUN_ID}" || true)"
            system="$(curl --silent --show-error "$PAGE_BASE/system-check.html?v=estate-next-10-${GITHUB_RUN_ID}" || true)"
            if grep -q "version: 'ESTATE-NEXT-10'" <<<"$config" && grep -q 'ESTATE-NEXT-10' <<<"$system"; then
              echo 'Final version markers are live.'
              exit 0
            fi
            sleep 10
          done
          echo 'ERROR: GitHub Pages did not publish NEXT-10 markers in time.' >&2
          exit 1

      - name: Install screenshot PDF and QR verification tools
        if: steps.mode.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk poppler-utils libzbar0
          python3 -m pip install --disable-pip-version-check playwright pillow qrcode pypdf pyzbar opencv-python-headless
          python3 -m playwright install --with-deps chromium

      - name: Capture final live screenshots
        if: steps.mode.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "$ASSET_DIR/screenshots"
          python3 - <<'PY_CAPTURE'
          from pathlib import Path
          from playwright.sync_api import sync_playwright

          base = 'https://dpromstk2000-lab.github.io/dpro-estate-line-liff'
          out = Path('assets/estate-next-10/screenshots')
          out.mkdir(parents=True, exist_ok=True)
          targets = [
              ('customer', f'{base}/index.html?demo=1&v=estate-next-10', 390, 844),
              ('owner', f'{base}/owner.html?demo=1&v=estate-next-10', 1440, 1000),
              ('owner-ipad', f'{base}/owner-ipad.html?demo=1&v=estate-next-10', 1024, 1366),
              ('followup', f'{base}/followup.html?demo=1&v=estate-next-10', 1440, 1000),
              ('system-check', f'{base}/system-check.html?demo=1&v=estate-next-10', 1440, 1000),
          ]
          init = """
          try {
            localStorage.setItem('dpro_estate_admin_code', '1234');
            localStorage.setItem('estate_admin_code', '1234');
            localStorage.setItem('admin_code', '1234');
          } catch (e) {}
          """
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True, args=['--no-sandbox'])
              for name, url, width, height in targets:
                  context = browser.new_context(viewport={'width': width, 'height': height}, device_scale_factor=1)
                  context.add_init_script(init)
                  page = context.new_page()
                  response = page.goto(url, wait_until='domcontentloaded', timeout=120000)
                  if response is None or response.status >= 400:
                      raise RuntimeError(f'{name} returned invalid response: {None if response is None else response.status}')
                  page.wait_for_timeout(5000)
                  for selector in ['#adminCode', '#admin-code', 'input[name="admin_code"]', 'input[type="password"]']:
                      locator = page.locator(selector).first
                      try:
                          if locator.count() and locator.is_visible() and not locator.input_value():
                              locator.fill('1234')
                      except Exception:
                          pass
                  for label in ['確認', '接続', '読み込む', '管理コードを確認']:
                      button = page.get_by_role('button', name=label, exact=False).first
                      try:
                          if button.count() and button.is_visible():
                              button.click(timeout=2000)
                              page.wait_for_timeout(3500)
                              break
                      except Exception:
                          pass
                  page.screenshot(path=str(out / f'{name}.png'), full_page=False)
                  context.close()
              browser.close()
          PY_CAPTURE

      - name: Generate A4 one-page operation experience sheet
        if: steps.mode.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p "$ASSET_DIR/qr"
          python3 - <<'PY_SHEET'
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont, ImageFilter
          import qrcode, json, subprocess

          W, H = 2480, 3508
          ASSET = Path('assets/estate-next-10')
          SHOTS = ASSET / 'screenshots'
          QRDIR = ASSET / 'qr'
          QRDIR.mkdir(parents=True, exist_ok=True)
          font_path = subprocess.check_output(['fc-match','Noto Sans CJK JP','-f','%{file}'], text=True).strip()
          if not font_path:
              raise SystemExit('ERROR: Japanese font not found.')

          def font(size, bold=False):
              path = font_path
              if bold:
                  candidate = Path('/usr/share/fonts/opentype/noto/NotoSansCJK-Bold.ttc')
                  if candidate.exists(): path = str(candidate)
              return ImageFont.truetype(path, size)

          def rounded(draw, box, radius, fill, outline=None, width=1):
              draw.rounded_rectangle(box, radius=radius, fill=fill, outline=outline, width=width)

          def fit_crop(image, size, focal=(0.5,0.5)):
              image = image.convert('RGB')
              tw, th = size
              scale = max(tw/image.width, th/image.height)
              nw, nh = int(image.width*scale), int(image.height*scale)
              image = image.resize((nw,nh), Image.Resampling.LANCZOS)
              x = max(0, min(nw-tw, int((nw-tw)*focal[0])))
              y = max(0, min(nh-th, int((nh-th)*focal[1])))
              return image.crop((x,y,x+tw,y+th))

          def paste_panel(canvas, image_path, box, label, focal=(0.5,0.2)):
              x1,y1,x2,y2 = box
              panel = Image.new('RGB',(x2-x1,y2-y1),'white')
              shot_h = panel.height-84
              shot = fit_crop(Image.open(image_path),(panel.width,shot_h),focal)
              panel.paste(shot,(0,84))
              pd = ImageDraw.Draw(panel)
              pd.rectangle((0,0,panel.width,84),fill='#073f34')
              pd.text((28,18),label,font=font(34,True),fill='white')
              mask = Image.new('L',panel.size,0)
              ImageDraw.Draw(mask).rounded_rectangle((0,0,panel.width,panel.height),radius=30,fill=255)
              shadow = Image.new('RGBA',(panel.width+40,panel.height+40),(0,0,0,0))
              ImageDraw.Draw(shadow).rounded_rectangle((20,20,panel.width+20,panel.height+20),radius=30,fill=(0,0,0,45))
              shadow = shadow.filter(ImageFilter.GaussianBlur(14))
              canvas.alpha_composite(shadow,(x1-20,y1-10))
              canvas.paste(panel,(x1,y1),mask)

          urls = [
              ('CUSTOMER','物件・内見予約', 'index.html', 'https://dpromstk2000-lab.github.io/dpro-estate-line-liff/index.html?demo=1&v=estate-next-10'),
              ('OWNER PC','今日・案件管理', 'owner.html', 'https://dpromstk2000-lab.github.io/dpro-estate-line-liff/owner.html?demo=1&v=estate-next-10'),
              ('iPad','接客・内見確認', 'owner-ipad.html', 'https://dpromstk2000-lab.github.io/dpro-estate-line-liff/owner-ipad.html?demo=1&v=estate-next-10'),
              ('FOLLOW-UP','追客・再相談', 'followup.html', 'https://dpromstk2000-lab.github.io/dpro-estate-line-liff/followup.html?demo=1&v=estate-next-10'),
              ('CHECK','営業前検査', 'system-check.html', 'https://dpromstk2000-lab.github.io/dpro-estate-line-liff/system-check.html?demo=1&v=estate-next-10'),
          ]
          for key, title, path, url in urls:
              qr = qrcode.QRCode(version=None,error_correction=qrcode.constants.ERROR_CORRECT_H,box_size=12,border=4)
              qr.add_data(url); qr.make(fit=True)
              qr.make_image(fill_color='black',back_color='white').convert('RGB').save(QRDIR/f'{path}.png')

          canvas = Image.new('RGBA',(W,H),'#f4f8f6')
          draw = ImageDraw.Draw(canvas)
          draw.rectangle((0,0,W,310),fill='#073f34')
          draw.text((120,72),'DPRO 不動産・賃貸内見 LINE',font=font(78,True),fill='white')
          draw.text((122,178),'操作体験シート  |  ESTATE NEXT-10 完成版',font=font(34,True),fill='#b9ead8')
          draw.text((1780,82),'DEMO CODE',font=font(28,True),fill='#b9ead8')
          draw.text((1780,128),'1234',font=font(68,True),fill='white')

          flow_y = 350
          flow = [('01','条件入力'),('02','物件・内見予約'),('03','今日・案件管理'),('04','追客・次の提案')]
          card_w = 520
          gap = 50
          start_x = 120
          for i,(num,label) in enumerate(flow):
              x = start_x+i*(card_w+gap)
              rounded(draw,(x,flow_y,x+card_w,flow_y+190),28,'white','#cfe2da',3)
              draw.text((x+28,flow_y+25),num,font=font(54,True),fill='#0d6b55')
              draw.text((x+28,flow_y+102),label,font=font(32,True),fill='#14231e')

          paste_panel(canvas, SHOTS/'customer.png',(120,590,760,2320),'お客様用 - 物件・内見予約',(0.5,0.05))
          paste_panel(canvas, SHOTS/'owner.png',(820,590,2360,1375),'PC - 今日やること・案件管理',(0.5,0.05))
          paste_panel(canvas, SHOTS/'followup.png',(820,1430,2360,2215),'PC - 追客・再相談・物件提案',(0.5,0.05))
          ipad = fit_crop(Image.open(SHOTS/'owner-ipad.png'),(360,560),(0.5,0.0))
          ipad_panel = Image.new('RGBA',(390,620),'white')
          ipad_panel.paste(ipad,(15,45))
          ImageDraw.Draw(ipad_panel).text((24,8),'iPad営業画面',font=font(28,True),fill='#073f34')
          mask = Image.new('L',ipad_panel.size,0); ImageDraw.Draw(mask).rounded_rectangle((0,0,389,619),24,fill=255)
          canvas.paste(ipad_panel,(1940,1660),mask)

          draw.text((120,2380),'QRコードから実際の完成画面を操作できます',font=font(42,True),fill='#14231e')
          draw.text((120,2445),'LINE自動送信は行わず、顧客ごとの文面を確認してコピーする安全な運用です。',font=font(27),fill='#596b64')

          qr_y = 2535
          card_gap = 24
          qr_card_w = (W-240-card_gap*4)//5
          for i,(key,title,path,url) in enumerate(urls):
              x = 120+i*(qr_card_w+card_gap)
              rounded(draw,(x,qr_y,x+qr_card_w,qr_y+720),24,'white','#cfe2da',2)
              draw.text((x+20,qr_y+18),key,font=font(24,True),fill='#0d6b55')
              draw.text((x+20,qr_y+60),title,font=font(25,True),fill='#14231e')
              qr = Image.open(QRDIR/f'{path}.png').convert('RGB').resize((330,330),Image.Resampling.NEAREST)
              canvas.paste(qr,(x+(qr_card_w-330)//2,qr_y+115))
              draw.text((x+20,qr_y+470),path,font=font(21,True),fill='#40534c')
              if key in {'OWNER PC','iPad','FOLLOW-UP','CHECK'}:
                  draw.text((x+20,qr_y+520),'管理コード 1234',font=font(20,True),fill='#9a5b00')
              draw.text((x+20,qr_y+575),'スマホで読み取り',font=font(19),fill='#6a7a74')

          draw.line((120,3310,2360,3310),fill='#c8d8d2',width=3)
          draw.text((120,3340),'DPRO LINE SYSTEMS  |  不動産会社の物件紹介・内見・申込・追客を一つに',font=font(25,True),fill='#40534c')
          draw.text((120,3390),'QR読取検査済み / A4縦1ページ / 実画面スクリーンショット使用',font=font(22),fill='#6a7a74')

          rgb = canvas.convert('RGB')
          png = ASSET/'dpro-estate-operation-experience.png'
          pdf = ASSET/'dpro-estate-operation-experience.pdf'
          rgb.save(png,optimize=True)
          rgb.save(pdf,'PDF',resolution=300.0)
          (ASSET/'qr-targets.json').write_text(json.dumps({path:url for _,_,path,url in urls},ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          PY_SHEET

      - name: Verify PDF render and exact QR destinations
        if: steps.mode.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p /tmp/estate-next-10-render
          pdftoppm -png -r 300 -singlefile "$ASSET_DIR/$PDF_NAME" /tmp/estate-next-10-render/final
          python3 - <<'PY_VERIFY_PDF'
          from pathlib import Path
          from PIL import Image, ImageStat
          from pypdf import PdfReader
          from pyzbar.pyzbar import decode
          import json

          asset = Path('assets/estate-next-10')
          reader = PdfReader(str(asset/'dpro-estate-operation-experience.pdf'))
          if len(reader.pages) != 1:
              raise SystemExit(f'ERROR: operation sheet must be one page, got {len(reader.pages)}')
          page = reader.pages[0]
          width = float(page.mediabox.width); height = float(page.mediabox.height)
          if not (height > width and 590 <= width <= 600 and 835 <= height <= 850):
              raise SystemExit(f'ERROR: PDF is not A4 portrait: {width} x {height}')

          rendered = Image.open('/tmp/estate-next-10-render/final.png').convert('RGB')
          if rendered.height <= rendered.width:
              raise SystemExit('ERROR: rendered PDF is not portrait.')
          if ImageStat.Stat(rendered).stddev[0] < 20:
              raise SystemExit('ERROR: rendered PDF appears blank.')

          decoded = {item.data.decode('utf-8') for item in decode(rendered)}
          expected = set(json.loads((asset/'qr-targets.json').read_text(encoding='utf-8')).values())
          if decoded != expected:
              raise SystemExit('ERROR: final PDF QR exact-match failed. missing=%r extra=%r' % (sorted(expected-decoded), sorted(decoded-expected)))

          screenshots = {}
          for path in sorted((asset/'screenshots').glob('*.png')):
              image = Image.open(path).convert('RGB')
              stat = ImageStat.Stat(image)
              if min(image.size) < 300 or max(stat.stddev) < 15:
                  raise SystemExit(f'ERROR: invalid screenshot {path}')
              screenshots[path.name] = {'width': image.width, 'height': image.height}

          result = {
              'pdf_page_count': 1,
              'pdf_size_points': [width,height],
              'a4_portrait': True,
              'render_verified': True,
              'qr_expected_count': len(expected),
              'qr_decoded_count': len(decoded),
              'qr_exact_match': True,
              'screenshots': screenshots,
          }
          (asset/'operation-sheet-verification.json').write_text(json.dumps(result,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          print(json.dumps(result,ensure_ascii=False,indent=2))
          PY_VERIFY_PDF

      - name: Run final system-check and public page verification
        if: steps.mode.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          code="$ADMIN_CODE_SECRET"
          if [ -z "$code" ]; then code='1234'; fi
          echo "::add-mask::$code"
          curl --fail --silent --show-error "$NEXT_API_BASE/api/health" -o /tmp/next-health.json
          curl --fail --silent --show-error "$LEGACY_API_BASE/api/health" -o /tmp/legacy-health.json
          curl --fail --silent --show-error -H "X-DPRO-Admin-Code: $code" -H "X-Admin-Code: $code" \
            "$NEXT_API_BASE/api/admin/system-check?shop_code=$SHOP_CODE&write_test=1" -o /tmp/system-check.json
          for page in index.html member.html property.html owner.html owner-ipad.html followup.html owner-settings.html system-check.html; do
            status="$(curl --silent --show-error -o /dev/null -w '%{http_code}' "$PAGE_BASE/$page?v=estate-next-10-${GITHUB_RUN_ID}")"
            echo "$page HTTP $status"
            case "$status" in 2??) ;; *) exit 1;; esac
          done
          python3 - <<'PY_FINAL_CHECK'
          from pathlib import Path
          import json
          health=json.loads(Path('/tmp/next-health.json').read_text())
          legacy=json.loads(Path('/tmp/legacy-health.json').read_text())
          check=json.loads(Path('/tmp/system-check.json').read_text())
          assert health.get('ok') is True, health
          diag=health.get('diagnostics',{})
          assert diag.get('legacy_transport') == 'service_binding', diag
          assert check.get('ok') is True, check
          assert (check.get('write_test') or {}).get('ok') is True, check.get('write_test')
          assert (check.get('member_security_test') or {}).get('ok') is True, check.get('member_security_test')
          assert (check.get('followup_test') or {}).get('ok') is True, check.get('followup_test')
          required={'estate_application_cases','estate_case_events','estate_vacancy_checks','estate_member_sessions','estate_member_auth_attempts','estate_member_revisit_requests','estate_followup_tasks','estate_property_proposals','estate_customer_exclusions'}
          tables={row.get('table') for row in check.get('tables',[]) if row.get('ok') is True}
          assert required <= tables, {'missing':sorted(required-tables)}
          result={'step':'ESTATE-NEXT-10','status':'FINAL-SYSTEM-CHECK-PASS','extension_health':health,'legacy_health':legacy,'system_check':check}
          Path('dpro-next/estate-next-10-final-system-check.json').write_text(json.dumps(result,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          PY_FINAL_CHECK

      - name: Record product site pending state and commit final assets
        if: steps.mode.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          completed_at="$(TZ=Asia/Tokyo date '+%Y-%m-%dT%H:%M:%S%:z')"
          cat > dpro-next/estate-next-10-preparation.yml <<EOF_PREP
          step: ESTATE-NEXT-10
          status: PRODUCT-SITE-PENDING
