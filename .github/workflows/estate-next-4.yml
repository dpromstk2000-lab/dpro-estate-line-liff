name: DPRO ESTATE NEXT-4 Persistent Cases

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/estate-next-4.yml
  workflow_dispatch:
    inputs:
      mode:
        description: prepare=配備準備 / verify=SQL・Worker適用後の完成確認
        required: true
        type: choice
        default: verify
        options:
          - prepare
          - verify

permissions:
  contents: write

concurrency:
  group: dpro-estate-next-4
  cancel-in-progress: false

jobs:
  estate-next-4:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: main
      WORKFLOW_PATH: .github/workflows/estate-next-4.yml
      STEP_BACKUP_TAG: dpro-estate-next-4-before-20260723
      NEXT_API_BASE: https://dpro-estate-next4-api.dpromstk2000.workers.dev
      LEGACY_API_BASE: https://dpro-estate-line-api.dpromstk2000.workers.dev
      SHOP_CODE: dpro_estate_demo
      EXPECTED_OWNER_BLOB: e2f17ae0cd91aad0d5de4a518a19970d6a542682
      EXPECTED_CONFIG_BLOB: 7d43390db5c735d2f300f3ec75cba9e3466e6b1c
      ADMIN_CODE_SECRET: ${{ secrets.DPRO_ESTATE_ADMIN_CODE }}

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve execution mode and verify previous STEP
        id: context
        shell: bash
        run: |
          set -Eeuo pipefail
          MODE="${{ inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="prepare"; fi
          case "$MODE" in prepare|verify) ;; *) echo "ERROR: invalid mode: $MODE" >&2; exit 1;; esac
          test -s dpro-next/estate-progress.yml || { echo "ERROR: progress ledger is missing." >&2; exit 1; }
          current_step="$(awk -F': ' '/^current_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
          next_step="$(awk -F': ' '/^next_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
          if [ "$MODE" = "prepare" ]; then
            case "$current_step" in ESTATE-NEXT-3-COMPLETE|ESTATE-NEXT-4-DEPLOY-PENDING) ;; *) echo "ERROR: expected ESTATE-NEXT-3-COMPLETE or pending, got $current_step" >&2; exit 1;; esac
            case "$next_step" in ESTATE-NEXT-4|ESTATE-NEXT-4-VERIFY) ;; *) echo "ERROR: unexpected next_step: $next_step" >&2; exit 1;; esac
          else
            test "$current_step" = "ESTATE-NEXT-4-DEPLOY-PENDING" || { echo "ERROR: prepare mode has not completed: $current_step" >&2; exit 1; }
            test "$next_step" = "ESTATE-NEXT-4-VERIFY" || { echo "ERROR: next_step is not verify: $next_step" >&2; exit 1; }
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "current_step=$current_step" >> "$GITHUB_OUTPUT"
          echo "Execution mode: $MODE"

      - name: Create or verify STEP backup tag
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          if git rev-parse "$STEP_BACKUP_TAG" >/dev/null 2>&1; then
            echo "Backup tag already exists: $STEP_BACKUP_TAG"
          else
            changed="$(git diff-tree --no-commit-id --name-only -r HEAD)"
            test "$changed" = "$WORKFLOW_PATH" || { echo "ERROR: workflow upload commit contains unexpected files:" >&2; echo "$changed" >&2; exit 1; }
            base_sha="$(git rev-parse HEAD^)"
            git tag -a "$STEP_BACKUP_TAG" "$base_sha" -m "DPRO ESTATE before NEXT-4 persistence extension"
            git push origin "$STEP_BACKUP_TAG"
          fi

      - name: Guard current application version
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          current_step="${{ steps.context.outputs.current_step }}"
          if [ "$current_step" = "ESTATE-NEXT-3-COMPLETE" ]; then
            test "$(git hash-object owner.html)" = "$EXPECTED_OWNER_BLOB" || { echo "ERROR: owner.html differs from verified NEXT-3." >&2; exit 1; }
            test "$(git hash-object config.js)" = "$EXPECTED_CONFIG_BLOB" || { echo "ERROR: config.js differs from verified NEXT-3." >&2; exit 1; }
          else
            grep -q 'DPRO ESTATE NEXT-4' owner.html
            grep -q "version: 'ESTATE-NEXT-4'" config.js
          fi

      - name: Install NEXT-4 UI and deployment package
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import base64
          files = {
              'owner.html': '',
              'config.js': '',
              'extension.js': '',
              'deploy/estate-next-4/worker.js': '',
              'deploy/estate-next-4/worker.js.txt': '',
              'deploy/estate-next-4/wrangler.toml': '',
              'deploy/estate-next-4/sql/estate-next-4.sql': '',
              'deploy/estate-next-4/sql/estate-next-4.sql.txt': '',
              'deploy/estate-next-4/sql/estate-next-4-rollback.sql': '',
              'deploy/estate-next-4/sql/estate-next-4-rollback.sql.txt': '',
              'deploy/estate-next-4/sql/estate-next-4-verify.sql': '',
              'deploy/estate-next-4/sql/estate-next-4-verify.sql.txt': '',
              'deploy/estate-next-4/ESTATE-NEXT-4-WORKER.zip': '',
              'deploy/estate-next-4/ESTATE-NEXT-4-SQL.zip': '',
              'deploy/estate-next-4/DEPLOY-ORDER.txt': '',
          }
          for name, value in files.items():
              path = Path(name)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_bytes(base64.b64decode(value))
          print(f'installed {len(files)} files')

          PY

      - name: Validate UI, Worker, SQL and ZIP packages
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          node --check config.js
          node --check extension.js
          cp deploy/estate-next-4/worker.js /tmp/estate-next4-worker.mjs
          node --check /tmp/estate-next4-worker.mjs
          python3 - <<'PY'
          from html.parser import HTMLParser
          from collections import Counter
          from pathlib import Path
          import re, subprocess, tempfile
          class Parser(HTMLParser):
              def __init__(self): super().__init__(convert_charrefs=True); self.ids=[]
              def handle_starttag(self, tag, attrs):
                  for key, value in attrs:
                      if key.lower() == 'id' and value: self.ids.append(value)
          text=Path('owner.html').read_text(encoding='utf-8')
          parser=Parser(); parser.feed(text); parser.close()
          duplicates=[name for name,count in Counter(parser.ids).items() if count>1]
          if duplicates: raise SystemExit(f'duplicate ids: {duplicates}')
          scripts=re.findall(r'<script\b[^>]*>(.*?)</script\s*>', text, re.I|re.S)
          for index, script in enumerate(scripts, 1):
              if not script.strip(): continue
              with tempfile.NamedTemporaryFile('w',suffix='.js',delete=False,encoding='utf-8') as f:
                  f.write(script); name=f.name
              result=subprocess.run(['node','--check',name],capture_output=True,text=True)
              Path(name).unlink(missing_ok=True)
              if result.returncode: raise SystemExit(result.stderr)
          required=['extension.js?v=estate-next-4','caseDialog','vacancyDialog','loadPersistentCases','saveCaseDialog','saveVacancyDialog','nextApiBase']
          missing=[item for item in required if item not in text and item not in Path('config.js').read_text()]
          if missing: raise SystemExit(f'missing NEXT-4 features: {missing}')
          print('owner HTML/JS/ID checks PASS')
          PY
          grep -q 'create table if not exists public.estate_application_cases' deploy/estate-next-4/sql/estate-next-4.sql
          grep -q 'create table if not exists public.estate_vacancy_checks' deploy/estate-next-4/sql/estate-next-4.sql
          grep -q 'enable row level security' deploy/estate-next-4/sql/estate-next-4.sql
          grep -q 'LEGACY_API_BASE' deploy/estate-next-4/worker.js
          grep -q 'SUPABASE_SERVICE_ROLE_KEY' deploy/estate-next-4/worker.js
          unzip -t deploy/estate-next-4/ESTATE-NEXT-4-WORKER.zip >/dev/null
          unzip -t deploy/estate-next-4/ESTATE-NEXT-4-SQL.zip >/dev/null
          ! grep -R -E 'system-check\?admin_code=|health\?admin_code=' owner.html config.js extension.js
          ! grep -R -E "SUPABASE_SERVICE_ROLE_KEY[[:space:]]*=[[:space:]]*[\'\"][A-Za-z0-9]" deploy/estate-next-4 || true

      - name: Run extension Worker mock tests
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          cat > /tmp/test-estate-next4-worker.mjs.b64 <<'EOF'
          
          EOF
          base64 -d /tmp/test-estate-next4-worker.mjs.b64 > /tmp/test-estate-next4-worker.mjs
          cp deploy/estate-next-4/worker.js /tmp/estate-next4-worker.mjs
          node /tmp/test-estate-next4-worker.mjs

      - name: Confirm unchanged legacy files
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          for file in index.html property.html member.html owner-ipad.html owner-settings.html system-check.html reservation-test.html domain.js; do
            before="$(git show "$STEP_BACKUP_TAG:$file" | sha256sum | awk '{print $1}')"
            after="$(sha256sum "$file" | awk '{print $1}')"
            test "$before" = "$after" || { echo "ERROR: unexpected change: $file" >&2; exit 1; }
          done

      - name: Record deployment pending state
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          completed_at="$(TZ=Asia/Tokyo date --iso-8601=seconds)"
          cat > dpro-next/estate-progress.yml <<EOF
          system: DPRO 不動産・賃貸内見 LINE
          repository: $GITHUB_REPOSITORY
          previous_step: ESTATE-NEXT-3-COMPLETE
          current_step: ESTATE-NEXT-4-DEPLOY-PENDING
          next_step: ESTATE-NEXT-4-VERIFY
          baseline_tag: dpro-estate-next-baseline-20260723
          step_backup_tag: $STEP_BACKUP_TAG
          prepared_at_jst: "$completed_at"
          modified_files:
            - owner.html
            - config.js
            - extension.js
          deployment_files:
            - deploy/estate-next-4/worker.js
            - deploy/estate-next-4/sql/estate-next-4.sql
          extension_worker_name: dpro-estate-next4-api
          extension_worker_url: $NEXT_API_BASE
          legacy_worker_changed: false
          extension_worker_prepared: true
          supabase_migration_prepared: true
          worker_changed: false
          supabase_changed: false
          api_changed: false
          existing_features_preserved: true
          html_syntax_check: PASS
          javascript_syntax_check: PASS
          html_id_duplicate_check: PASS
          worker_mock_test: PASS
          manual_sql_required: true
          manual_worker_deploy_required: true
          EOF
          cat > dpro-next/estate-next-4-deployment.yml <<EOF
          system: DPRO 不動産・賃貸内見 LINE
          step: ESTATE-NEXT-4
          status: DEPLOY-PENDING
          architecture: extension-worker
          reason: 既存Worker原本がリポジトリにないため、既存APIを変更せず新機能専用Workerを追加
          legacy_api: $LEGACY_API_BASE
          extension_api: $NEXT_API_BASE
          extension_worker_name: dpro-estate-next4-api
          legacy_worker_changed: false
          required_secrets:
            - SUPABASE_URL
            - SUPABASE_SERVICE_ROLE_KEY
          required_variables:
            LEGACY_API_BASE: $LEGACY_API_BASE
            ALLOWED_ORIGIN: https://dpromstk2000-lab.github.io
          sql_file: deploy/estate-next-4/sql/estate-next-4.sql
          worker_file: deploy/estate-next-4/worker.js
          verification: GitHub Actionsをmode=verifyで再実行
          EOF
          cat >> dpro-next/estate-risk-report.txt <<'EOF'

          [ESTATE-NEXT-4]
          - 既存Worker原本がGitHubにないため、既存Workerは変更せず新機能専用の拡張Workerを追加する。
          - SQLまたは拡張Workerの適用前でも、owner.htmlは既存データ統合表示へ自動フォールバックする。
          - 既存の予約・顧客・物件・追客APIは従来Workerを継続利用するため、日常操作の速度と安定性への影響を避ける。
          - 申込案件・担当・期限・見送り理由・空室確認履歴だけを拡張Workerへ保存する。
          - 必要書類チェックはESTATE-NEXT-5で追加する。
          EOF

      - name: Commit preparation files and keep workflow for verification
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add owner.html config.js extension.js deploy/estate-next-4 dpro-next
          mapfile -t staged < <(git diff --cached --name-only)
          test "${#staged[@]}" -gt 0 || { echo "No preparation changes to commit."; exit 0; }
          for file in "${staged[@]}"; do
            case "$file" in owner.html|config.js|extension.js|deploy/estate-next-4/*|dpro-next/*) ;; *) echo "ERROR: unexpected staged file: $file" >&2; exit 1;; esac
          done
          git commit -m "feat(estate): prepare ESTATE-NEXT-4 persistent cases"
          git push origin "HEAD:$TARGET_BRANCH"

      - name: Publish preparation summary
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          # ESTATE-NEXT-4 配備準備完了

          | 項目 | 結果 |
          |---|---|
          | 既存オーナー画面 | 維持＋永続保存UI追加 |
          | 既存Worker | 変更なし |
          | 拡張Worker | dpro-estate-next4-api を準備 |
          | Supabase SQL | 準備済み・手動実行待ち |
          | フォールバック | 拡張API未接続でも既存案件表示を維持 |
          | Worker mock test | PASS |
          | 現在状態 | ESTATE-NEXT-4-DEPLOY-PENDING |

          次に `deploy/estate-next-4/DEPLOY-ORDER.txt` の順でSQLとWorkerを適用し、このWorkflowを **Run workflow → mode=verify** で実行してください。
          EOF

      - name: Verify deployed extension Worker and Supabase write path
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          set -Eeuo pipefail
          code="$ADMIN_CODE_SECRET"
          if [ -z "$code" ]; then code="1234"; fi
          curl --fail --silent --show-error --retry 4 --retry-delay 3 "$NEXT_API_BASE/api/health" -o /tmp/next4-health.json
          curl --fail --silent --show-error --retry 4 --retry-delay 3             -H "X-DPRO-Admin-Code: $code" -H "X-Admin-Code: $code"             "$NEXT_API_BASE/api/admin/system-check?shop_code=$SHOP_CODE&write_test=1" -o /tmp/next4-check.json
          curl --fail --silent --show-error --retry 4 --retry-delay 3 "$LEGACY_API_BASE/api/health" -o /tmp/legacy-health.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          health=json.loads(Path('/tmp/next4-health.json').read_text())
          check=json.loads(Path('/tmp/next4-check.json').read_text())
          legacy=json.loads(Path('/tmp/legacy-health.json').read_text())
          assert health.get('ok') is True, health
          assert health.get('version') == 'ESTATE-NEXT-4-EXTENSION-20260723', health
          assert check.get('ok') is True, check
          tables={item.get('table'):item.get('ok') for item in check.get('tables',[])}
          expected=['estate_application_cases','estate_case_events','estate_vacancy_checks']
          assert all(tables.get(name) is True for name in expected), tables
          assert check.get('write_test',{}).get('ok') is True, check
          assert legacy.get('ok') is True, legacy
          safe={
            'extension_health':{'ok':health.get('ok'),'service':health.get('service'),'version':health.get('version'),'supabase_url_set':health.get('supabase_url_set'),'supabase_service_key_set':health.get('supabase_service_key_set')},
            'system_check':{'ok':check.get('ok'),'tables':check.get('tables'),'write_test':check.get('write_test')},
            'legacy_health':{'ok':legacy.get('ok'),'service':legacy.get('service'),'version':legacy.get('version')},
          }
          Path('dpro-next/estate-next-4-live-verification.json').write_text(json.dumps(safe,ensure_ascii=False,indent=2)+'\n')
          print('NEXT-4 live verification PASS')
          PY

      - name: Verify published owner page
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          set -Eeuo pipefail
          curl --fail --silent --show-error --retry 6 --retry-delay 5             "https://dpromstk2000-lab.github.io/dpro-estate-line-liff/owner.html?v=estate-next-4-verify-${GITHUB_RUN_ID}" -o /tmp/owner-live.html
          grep -q 'extension.js?v=estate-next-4' /tmp/owner-live.html
          grep -q '案件を保存・更新' /tmp/owner-live.html

      - name: Record ESTATE-NEXT-4 completion
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          set -Eeuo pipefail
          completed_at="$(TZ=Asia/Tokyo date --iso-8601=seconds)"
          cat > dpro-next/estate-progress.yml <<EOF
          system: DPRO 不動産・賃貸内見 LINE
          repository: $GITHUB_REPOSITORY
          previous_step: ESTATE-NEXT-4-DEPLOY-PENDING
          current_step: ESTATE-NEXT-4-COMPLETE
          next_step: ESTATE-NEXT-5
          baseline_tag: dpro-estate-next-baseline-20260723
          step_backup_tag: $STEP_BACKUP_TAG
          completed_at_jst: "$completed_at"
          modified_files:
            - owner.html
            - config.js
            - extension.js
          extension_worker_name: dpro-estate-next4-api
          extension_worker_url: $NEXT_API_BASE
          legacy_worker_changed: false
          extension_worker_added: true
          worker_changed: true
          supabase_changed: true
          api_changed: true
          application_cases_persistent: true
          assigned_staff_persistent: true
          next_action_due_persistent: true
          lost_reason_persistent: true
          viewing_memo_persistent: true
          vacancy_history_persistent: true
          required_documents_deferred_to_next5: true
          existing_features_preserved: true
          live_health_check: PASS
          live_table_check: PASS
          live_write_test: PASS
          legacy_health_check: PASS
          published_owner_check: PASS
          EOF
          python3 - <<'PY'
          from pathlib import Path
          path=Path('dpro-next/estate-next-4-deployment.yml')
          text=path.read_text()
          text=text.replace('status: DEPLOY-PENDING','status: COMPLETE')
          text += 'live_verification: PASS\nlegacy_worker_health: PASS\nnext_step: ESTATE-NEXT-5\n'
          path.write_text(text)
          PY

      - name: Delete workflow and commit verified completion
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$WORKFLOW_PATH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dpro-next "$WORKFLOW_PATH"
          mapfile -t staged < <(git diff --cached --name-only)
          test "${#staged[@]}" -gt 0 || { echo "ERROR: no completion files staged." >&2; exit 1; }
          for file in "${staged[@]}"; do
            case "$file" in dpro-next/*|.github/workflows/estate-next-4.yml) ;; *) echo "ERROR: unexpected completion file: $file" >&2; exit 1;; esac
          done
          git commit -m "feat(estate): complete ESTATE-NEXT-4 persistence"
          git push origin "HEAD:$TARGET_BRANCH"

      - name: Publish completion summary
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          set -Eeuo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          # ESTATE-NEXT-4 COMPLETE

          | 項目 | 結果 |
          |---|---|
          | 拡張Worker health | PASS |
          | Supabase 3テーブル | PASS |
          | 書込・削除セルフテスト | PASS |
          | 既存Worker health | PASS |
          | 公開owner.html | PASS |
          | 次STEP | ESTATE-NEXT-5 |

          実行YML自身を削除し、完成台帳を保存しました。
          EOF
