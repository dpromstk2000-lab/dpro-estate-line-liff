name: DPRO ESTATE NEXT-5 Application Operations

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/estate-next-5.yml
  workflow_dispatch:
    inputs:
      mode:
        description: prepare=配備準備 / verify=SQL・Worker適用後の完成確認
        required: true
        type: choice
        default: verify
        options:
          - prepare
          - verify

permissions:
  contents: write

concurrency:
  group: dpro-estate-next-5
  cancel-in-progress: false

jobs:
  estate-next-5:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TARGET_BRANCH: main
      WORKFLOW_PATH: .github/workflows/estate-next-5.yml
      STEP_BACKUP_TAG: dpro-estate-next-5-before-20260724
      NEXT_API_BASE: https://dpro-estate-next4-api.dpromstk2000.workers.dev
      LEGACY_API_BASE: https://dpro-estate-line-api.dpromstk2000.workers.dev
      SHOP_CODE: dpro_estate_demo
      EXPECTED_OWNER_BLOB: 9a1b61c99af5e02bef4a2e183c66bd980c40f682
      EXPECTED_EXTENSION_BLOB: ab01eb7e23654fddf4bea41954a42ccf9bf6859b
      EXPECTED_CONFIG_BLOB: 8e60be7d422f9365e10b16d131f71deb7179d2d9
      EXPECTED_WORKER_BLOB: 5a6e2eb7d59db9d235ac21333ad230ee255f2b8f
      ADMIN_CODE_SECRET: ${{ secrets.DPRO_ESTATE_ADMIN_CODE }}

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve execution mode and verify previous STEP
        id: context
        shell: bash
        run: |
          set -Eeuo pipefail
          MODE="${{ inputs.mode }}"
          if [ -z "$MODE" ]; then MODE="prepare"; fi
          case "$MODE" in prepare|verify) ;; *) echo "ERROR: invalid mode: $MODE" >&2; exit 1;; esac
          test -s dpro-next/estate-progress.yml || { echo "ERROR: progress ledger is missing." >&2; exit 1; }
          current_step="$(awk -F': ' '/^current_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
          next_step="$(awk -F': ' '/^next_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
          if [ "$MODE" = "prepare" ]; then
            case "$current_step" in ESTATE-NEXT-4-COMPLETE|ESTATE-NEXT-5-DEPLOY-PENDING) ;; *) echo "ERROR: expected ESTATE-NEXT-4-COMPLETE or pending, got $current_step" >&2; exit 1;; esac
            case "$next_step" in ESTATE-NEXT-5|ESTATE-NEXT-5-VERIFY) ;; *) echo "ERROR: unexpected next_step: $next_step" >&2; exit 1;; esac
          else
            test "$current_step" = "ESTATE-NEXT-5-DEPLOY-PENDING" || { echo "ERROR: prepare mode has not completed: $current_step" >&2; exit 1; }
            test "$next_step" = "ESTATE-NEXT-5-VERIFY" || { echo "ERROR: next_step is not verify: $next_step" >&2; exit 1; }
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "current_step=$current_step" >> "$GITHUB_OUTPUT"

      - name: Create or verify STEP backup tag
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$STEP_BACKUP_TAG" >/dev/null 2>&1; then
            echo "Backup tag already exists: $STEP_BACKUP_TAG"
          else
            base_sha="$(git rev-parse HEAD)"
            while true; do
              changed="$(git diff-tree --no-commit-id --name-only -r "$base_sha" | sed '/^$/d')"
              if [ "$changed" = "$WORKFLOW_PATH" ]; then
                base_sha="$(git rev-parse "${base_sha}^")"
              else
                break
              fi
            done
            git tag -a "$STEP_BACKUP_TAG" "$base_sha" -m "DPRO ESTATE before NEXT-5 application operations"
            git push origin "$STEP_BACKUP_TAG"
          fi

      - name: Guard current application version
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          current_step="${{ steps.context.outputs.current_step }}"
          if [ "$current_step" = "ESTATE-NEXT-4-COMPLETE" ]; then
            test "$(git hash-object owner.html)" = "$EXPECTED_OWNER_BLOB" || { echo "ERROR: owner.html differs from verified NEXT-4." >&2; exit 1; }
            test "$(git hash-object extension.js)" = "$EXPECTED_EXTENSION_BLOB" || { echo "ERROR: extension.js differs from verified NEXT-4." >&2; exit 1; }
            test "$(git hash-object config.js)" = "$EXPECTED_CONFIG_BLOB" || { echo "ERROR: config.js differs from verified NEXT-4." >&2; exit 1; }
            test "$(git hash-object deploy/estate-next-4/worker.js)" = "$EXPECTED_WORKER_BLOB" || { echo "ERROR: protected NEXT-4 Worker source differs." >&2; exit 1; }
          else
            grep -q 'DPRO ESTATE NEXT-5' owner.html
            grep -q "version: 'ESTATE-NEXT-5'" config.js
            grep -q "version: 'ESTATE-NEXT-5'" extension.js
          fi

      - name: Install NEXT-5 UI and deployment package
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p deploy/estate-next-5/sql
          python3 - <<'PY_INSTALL'
          from pathlib import Path
          import base64
          files = {
            'owner.html': '',
            'extension.js': '',
            'config.js': '',
            'deploy/estate-next-5/worker.js': '',
            'deploy/estate-next-5/wrangler.toml': '',
            'deploy/estate-next-5/DEPLOY-ORDER.txt': '',
            'deploy/estate-next-5/sql/estate-next-5.sql': '',
            'deploy/estate-next-5/sql/estate-next-5-rollback.sql': '',
            'deploy/estate-next-5/sql/estate-next-5-verify.sql': '',
          }
          for name, encoded in files.items():
            path=Path(name); path.parent.mkdir(parents=True,exist_ok=True); path.write_bytes(base64.b64decode(encoded))
          Path('/tmp/next5-mock.mjs').write_bytes(base64.b64decode(''))
          PY_INSTALL
          python3 - <<'PY_ZIP'
          from pathlib import Path
          from zipfile import ZipFile, ZIP_DEFLATED
          root=Path('deploy/estate-next-5')
          with ZipFile(root/'ESTATE-NEXT-5-WORKER.zip','w',ZIP_DEFLATED) as z:
            z.write(root/'worker.js','worker.js')
          with ZipFile(root/'ESTATE-NEXT-5-SQL.zip','w',ZIP_DEFLATED) as z:
            for name in ['estate-next-5.sql','estate-next-5-rollback.sql','estate-next-5-verify.sql']:
              z.write(root/'sql'/name,name)
          PY_ZIP

      - name: Validate UI Worker SQL and packages
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          ruby -e "require 'yaml'; Psych.parse_file('$WORKFLOW_PATH'); puts 'YML PASS'"
          node --check config.js
          node --check extension.js
          node --check deploy/estate-next-5/worker.js
          python3 - <<'PY_HTML'
          from html.parser import HTMLParser
          from pathlib import Path
          from collections import Counter
          class P(HTMLParser):
            def __init__(self): super().__init__(); self.ids=[]; self.scripts=[]; self.ins=False; self.buf=[]
            def handle_starttag(self,t,a):
              d=dict(a)
              if 'id' in d:self.ids.append(d['id'])
              if t=='script' and 'src' not in d:self.ins=True;self.buf=[]
            def handle_data(self,d):
              if self.ins:self.buf.append(d)
            def handle_endtag(self,t):
              if t=='script' and self.ins:self.scripts.append(''.join(self.buf));self.ins=False
          p=P();p.feed(Path('owner.html').read_text())
          dup=[k for k,v in Counter(p.ids).items() if v>1]
          if dup: raise SystemExit(f'duplicate HTML IDs: {dup}')
          Path('/tmp/owner-inline.js').write_text('\n'.join(p.scripts))
          required=['caseApplicationIntent','caseInitialCostStatus','caseInitialCostTotalLabel','caseDocumentList','applicationMessageDialog','applicationMessagePreview']
          missing=[x for x in required if x not in p.ids]
          if missing: raise SystemExit(f'missing NEXT-5 IDs: {missing}')
          print('HTML PASS')
          PY_HTML
          node --check /tmp/owner-inline.js
          cp deploy/estate-next-5/worker.js /tmp/next5-worker.mjs
          node /tmp/next5-mock.mjs
          python3 - <<'PY_FILES'
          from pathlib import Path
          from zipfile import ZipFile
          owner=Path('owner.html').read_text(); worker=Path('deploy/estate-next-5/worker.js').read_text(); sql=Path('deploy/estate-next-5/sql/estate-next-5.sql').read_text()
          checks={
            'application intent':'caseApplicationIntent' in owner and 'application_intent' in worker and 'application_intent' in sql,
            'initial cost':'caseInitialCostTotalLabel' in owner and 'initial_cost_breakdown' in worker and 'initial_cost_breakdown' in sql,
            'documents':'caseDocumentList' in owner and 'required_documents' in worker and 'required_documents' in sql,
            'individual line':'applicationMessageDialog' in owner and 'copyApplicationMessage' in owner,
            'double operation':'X-Idempotency-Key' in worker and 'last_operation_id' in sql and 'operation_id' in sql,
            'no auto line':'auto_send' not in owner and 'broadcast' not in owner.lower(),
            'no payment':'stripe' not in owner.lower() and 'payment_intent' not in worker.lower(),
            'no e-contract':'docusign' not in owner.lower() and 'electronic_signature' not in worker.lower(),
          }
          failed=[k for k,v in checks.items() if not v]
          if failed: raise SystemExit(f'feature checks failed: {failed}')
          with ZipFile('deploy/estate-next-5/ESTATE-NEXT-5-WORKER.zip') as z:
            if z.namelist()!=['worker.js']: raise SystemExit('Worker ZIP must contain worker.js only')
          with ZipFile('deploy/estate-next-5/ESTATE-NEXT-5-SQL.zip') as z:
            expected={'estate-next-5.sql','estate-next-5-rollback.sql','estate-next-5-verify.sql'}
            if set(z.namelist())!=expected: raise SystemExit('SQL ZIP contents mismatch')
          print('FEATURE AND ZIP PASS')
          PY_FILES

      - name: Confirm protected files and record pending state
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          allowed='^(owner\.html|extension\.js|config\.js|deploy/estate-next-5/.*|dpro-next/.*)$'
          changed="$(git status --short | awk '{print $2}')"
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "$file" | grep -Eq "$allowed" || { echo "ERROR: unexpected changed file: $file" >&2; exit 1; }
          done <<< "$changed"
          prepared_at="$(TZ=Asia/Tokyo date --iso-8601=seconds)"
          cat > dpro-next/estate-progress.yml <<EOF
          system: DPRO 不動産・賃貸内見 LINE
          repository: $GITHUB_REPOSITORY
          previous_step: ESTATE-NEXT-4-COMPLETE
          current_step: ESTATE-NEXT-5-DEPLOY-PENDING
          next_step: ESTATE-NEXT-5-VERIFY
          baseline_tag: dpro-estate-next-baseline-20260723
          step_backup_tag: $STEP_BACKUP_TAG
          prepared_at_jst: "$prepared_at"
          modified_files:
            - owner.html
            - extension.js
            - config.js
          extension_worker_name: dpro-estate-next4-api
          extension_worker_url: $NEXT_API_BASE
          worker_update_prepared: true
          supabase_migration_prepared: true
          application_intent_ui: true
          initial_cost_ui: true
          required_documents_ui: true
          individual_line_copy_ui: true
          duplicate_operation_guard_prepared: true
          electronic_contract_added: false
          online_payment_added: false
          bulk_line_auto_send_added: false
          worker_changed: false
          supabase_changed: false
          api_changed: false
          existing_features_preserved: true
          manual_sql_required: true
          manual_worker_deploy_required: true
          EOF
          cat > dpro-next/estate-next-5-deployment.yml <<EOF
          system: DPRO 不動産・賃貸内見 LINE
          step: ESTATE-NEXT-5
          status: DEPLOY-PENDING
          worker_name: dpro-estate-next4-api
          worker_url: $NEXT_API_BASE
          sql_file: deploy/estate-next-5/sql/estate-next-5.sql
          worker_file: deploy/estate-next-5/worker.js
          application_intent: prepared
          initial_cost_estimate: prepared
          required_documents_checklist: prepared
          individual_line_copy: prepared
          idempotency_guard: prepared
          next_step: ESTATE-NEXT-5-VERIFY
          EOF
          cat >> dpro-next/estate-feature-ledger.yml <<'EOF'

          estate_next_5:
            status: DEPLOY-PENDING
            application_intent: prepared
            initial_cost_estimate: prepared
            required_documents_checklist: prepared
            individual_line_copy: prepared
            duplicate_operation_guard: prepared
            electronic_contract: not_added
            online_payment: not_added
            bulk_line_auto_send: not_added
          EOF

      - name: Commit preparation files and keep workflow for verification
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add owner.html extension.js config.js deploy/estate-next-5 dpro-next
          git commit -m "feat(estate): prepare ESTATE-NEXT-5 application operations"
          git push origin "HEAD:$TARGET_BRANCH"

      - name: Publish preparation summary
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          # ESTATE-NEXT-5 配備準備完了

          | 項目 | 結果 |
          |---|---|
          | 申込意思 | UI・API・SQL準備済み |
          | 初期費用概算 | 内訳・合計・状態管理を準備 |
          | 必要書類 | 状態チェックを準備。書類本体は保存しない |
          | LINE | 個別確認後コピーのみ |
          | 二重操作防止 | UIロック・操作ID・同時更新検出を準備 |
          | 電子契約・決済 | 追加なし |
          | 現在状態 | ESTATE-NEXT-5-DEPLOY-PENDING |

          `deploy/estate-next-5/DEPLOY-ORDER.txt` の順でSQLとWorkerを適用し、mode=verifyを実行してください。
          EOF

      - name: Verify deployed NEXT-5 Worker and Supabase write path
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          set -Eeuo pipefail
          curl --silent --show-error --retry 4 --retry-delay 3 "$NEXT_API_BASE/api/health" -o /tmp/next5-health.json
          python3 - <<'PY_HEALTH'
          import json
          from pathlib import Path
          data=json.loads(Path('/tmp/next5-health.json').read_text())
          assert data.get('ok') is True, data
          assert data.get('version') == 'ESTATE-NEXT-5-EXTENSION-20260724', data
          assert data.get('admin_code_secret_set') is True, data
          assert data.get('idempotency_guard') is True, data
          PY_HEALTH
          candidates=()
          if [ -n "$ADMIN_CODE_SECRET" ]; then candidates+=("$ADMIN_CODE_SECRET"); fi
          if [ "$ADMIN_CODE_SECRET" != "1234" ]; then candidates+=("1234"); fi
          valid_code=''
          for candidate in "${candidates[@]}"; do
            [ -z "$candidate" ] && continue
            echo "::add-mask::$candidate"
            legacy_status="$(curl --silent --show-error -o /tmp/legacy-login.json -w '%{http_code}' -X POST \
              -H 'Content-Type: application/json' -H "X-DPRO-Admin-Code: $candidate" -H "X-Admin-Code: $candidate" \
              --data "{\"code\":\"$candidate\",\"admin_code\":\"$candidate\",\"shop_code\":\"$SHOP_CODE\"}" \
              "$LEGACY_API_BASE/api/admin/login")"
            [ "$legacy_status" = '200' ] || continue
            next_status="$(curl --silent --show-error -o /tmp/next5-check.json -w '%{http_code}' \
              -H "X-DPRO-Admin-Code: $candidate" -H "X-Admin-Code: $candidate" \
              "$NEXT_API_BASE/api/admin/system-check?shop_code=$SHOP_CODE&write_test=1")"
            if [ "$next_status" = '200' ]; then valid_code="$candidate"; break; fi
          done
          test -n "$valid_code" || { echo 'ERROR: GitHub Secret DPRO_ESTATE_ADMIN_CODEを現在の管理コードへ更新してください。' >&2; cat /tmp/next5-check.json 2>/dev/null || true; exit 1; }
          curl --fail --silent --show-error --retry 4 --retry-delay 3 "$LEGACY_API_BASE/api/health" -o /tmp/legacy-health.json
          python3 - <<'PY_VERIFY'
          import json
          from pathlib import Path
          health=json.loads(Path('/tmp/next5-health.json').read_text())
          check=json.loads(Path('/tmp/next5-check.json').read_text())
          legacy=json.loads(Path('/tmp/legacy-health.json').read_text())
          assert check.get('ok') is True, check
          tables={x.get('table'):x.get('ok') for x in check.get('tables',[])}
          assert all(tables.get(x) is True for x in ['estate_application_cases','estate_case_events','estate_vacancy_checks']), tables
          features=check.get('features',{})
          assert all(features.get(x) is True for x in ['application_intent','initial_cost','required_documents','idempotency_guard','individual_line_copy']), features
          write=check.get('write_test',{})
          assert write.get('ok') is True, write
          assert write.get('duplicate_case_guard') is True, write
          assert write.get('duplicate_vacancy_guard') is True, write
          assert write.get('event_count') == 2, write
          assert legacy.get('ok') is True, legacy
          safe={'extension_health':health,'system_check':check,'legacy_health':{'ok':legacy.get('ok'),'service':legacy.get('service'),'version':legacy.get('version')}}
          Path('dpro-next/estate-next-5-live-verification.json').write_text(json.dumps(safe,ensure_ascii=False,indent=2)+'\n')
          print('NEXT-5 LIVE VERIFICATION PASS')
          PY_VERIFY

      - name: Verify published owner page
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          set -Eeuo pipefail
          curl --fail --silent --show-error --retry 8 --retry-delay 5 \
            "https://dpromstk2000-lab.github.io/dpro-estate-line-liff/owner.html?v=estate-next-5-${GITHUB_RUN_ID}" \
            -o /tmp/owner-live.html
          grep -q 'extension.js?v=estate-next-5' /tmp/owner-live.html
          grep -q 'caseApplicationIntent' /tmp/owner-live.html
          grep -q 'caseInitialCostTotalLabel' /tmp/owner-live.html
          grep -q 'caseDocumentList' /tmp/owner-live.html
          grep -q 'applicationMessageDialog' /tmp/owner-live.html

      - name: Record ESTATE-NEXT-5 completion
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          set -Eeuo pipefail
          completed_at="$(TZ=Asia/Tokyo date --iso-8601=seconds)"
          cat > dpro-next/estate-progress.yml <<EOF
          system: DPRO 不動産・賃貸内見 LINE
          repository: $GITHUB_REPOSITORY
          previous_step: ESTATE-NEXT-5-DEPLOY-PENDING
          current_step: ESTATE-NEXT-5-COMPLETE
          next_step: ESTATE-NEXT-6
          baseline_tag: dpro-estate-next-baseline-20260723
          step_backup_tag: $STEP_BACKUP_TAG
          completed_at_jst: "$completed_at"
          modified_files:
            - owner.html
            - extension.js
            - config.js
          extension_worker_name: dpro-estate-next4-api
          extension_worker_url: $NEXT_API_BASE
          worker_changed: true
          supabase_changed: true
          api_changed: true
          application_intent_persistent: true
          initial_cost_estimate_persistent: true
          required_documents_checklist_persistent: true
          documents_binary_storage_added: false
          individual_line_copy_added: true
          bulk_line_auto_send_added: false
          duplicate_operation_guard: true
          optimistic_version_guard: true
          electronic_contract_added: false
          online_payment_added: false
          existing_features_preserved: true
          live_health_check: PASS
          live_schema_check: PASS
          live_write_test: PASS
          live_duplicate_guard_test: PASS
          legacy_health_check: PASS
          published_owner_check: PASS
          EOF
          python3 - <<'PY_LEDGER'
          from pathlib import Path
          path=Path('dpro-next/estate-next-5-deployment.yml')
          text=path.read_text().replace('status: DEPLOY-PENDING','status: COMPLETE').replace('next_step: ESTATE-NEXT-5-VERIFY','next_step: ESTATE-NEXT-6')
          text += 'live_verification: PASS\nduplicate_operation_test: PASS\n'
          path.write_text(text)
          ledger=Path('dpro-next/estate-feature-ledger.yml')
          text=ledger.read_text().replace('estate_next_5:\n            status: DEPLOY-PENDING','estate_next_5:\n            status: COMPLETE')
          ledger.write_text(text)
          PY_LEDGER

      - name: Delete workflow and commit verified completion
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$WORKFLOW_PATH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dpro-next "$WORKFLOW_PATH"
          mapfile -t staged < <(git diff --cached --name-only)
          test "${#staged[@]}" -gt 0 || { echo 'ERROR: no completion files staged.' >&2; exit 1; }
          for file in "${staged[@]}"; do
            case "$file" in dpro-next/*|.github/workflows/estate-next-5.yml) ;; *) echo "ERROR: unexpected completion file: $file" >&2; exit 1;; esac
          done
          git commit -m "feat(estate): complete ESTATE-NEXT-5 application operations"
          git push origin "HEAD:$TARGET_BRANCH"

      - name: Publish completion summary
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          # ESTATE-NEXT-5 COMPLETE

          | 項目 | 結果 |
          |---|---|
          | 申込意思 | PASS |
          | 初期費用概算 | PASS |
          | 必要書類チェック | PASS |
          | 個別LINE文面コピー | PASS |
          | 二重操作防止 | PASS |
          | 既存Worker・既存機能 | PASS |
          | 次STEP | ESTATE-NEXT-6 |

          実行YML自身を削除し、完成台帳を保存しました。
          EOF
