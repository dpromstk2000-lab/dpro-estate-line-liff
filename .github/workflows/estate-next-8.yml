name: DPRO ESTATE NEXT-8 R2 Follow-up Verification
'on':
  push:
    branches:
    - main
    paths:
    - .github/workflows/estate-next-8.yml
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: dpro-estate-next-8
  cancel-in-progress: false
jobs:
  estate-next-8-r2:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TARGET_BRANCH: main
      WORKFLOW_PATH: .github/workflows/estate-next-8.yml
      STEP_BACKUP_TAG: dpro-estate-next-8-before-20260724
      NEXT_API_BASE: https://dpro-estate-next4-api.dpromstk2000.workers.dev
      LEGACY_API_BASE: https://dpro-estate-line-api.dpromstk2000.workers.dev
      SHOP_CODE: dpro_estate_demo
      ADMIN_CODE_SECRET: ${{ secrets.DPRO_ESTATE_ADMIN_CODE }}
      EXPECTED_OWNER_BLOB: 4b7e30cbc745f99a7ed5c0f114fc444caa6b3559
      EXPECTED_CONFIG_BLOB: 20517f6e6709b61b303934c85e9c4659fb11beac
      EXPECTED_FOLLOWUP_BLOB: 96f78a9bab4076a4ed87bbecc0adb96fec2401b2
      EXPECTED_FOLLOWUP_API_BLOB: 81990fd12c32d2d48186af8744efa1cf09ef0a5f
    steps:
    - name: Checkout repository with full history
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Verify pending STEP and backup
      shell: bash
      run: |
        set -Eeuo pipefail
        test -s dpro-next/estate-progress.yml || { echo 'ERROR: progress ledger is missing.' >&2; exit 1; }
        current_step="$(awk -F': ' '/^current_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
        next_step="$(awk -F': ' '/^next_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
        test "$current_step" = 'ESTATE-NEXT-8-DEPLOY-PENDING' || { echo "ERROR: expected ESTATE-NEXT-8-DEPLOY-PENDING, got $current_step" >&2; exit 1; }
        test "$next_step" = 'ESTATE-NEXT-8-VERIFY' || { echo "ERROR: expected ESTATE-NEXT-8-VERIFY, got $next_step" >&2; exit 1; }
        git rev-parse "$STEP_BACKUP_TAG" >/dev/null 2>&1 || { echo "ERROR: backup tag is missing: $STEP_BACKUP_TAG" >&2; exit 1; }
    - name: Synchronize R2 Worker source
      shell: bash
      run: |
        set -Eeuo pipefail
        python3 - <<'PY_WORKER'
        from pathlib import Path
        import base64
        content = base64.b64decode('')
        path = Path('deploy/estate-next-8/worker.js')
        path.parent.mkdir(parents=True, exist_ok=True)
        path.write_bytes(content)
        Path('deploy/estate-next-8/worker.js.txt').write_bytes(content)
        PY_WORKER
        node --check deploy/estate-next-8/worker.js
        grep -q 'ESTATE-NEXT-8-R2-EXTENSION-20260724' deploy/estate-next-8/worker.js
        grep -q 'legacy_fetch_limit: 200' deploy/estate-next-8/worker.js
        grep -q "reservations?limit=200" deploy/estate-next-8/worker.js
        grep -q "properties?include_private=true&limit=200" deploy/estate-next-8/worker.js
    - name: Confirm UI and existing features are unchanged
      shell: bash
      run: |
        set -Eeuo pipefail
        test "$(git hash-object owner.html)" = "$EXPECTED_OWNER_BLOB"
        test "$(git hash-object config.js)" = "$EXPECTED_CONFIG_BLOB"
        test "$(git hash-object followup.html)" = "$EXPECTED_FOLLOWUP_BLOB"
        test "$(git hash-object followup-api.js)" = "$EXPECTED_FOLLOWUP_API_BLOB"
        grep -q '追客・再相談' owner.html
        grep -q '今日の追客' followup.html
        grep -q '再相談依頼' followup.html
        grep -q '物件提案' followup.html
        grep -q '除外条件' followup.html
        grep -q 'secure_member_session' deploy/estate-next-8/worker.js
        grep -q 'application_intent' deploy/estate-next-8/worker.js
    - name: Verify deployed R2 Worker with labeled HTTP diagnostics
      shell: bash
      run: |
        set -Eeuo pipefail

        show_failure() {
          local label="$1" status="$2" file="$3"
          echo "ERROR: $label returned HTTP $status" >&2
          python3 - "$file" <<'PY_ERROR'
        import json,sys
        from pathlib import Path
        path=Path(sys.argv[1])
        text=path.read_text(errors='replace')[:4000] if path.exists() else ''
        try:
            data=json.loads(text)
            for key in ['admin_code','code','session_token','token','phone']:
                if key in data: data[key]='***'
            print(json.dumps(data,ensure_ascii=False,indent=2),file=sys.stderr)
        except Exception:
            print(text,file=sys.stderr)
        PY_ERROR
          exit 1
        }

        get_json() {
          local label="$1" url="$2" outfile="$3" code="${4:-}"
          local status
          if [ -n "$code" ]; then
            status="$(curl --silent --show-error --retry 3 --retry-delay 2 -o "$outfile" -w '%{http_code}' -H "X-DPRO-Admin-Code: $code" -H "X-Admin-Code: $code" "$url")"
          else
            status="$(curl --silent --show-error --retry 3 --retry-delay 2 -o "$outfile" -w '%{http_code}' "$url")"
          fi
          echo "$label HTTP $status"
          case "$status" in 2??) ;; *) show_failure "$label" "$status" "$outfile";; esac
        }

        get_json 'NEXT-8 R2 health' "$NEXT_API_BASE/api/health" /tmp/health.json
        python3 - <<'PY_HEALTH'
        import json
        from pathlib import Path
        data=json.loads(Path('/tmp/health.json').read_text())
        assert data.get('ok') is True,data
        assert data.get('version')=='ESTATE-NEXT-8-R2-EXTENSION-20260724',data
        diag=data.get('diagnostics',{})
        assert diag.get('legacy_fetch_limit')==200,diag
        follow=data.get('followup_features',{})
        required=['followup_tasks','revisit_workflow','post_viewing_generation','property_candidate_matching','proposal_history','customer_exclusions','individual_line_copy']
        assert all(follow.get(key) is True for key in required),follow
        PY_HEALTH

        candidates=()
        if [ -n "$ADMIN_CODE_SECRET" ]; then candidates+=("$ADMIN_CODE_SECRET"); fi
        if [ "$ADMIN_CODE_SECRET" != '1234' ]; then candidates+=('1234'); fi
        valid_code=''
        check_status='000'
        for candidate in "${candidates[@]}"; do
          [ -z "$candidate" ] && continue
          echo "::add-mask::$candidate"
          printf -v login_payload '{"code":"%s","admin_code":"%s","shop_code":"%s"}' "$candidate" "$candidate" "$SHOP_CODE"
          legacy_status="$(curl --silent --show-error -o /tmp/login.json -w '%{http_code}' -X POST -H 'Content-Type: application/json' -H "X-DPRO-Admin-Code: $candidate" -H "X-Admin-Code: $candidate" --data "$login_payload" "$LEGACY_API_BASE/api/admin/login")"
          [ "$legacy_status" = '200' ] || continue
          check_status="$(curl --silent --show-error -o /tmp/system-check.json -w '%{http_code}' -H "X-DPRO-Admin-Code: $candidate" -H "X-Admin-Code: $candidate" "$NEXT_API_BASE/api/admin/system-check?shop_code=$SHOP_CODE&write_test=1")"
          if [ "$check_status" = '200' ]; then valid_code="$candidate"; break; fi
        done
        test -n "$valid_code" || show_failure '管理コード認証またはNEXT-8 system-check' "$check_status" /tmp/system-check.json

        get_json 'Legacy health' "$LEGACY_API_BASE/api/health" /tmp/legacy-health.json
        get_json 'Follow-up task list' "$NEXT_API_BASE/api/admin/followup-tasks?shop_code=$SHOP_CODE&status=open&limit=20" /tmp/tasks.json "$valid_code"
        get_json 'Revisit request list' "$NEXT_API_BASE/api/admin/revisit-requests?shop_code=$SHOP_CODE&status=open&limit=20" /tmp/revisits.json "$valid_code"
        get_json 'Legacy customer list' "$LEGACY_API_BASE/api/admin/customers?shop_code=$SHOP_CODE&limit=20" /tmp/customers.json "$valid_code"

        customer_id="$(python3 - <<'PY_CUSTOMER'
        import json
        from pathlib import Path
        data=json.loads(Path('/tmp/customers.json').read_text())
        rows=data.get('customers') or []
        print(rows[0].get('id','') if rows else '')
        PY_CUSTOMER
        )"
        if [ -n "$customer_id" ]; then
          encoded_customer="$(python3 -c 'import sys,urllib.parse;print(urllib.parse.quote(sys.argv[1],safe=""))' "$customer_id")"
          get_json 'Property candidate matching' "$NEXT_API_BASE/api/admin/property-candidates?shop_code=$SHOP_CODE&customer_id=$encoded_customer" /tmp/property-candidates.json "$valid_code"
          get_json 'Customer exclusions' "$NEXT_API_BASE/api/admin/customer-exclusions?shop_code=$SHOP_CODE&customer_id=$encoded_customer" /tmp/exclusions.json "$valid_code"
        else
          printf '{"ok":true,"skipped":"no customer"}' > /tmp/property-candidates.json
          printf '{"ok":true,"skipped":"no customer"}' > /tmp/exclusions.json
        fi

        python3 - <<'PY_VERIFY'
        import json
        from pathlib import Path
        load=lambda p: json.loads(Path(p).read_text())
        health=load('/tmp/health.json')
        check=load('/tmp/system-check.json')
        legacy=load('/tmp/legacy-health.json')
        tasks=load('/tmp/tasks.json')
        revisits=load('/tmp/revisits.json')
        candidates=load('/tmp/property-candidates.json')
        exclusions=load('/tmp/exclusions.json')
        assert check.get('ok') is True,check
        tables={item.get('table'):item.get('ok') for item in check.get('tables',[])}
        required=['estate_application_cases','estate_case_events','estate_vacancy_checks','estate_member_sessions','estate_member_auth_attempts','estate_member_revisit_requests','estate_followup_tasks','estate_property_proposals','estate_customer_exclusions']
        assert all(tables.get(name) is True for name in required),tables
        follow=check.get('followup_test',{})
        assert follow.get('ok') is True,follow
        for key in ['task_duplicate_guard','proposal_duplicate_guard','exclusion_duplicate_guard','revisit_duplicate_guard','candidate_match_logic']:
            assert follow.get(key) is True,(key,follow)
        for label,data in [('tasks',tasks),('revisits',revisits),('candidates',candidates),('exclusions',exclusions),('legacy',legacy)]:
            assert data.get('ok') is True,(label,data)
        safe={
          'extension_health':health,
          'system_check':check,
          'legacy_health':{'ok':legacy.get('ok'),'service':legacy.get('service'),'version':legacy.get('version')},
          'followup_task_list':{'ok':True,'count':tasks.get('count',0)},
          'revisit_list':{'ok':True,'count':revisits.get('count',0)},
          'property_candidate_endpoint':{'ok':True,'count':len(candidates.get('candidates') or [])},
          'customer_exclusion_endpoint':{'ok':True},
          'verification_revision':'R2',
        }
        Path('dpro-next/estate-next-8-live-verification.json').write_text(json.dumps(safe,ensure_ascii=False,indent=2)+'\n')
        print('NEXT-8 R2 LIVE VERIFICATION PASS')
        PY_VERIFY
    - name: Verify published owner and follow-up pages
      shell: bash
      run: |
        set -Eeuo pipefail
        curl --fail --silent --show-error --retry 8 --retry-delay 5 "https://dpromstk2000-lab.github.io/dpro-estate-line-liff/followup.html?v=estate-next-8-r2-${GITHUB_RUN_ID}" -o /tmp/followup-live.html
        curl --fail --silent --show-error --retry 8 --retry-delay 5 "https://dpromstk2000-lab.github.io/dpro-estate-line-liff/owner.html?v=estate-next-8-r2-${GITHUB_RUN_ID}" -o /tmp/owner-live.html
        grep -q 'followup-api.js?v=estate-next-8' /tmp/followup-live.html
        grep -q '今日の追客' /tmp/followup-live.html
        grep -q '再相談依頼' /tmp/followup-live.html
        grep -q '物件提案' /tmp/followup-live.html
        grep -q '除外条件' /tmp/followup-live.html
        grep -q 'followup.html?v=estate-next-8' /tmp/owner-live.html
    - name: Record ESTATE-NEXT-8 completion
      shell: bash
      run: |
        set -Eeuo pipefail
        completed_at="$(TZ=Asia/Tokyo date --iso-8601=seconds)"
        cat > dpro-next/estate-progress.yml <<EOF
        system: DPRO 不動産・賃貸内見 LINE
        repository: $GITHUB_REPOSITORY
        previous_step: ESTATE-NEXT-8-DEPLOY-PENDING
        current_step: ESTATE-NEXT-8-COMPLETE
        next_step: ESTATE-NEXT-9
        baseline_tag: dpro-estate-next-baseline-20260723
        step_backup_tag: $STEP_BACKUP_TAG
        completed_at_jst: "$completed_at"
        verification_revision: R2
        modified_files:
          - owner.html
          - config.js
          - followup.html
          - followup-api.js
          - deploy/estate-next-8/worker.js
        extension_worker_name: dpro-estate-next4-api
        extension_worker_url: $NEXT_API_BASE
        extension_worker_version: ESTATE-NEXT-8-R2-EXTENSION-20260724
        legacy_fetch_limit: 200
        worker_changed: true
        supabase_changed: true
        api_changed: true
        followup_center: true
        revisit_workflow: true
        post_viewing_followup: true
        property_candidate_matching: true
        proposal_history: true
        customer_exclusions: true
        proposal_duplicate_guard: true
        task_duplicate_guard: true
        individual_line_copy_only: true
        bulk_line_auto_send_added: false
        existing_features_preserved: true
        live_health_check: PASS
        live_schema_check: PASS
        live_followup_test: PASS
        live_endpoint_diagnostics: PASS
        published_followup_check: PASS
        published_owner_link_check: PASS
        EOF
        python3 - <<'PY_LEDGER'
        from pathlib import Path
        path=Path('dpro-next/estate-next-8-deployment.yml')
        text=path.read_text().replace('status: DEPLOY-PENDING','status: COMPLETE').replace('next_step: ESTATE-NEXT-8-VERIFY','next_step: ESTATE-NEXT-9').replace('worker_changed: pending','worker_changed: true').replace('supabase_changed: pending','supabase_changed: true')
        if 'verification_revision:' not in text:
            text += 'verification_revision: R2\nlegacy_fetch_limit: 200\nlive_verification: PASS\nfollowup_self_test: PASS\n'
        path.write_text(text)
        ledger=Path('dpro-next/estate-feature-ledger.yml')
        text=ledger.read_text().replace('estate_next_8:\n  status: DEPLOY-PENDING','estate_next_8:\n  status: COMPLETE')
        ledger.write_text(text)
        PY_LEDGER
    - name: Delete workflow and commit verified completion
      shell: bash
      run: |
        set -Eeuo pipefail
        rm -f "$WORKFLOW_PATH"
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add deploy/estate-next-8/worker.js deploy/estate-next-8/worker.js.txt dpro-next "$WORKFLOW_PATH"
        mapfile -t staged < <(git diff --cached --name-only)
        test "${#staged[@]}" -gt 0 || { echo 'ERROR: no completion files staged.' >&2; exit 1; }
        for file in "${staged[@]}"; do
          case "$file" in
            deploy/estate-next-8/worker.js|deploy/estate-next-8/worker.js.txt|dpro-next/*|.github/workflows/estate-next-8.yml) ;;
            *) echo "ERROR: unexpected completion file: $file" >&2; exit 1;;
          esac
        done
        git commit -m "fix(estate): complete ESTATE-NEXT-8 R2 verification"
        git push origin "HEAD:$TARGET_BRANCH"
    - name: Publish completion summary
      shell: bash
      run: |
        cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
        # ESTATE-NEXT-8 R2 COMPLETE

        | 項目 | 結果 |
        |---|---|
        | 既存Worker取得上限 | 200件へ統一 |
        | 再相談依頼の追客統合 | PASS |
        | 内見後追客タスク | PASS |
        | 物件候補マッチング | PASS |
        | 提案履歴・二重防止 | PASS |
        | 顧客別除外条件 | PASS |
        | HTTP別診断 | PASS |
        | 次STEP | ESTATE-NEXT-9 |

        実行YML自身を削除し、完成台帳を保存しました。
        EOF
