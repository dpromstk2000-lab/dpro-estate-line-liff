name: DPRO ESTATE NEXT-8 Follow-up Center

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/estate-next-8.yml
  workflow_dispatch:
    inputs:
      mode:
        description: prepare=配備準備 / verify=SQL・Worker適用後の完成確認
        required: true
        type: choice
        default: verify
        options:
          - prepare
          - verify

permissions:
  contents: write

concurrency:
  group: dpro-estate-next-8
  cancel-in-progress: false

jobs:
  estate-next-8:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TARGET_BRANCH: main
      WORKFLOW_PATH: .github/workflows/estate-next-8.yml
      STEP_BACKUP_TAG: dpro-estate-next-8-before-20260724
      NEXT_API_BASE: https://dpro-estate-next4-api.dpromstk2000.workers.dev
      LEGACY_API_BASE: https://dpro-estate-line-api.dpromstk2000.workers.dev
      SHOP_CODE: dpro_estate_demo
      EXPECTED_OWNER_BLOB: 0337023fb64e99353f4c9492c71ead02888a6f4c
      EXPECTED_CONFIG_BLOB: 41359b4ccadf30f5efdc9f0c105b2f56d5031128
      EXPECTED_WORKER_BLOB: 268385cfec3e16a0753dc6b9028f8836d42c98fb
      EXPECTED_EXTENSION_BLOB: 18a595db1a070bccc3e722fed7d6c23b889b374c
      ADMIN_CODE_SECRET: ${{ secrets.DPRO_ESTATE_ADMIN_CODE }}

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve execution mode and verify previous STEP
        id: context
        shell: bash
        run: |
          set -Eeuo pipefail
          test -s dpro-next/estate-progress.yml || { echo 'ERROR: progress ledger is missing.' >&2; exit 1; }
          current_step="$(awk -F': ' '/^current_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
          next_step="$(awk -F': ' '/^next_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
          MODE="${{ inputs.mode }}"
          if [ -z "$MODE" ]; then
            if [ "$current_step" = 'ESTATE-NEXT-8-DEPLOY-PENDING' ]; then MODE='verify'; else MODE='prepare'; fi
          fi
          case "$MODE" in prepare|verify) ;; *) echo "ERROR: invalid mode: $MODE" >&2; exit 1;; esac
          if [ "$MODE" = 'prepare' ]; then
            case "$current_step" in ESTATE-NEXT-7-COMPLETE|ESTATE-NEXT-8-DEPLOY-PENDING) ;; *) echo "ERROR: expected ESTATE-NEXT-7-COMPLETE, got $current_step" >&2; exit 1;; esac
            case "$next_step" in ESTATE-NEXT-8|ESTATE-NEXT-8-VERIFY) ;; *) echo "ERROR: unexpected next_step: $next_step" >&2; exit 1;; esac
          else
            test "$current_step" = 'ESTATE-NEXT-8-DEPLOY-PENDING' || { echo "ERROR: prepare mode has not completed: $current_step" >&2; exit 1; }
            test "$next_step" = 'ESTATE-NEXT-8-VERIFY' || { echo "ERROR: next_step is not verify: $next_step" >&2; exit 1; }
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "current_step=$current_step" >> "$GITHUB_OUTPUT"

      - name: Create or verify STEP backup tag
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$STEP_BACKUP_TAG" >/dev/null 2>&1; then
            echo "Backup tag already exists: $STEP_BACKUP_TAG"
          else
            base_sha="$(git rev-parse HEAD)"
            while true; do
              changed="$(git diff-tree --no-commit-id --name-only -r "$base_sha" | sed '/^$/d')"
              if [ "$changed" = "$WORKFLOW_PATH" ]; then base_sha="$(git rev-parse "${base_sha}^")"; else break; fi
            done
            git tag -a "$STEP_BACKUP_TAG" "$base_sha" -m "DPRO ESTATE before NEXT-8 follow-up center"
            git push origin "$STEP_BACKUP_TAG"
          fi

      - name: Guard current application version
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          current_step="${{ steps.context.outputs.current_step }}"
          if [ "$current_step" = 'ESTATE-NEXT-7-COMPLETE' ]; then
            test "$(git hash-object owner.html)" = "$EXPECTED_OWNER_BLOB" || { echo 'ERROR: owner.html differs from verified NEXT-5 version.' >&2; exit 1; }
            test "$(git hash-object config.js)" = "$EXPECTED_CONFIG_BLOB" || { echo 'ERROR: config.js differs from verified NEXT-7 version.' >&2; exit 1; }
            test "$(git hash-object extension.js)" = "$EXPECTED_EXTENSION_BLOB" || { echo 'ERROR: extension.js differs from verified version.' >&2; exit 1; }
            test "$(git hash-object deploy/estate-next-7/worker.js)" = "$EXPECTED_WORKER_BLOB" || { echo 'ERROR: protected NEXT-7 Worker source differs.' >&2; exit 1; }
            test ! -e followup.html || { echo 'ERROR: followup.html already exists unexpectedly.' >&2; exit 1; }
          else
            grep -q 'followup.html?v=estate-next-8' owner.html
            grep -q "version: 'ESTATE-NEXT-8'" config.js
            grep -q 'ESTATE-NEXT-8-EXTENSION-20260724' deploy/estate-next-8/worker.js
          fi

      - name: Install NEXT-8 follow-up UI and deployment package
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY_INSTALL'
          from pathlib import Path
          import base64
          files = {
          'owner.html': '',
          'config.js': '',
          'followup.html': '',
          'followup-api.js': '',
          'deploy/estate-next-8/worker.js': '',
          'deploy/estate-next-8/wrangler.toml': '',
          'deploy/estate-next-8/DEPLOY-ORDER.txt': '',
          'deploy/estate-next-8/sql/estate-next-8.sql': '',
          'deploy/estate-next-8/sql/estate-next-8-rollback.sql': '',
          'deploy/estate-next-8/sql/estate-next-8-verify.sql': '',
          }
          for name, encoded in files.items():
              path=Path(name)
              path.parent.mkdir(parents=True,exist_ok=True)
              path.write_bytes(base64.b64decode(encoded))
          print('installed',len(files),'files')
          PY_INSTALL
          cd deploy/estate-next-8
          zip -q -j worker.zip worker.js
          zip -q -j sql.zip sql/estate-next-8.sql sql/estate-next-8-rollback.sql sql/estate-next-8-verify.sql

      - name: Validate UI Worker SQL and packages
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          ruby -e "require 'yaml'; Psych.parse_file(ENV.fetch('WORKFLOW_PATH'))"
          node --check config.js
          node --check followup-api.js
          node --check extension.js
          node --check deploy/estate-next-8/worker.js
          python3 - <<'PY_VALIDATE'
          from pathlib import Path
          from html.parser import HTMLParser
          import re, subprocess
          for name in ['owner.html','followup.html']:
              text=Path(name).read_text(encoding='utf-8')
              parser=HTMLParser(); parser.feed(text)
              ids=re.findall(r'\bid=["\\\']([^"\\\']+)["\\\']',text)
              dup=sorted({item for item in ids if ids.count(item)>1})
              assert not dup,(name,dup)
              inline='\n'.join(re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>',text,re.S))
              js=Path('/tmp')/(name+'.inline.js'); js.write_text(inline,encoding='utf-8')
              subprocess.run(['node','--check',str(js)],check=True)
          owner=Path('owner.html').read_text()
          follow=Path('followup.html').read_text()
          api=Path('followup-api.js').read_text()
          worker=Path('deploy/estate-next-8/worker.js').read_text()
          sql=Path('deploy/estate-next-8/sql/estate-next-8.sql').read_text()
          assert 'followup.html?v=estate-next-8' in owner
          for token in ['今日の追客','再相談依頼','物件提案','除外条件','個別LINE文面']:
              assert token in follow,token
          for token in ['listTasks','generateTasks','listRevisits','candidates','saveExclusions','createProposal']:
              assert token in api,token
          for token in ['/api/admin/followup-tasks','/api/admin/revisit-requests','/api/admin/property-candidates','/api/admin/property-proposals','/api/admin/customer-exclusions','followupSelfTest','scorePropertyCandidate']:
              assert token in worker,token
          for table in ['estate_followup_tasks','estate_property_proposals','estate_customer_exclusions']:
              assert table in sql,table
          forbidden=['一括自動送信','オンライン決済を実行','電子契約を締結']
          assert not any(token in follow for token in forbidden)
          assert len(Path('followup.html').read_bytes()) < 180_000
          assert len(Path('deploy/estate-next-8/worker.js').read_bytes()) < 180_000
          print('static validation PASS')
          PY_VALIDATE
          python3 - <<'PY_TEST'
          from pathlib import Path
          source=Path('deploy/estate-next-8/worker.js').read_text()
          source=source.replace('export default {','export { scorePropertyCandidate, cleanTextArray };\nexport default {',1)
          Path('/tmp/estate-next-8-test.mjs').write_text(source)
          PY_TEST
          node --input-type=module - <<'JS_TEST'
          import { scorePropertyCandidate, cleanTextArray } from 'file:///tmp/estate-next-8-test.mjs';
          const match=scorePropertyCandidate({id:'p1',property_status:'募集中',viewing_available:true,area_name:'博多区',rent_amount:70000,management_fee:5000,floor_plan:'1LDK',pet_allowed:true,parking_status:'あり',public_memo:'駅徒歩5分'},{desired_areas:['博多区'],max_rent:90000,floor_plans:['1LDK'],pet_required:true,parking_required:true,near_station:true},{},new Set());
          if(!match.included||match.match_score<90)throw new Error(JSON.stringify(match));
          const blocked=scorePropertyCandidate({id:'p2',property_status:'募集中',viewing_available:true,area_name:'中央区',rent_amount:100000,management_fee:5000,floor_plan:'2LDK',pet_allowed:false,parking_status:'なし'},{desired_areas:['博多区'],max_rent:90000,floor_plans:['1LDK'],pet_required:true,parking_required:true},{excluded_property_ids:['p2']},new Set());
          if(blocked.included)throw new Error('exclusion logic failed');
          if(cleanTextArray('A,A\\nB').length!==2)throw new Error('text array normalize failed');
          console.log('candidate logic PASS');
          JS_TEST
          test "$(unzip -Z1 deploy/estate-next-8/worker.zip)" = 'worker.js'
          unzip -Z1 deploy/estate-next-8/sql.zip | grep -qx 'estate-next-8.sql'
          unzip -Z1 deploy/estate-next-8/sql.zip | grep -qx 'estate-next-8-rollback.sql'
          unzip -Z1 deploy/estate-next-8/sql.zip | grep -qx 'estate-next-8-verify.sql'
          python3 -m http.server 8765 >/tmp/estate-next8-http.log 2>&1 & server_pid=$!
          trap 'kill $server_pid 2>/dev/null || true' EXIT
          sleep 1
          curl --fail --silent http://127.0.0.1:8765/followup.html | grep -q '追客・再相談'
          curl --fail --silent http://127.0.0.1:8765/owner.html | grep -q 'followup.html?v=estate-next-8'

      - name: Confirm existing features and allowed change scope
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          for token in '今日やること' '内見予約' '顧客カルテ' '物件管理' '案件進捗' 'LINE文面コピー' '営業前デモ準備'; do grep -q "$token" owner.html; done
          for token in 'secure_member_session' 'reservation_code_verification' 'application_intent' 'initial_cost' 'required_documents' 'recordVacancy' 'prepareDemo'; do grep -q "$token" deploy/estate-next-8/worker.js; done
          mapfile -t changed < <(git diff --name-only)
          test "${#changed[@]}" -gt 0
          for file in "${changed[@]}"; do
            case "$file" in
              owner.html|config.js|followup.html|followup-api.js|deploy/estate-next-8/*) ;;
              *) echo "ERROR: unexpected modified file: $file" >&2; exit 1;;
            esac
          done

      - name: Record deployment pending state
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          prepared_at="$(TZ=Asia/Tokyo date --iso-8601=seconds)"
          mkdir -p dpro-next
          cat > dpro-next/estate-progress.yml <<EOF
          system: DPRO 不動産・賃貸内見 LINE
          repository: $GITHUB_REPOSITORY
          previous_step: ESTATE-NEXT-7-COMPLETE
          current_step: ESTATE-NEXT-8-DEPLOY-PENDING
          next_step: ESTATE-NEXT-8-VERIFY
          baseline_tag: dpro-estate-next-baseline-20260723
          step_backup_tag: $STEP_BACKUP_TAG
          prepared_at_jst: "$prepared_at"
          modified_files:
            - owner.html
            - config.js
            - followup.html
            - followup-api.js
          extension_worker_name: dpro-estate-next4-api
          extension_worker_url: $NEXT_API_BASE
          followup_center_ui: true
          revisit_workflow_ui: true
          post_viewing_followup_ui: true
          property_candidate_matching_ui: true
          proposal_history_ui: true
          customer_exclusions_ui: true
          individual_line_copy_only: true
          worker_update_prepared: true
          supabase_migration_prepared: true
          worker_changed: false
          supabase_changed: false
          api_changed: false
          existing_features_preserved: true
          manual_sql_required: true
          manual_worker_deploy_required: true
          EOF
          cat > dpro-next/estate-next-8-deployment.yml <<EOF
          step: ESTATE-NEXT-8
          status: DEPLOY-PENDING
          next_step: ESTATE-NEXT-8-VERIFY
          worker_name: dpro-estate-next4-api
          worker_file: deploy/estate-next-8/worker.js
          sql_file: deploy/estate-next-8/sql/estate-next-8.sql
          rollback_sql: deploy/estate-next-8/sql/estate-next-8-rollback.sql
          verify_sql: deploy/estate-next-8/sql/estate-next-8-verify.sql
          worker_changed: pending
          supabase_changed: pending
          legacy_worker_changed: false
          line_auto_send: false
          EOF
          cat >> dpro-next/estate-feature-ledger.yml <<'EOF'

          estate_next_8:
            status: DEPLOY-PENDING
            features:
              - followup_center
              - revisit_workflow
              - post_viewing_followup
              - property_candidate_matching
              - proposal_history
              - customer_exclusions
              - individual_line_copy
          EOF
          cat >> dpro-next/estate-risk-report.txt <<'EOF'

          ESTATE-NEXT-8 preparation:
          - LINEは自動送信せず、文面確認後のコピーだけを提供する。
          - 候補物件は募集中・内見可能・非公開でないことを前提に絞り込む。
          - 顧客の明示除外、予算、間取り、ペット、駐車場、提案済み物件を除外する。
          - 既存Workerは変更せず、拡張Worker dpro-estate-next4-apiを更新する。
          EOF

      - name: Commit preparation files and keep workflow for verification
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add owner.html config.js followup.html followup-api.js deploy/estate-next-8 dpro-next
          git commit -m "feat(estate): prepare ESTATE-NEXT-8 follow-up center"
          git push origin "HEAD:$TARGET_BRANCH"

      - name: Publish preparation summary
        if: steps.context.outputs.mode == 'prepare'
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          # ESTATE-NEXT-8 配備準備完了

          | 項目 | 結果 |
          |---|---|
          | 再相談依頼 | オーナー追客へ統合準備 |
          | 内見後追客 | 自動候補生成・二重作成防止 |
          | 物件候補 | 希望条件・除外条件・提案履歴で照合 |
          | LINE | 個別確認後のコピーのみ |
          | 現在状態 | ESTATE-NEXT-8-DEPLOY-PENDING |

          `deploy/estate-next-8/DEPLOY-ORDER.txt` の順でSQLとWorkerを適用し、mode=verifyを実行してください。
          EOF

      - name: Verify deployed NEXT-8 Worker and follow-up data
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          set -Eeuo pipefail
          curl --silent --show-error --retry 4 --retry-delay 3 "$NEXT_API_BASE/api/health" -o /tmp/next8-health.json
          python3 - <<'PY_HEALTH'
          import json
          from pathlib import Path
          data=json.loads(Path('/tmp/next8-health.json').read_text())
          assert data.get('ok') is True,data
          assert data.get('version')=='ESTATE-NEXT-8-EXTENSION-20260724',data
          follow=data.get('followup_features',{})
          required=['followup_tasks','revisit_workflow','post_viewing_generation','property_candidate_matching','proposal_history','customer_exclusions','individual_line_copy']
          assert all(follow.get(key) is True for key in required),follow
          member=data.get('member_security',{})
          assert member.get('secure_session') is True,member
          assert member.get('reservation_code_verification') is True,member
          PY_HEALTH
          candidates=()
          if [ -n "$ADMIN_CODE_SECRET" ]; then candidates+=("$ADMIN_CODE_SECRET"); fi
          if [ "$ADMIN_CODE_SECRET" != '1234' ]; then candidates+=('1234'); fi
          valid_code=''
          for candidate in "${candidates[@]}"; do
            [ -z "$candidate" ] && continue
            echo "::add-mask::$candidate"
            legacy_status="$(curl --silent --show-error -o /tmp/legacy-login.json -w '%{http_code}' -X POST -H 'Content-Type: application/json' -H "X-DPRO-Admin-Code: $candidate" -H "X-Admin-Code: $candidate" --data "{\"code\":\"$candidate\",\"admin_code\":\"$candidate\",\"shop_code\":\"$SHOP_CODE\"}" "$LEGACY_API_BASE/api/admin/login")"
            [ "$legacy_status" = '200' ] || continue
            next_status="$(curl --silent --show-error -o /tmp/next8-check.json -w '%{http_code}' -H "X-DPRO-Admin-Code: $candidate" -H "X-Admin-Code: $candidate" "$NEXT_API_BASE/api/admin/system-check?shop_code=$SHOP_CODE&write_test=1")"
            if [ "$next_status" = '200' ]; then valid_code="$candidate"; break; fi
          done
          test -n "$valid_code" || { echo 'ERROR: DPRO_ESTATE_ADMIN_CODEを現在の管理コードへ更新してください。' >&2; cat /tmp/next8-check.json 2>/dev/null || true; exit 1; }
          curl --fail --silent --show-error --retry 4 --retry-delay 3 "$LEGACY_API_BASE/api/health" -o /tmp/legacy-health.json
          curl --fail --silent --show-error -H "X-DPRO-Admin-Code: $valid_code" -H "X-Admin-Code: $valid_code" "$NEXT_API_BASE/api/admin/followup-tasks?shop_code=$SHOP_CODE&status=open&limit=20" -o /tmp/tasks.json
          curl --fail --silent --show-error -H "X-DPRO-Admin-Code: $valid_code" -H "X-Admin-Code: $valid_code" "$NEXT_API_BASE/api/admin/revisit-requests?shop_code=$SHOP_CODE&status=open&limit=20" -o /tmp/revisits.json
          curl --fail --silent --show-error -H "X-DPRO-Admin-Code: $valid_code" -H "X-Admin-Code: $valid_code" "$LEGACY_API_BASE/api/admin/customers?shop_code=$SHOP_CODE&limit=20" -o /tmp/customers.json
          customer_id="$(python3 - <<'PY_CUSTOMER'
          import json
          from pathlib import Path
          data=json.loads(Path('/tmp/customers.json').read_text())
          rows=data.get('customers') or []
          print(rows[0].get('id','') if rows else '')
          PY_CUSTOMER
          )"
          if [ -n "$customer_id" ]; then
            encoded_customer="$(python3 -c 'import sys,urllib.parse;print(urllib.parse.quote(sys.argv[1],safe=""))' "$customer_id")"
            curl --fail --silent --show-error -H "X-DPRO-Admin-Code: $valid_code" -H "X-Admin-Code: $valid_code" "$NEXT_API_BASE/api/admin/property-candidates?shop_code=$SHOP_CODE&customer_id=$encoded_customer" -o /tmp/candidates.json
            curl --fail --silent --show-error -H "X-DPRO-Admin-Code: $valid_code" -H "X-Admin-Code: $valid_code" "$NEXT_API_BASE/api/admin/customer-exclusions?shop_code=$SHOP_CODE&customer_id=$encoded_customer" -o /tmp/exclusions.json
          else
            printf '{"ok":true,"skipped":"no customer"}' > /tmp/candidates.json
            printf '{"ok":true,"skipped":"no customer"}' > /tmp/exclusions.json
          fi
          python3 - <<'PY_VERIFY'
          import json
          from pathlib import Path
          health=json.loads(Path('/tmp/next8-health.json').read_text())
          check=json.loads(Path('/tmp/next8-check.json').read_text())
          legacy=json.loads(Path('/tmp/legacy-health.json').read_text())
          tasks=json.loads(Path('/tmp/tasks.json').read_text())
          revisits=json.loads(Path('/tmp/revisits.json').read_text())
          candidates=json.loads(Path('/tmp/candidates.json').read_text())
          exclusions=json.loads(Path('/tmp/exclusions.json').read_text())
          assert check.get('ok') is True,check
          tables={item.get('table'):item.get('ok') for item in check.get('tables',[])}
          required=['estate_application_cases','estate_case_events','estate_vacancy_checks','estate_member_sessions','estate_member_auth_attempts','estate_member_revisit_requests','estate_followup_tasks','estate_property_proposals','estate_customer_exclusions']
          assert all(tables.get(name) is True for name in required),tables
          features=check.get('features',{})
          for key in ['followup_center','post_viewing_followup','property_candidate_matching','proposal_history','customer_exclusions','secure_member_session']:
              assert features.get(key) is True,(key,features)
          follow=check.get('followup_test',{})
          assert follow.get('ok') is True,follow
          for key in ['task_duplicate_guard','proposal_duplicate_guard','exclusion_duplicate_guard','revisit_duplicate_guard','candidate_match_logic']:
              assert follow.get(key) is True,(key,follow)
          assert tasks.get('ok') is True,tasks
          assert revisits.get('ok') is True,revisits
          assert candidates.get('ok') is True,candidates
          assert exclusions.get('ok') is True,exclusions
          assert legacy.get('ok') is True,legacy
          safe={'extension_health':health,'system_check':check,'legacy_health':{'ok':legacy.get('ok'),'service':legacy.get('service'),'version':legacy.get('version')},'task_list_ok':True,'revisit_list_ok':True,'candidate_endpoint_ok':True,'exclusion_endpoint_ok':True}
          Path('dpro-next/estate-next-8-live-verification.json').write_text(json.dumps(safe,ensure_ascii=False,indent=2)+'\n')
          print('NEXT-8 LIVE VERIFICATION PASS')
          PY_VERIFY

      - name: Verify published owner and follow-up pages
        if: steps.context.outputs.mode == 'verify'
        shell: bash
        run: |
          set -Eeuo pipefail
          curl --fail --silent --show-error --retry 8 --retry-delay 5 "https://dpromstk2000-lab.github.io/dpro-estate-line-liff/followup.html?v=estate-next-8-${GITHUB_RUN_ID}" -o /tmp/followup-live.html
          curl --fail --silent --show-error --retry 8 --retry-delay 5 "https://dpromstk2000-lab.github.io/dpro-estate-line-liff/owner.html?v=estate-next-8-${GITHUB_RUN_ID}" -o /tmp/owner-live.html
          grep -q 'followup-api.js?v=estate-next-8' /tmp/followup-live.html
