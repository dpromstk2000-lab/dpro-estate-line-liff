name: DPRO ESTATE NEXT-1 Baseline Protection

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/estate-next-1.yml

permissions:
  contents: write

env:
  DPRO_STEP_NAME: ESTATE-NEXT-1
  DPRO_PREVIOUS_STEP: STEP ESTATE-12
  DPRO_NEXT_STEP: ESTATE-NEXT-2
  DPRO_TARGET_FILES: index.html, property.html, member.html, owner.html, owner-ipad.html, owner-settings.html, system-check.html, reservation-test.html
  DPRO_CHANGE_SUMMARY: Protect the normal version and create the current-system baseline ledgers without changing application files.
  DPRO_FEATURE_SCOPE: File manifest, feature ledger, risk report, progress ledger, syntax checks, ID duplicate checks, existing-feature preservation checks, estate business-logic checks.
  DPRO_BACKUP_TAG: dpro-estate-next-baseline-20260723
  DPRO_WORKER_CHANGED: "false"
  DPRO_SUPABASE_CHANGED: "false"
  DPRO_API_CHANGED: "false"

concurrency:
  group: dpro-estate-next-1-${{ github.ref }}
  cancel-in-progress: false

jobs:
  estate-next-1:
    name: Protect current version and create baseline ledgers
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Resolve baseline commit and verify previous STEP
        shell: bash
        run: |
          set -Eeuo pipefail

          WORKFLOW_PATH=".github/workflows/estate-next-1.yml"
          BASELINE_TAG="$DPRO_BACKUP_TAG"

          test -f "$WORKFLOW_PATH"
          git fetch --force --tags origin

          CURRENT_SHA="$(git rev-parse HEAD)"
          BASELINE_SHA="$CURRENT_SHA"

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            mapfile -t trigger_files < <(git diff-tree --no-commit-id --name-only -r HEAD)
            if [ "${#trigger_files[@]}" -eq 1 ] && [ "${trigger_files[0]}" = "$WORKFLOW_PATH" ]; then
              BASELINE_SHA="$(git rev-parse HEAD^)"
            fi
          fi

          required_files=(
            index.html
            property.html
            member.html
            owner.html
            owner-ipad.html
            owner-settings.html
            system-check.html
            reservation-test.html
          )

          for file in "${required_files[@]}"; do
            git cat-file -e "${BASELINE_SHA}:${file}" || {
              echo "ERROR: baseline file is missing: $file" >&2
              exit 1
            }
          done

          for file in index.html owner.html owner-ipad.html owner-settings.html member.html property.html system-check.html; do
            git show "${BASELINE_SHA}:${file}" | grep -q "STEP ESTATE-12" || {
              echo "ERROR: previous completed version marker was not found in $file" >&2
              exit 1
            }
          done

          git show "${BASELINE_SHA}:index.html" | grep -q "dpro-estate-line-api.dpromstk2000.workers.dev" || {
            echo "ERROR: current Worker API reference was not found in index.html" >&2
            exit 1
          }

          if git cat-file -e "${BASELINE_SHA}:dpro-next/estate-progress.yml" 2>/dev/null; then
            previous_progress="$(git show "${BASELINE_SHA}:dpro-next/estate-progress.yml")"
            if printf '%s' "$previous_progress" | grep -q '^current_step:' && \
               ! printf '%s' "$previous_progress" | grep -Eq '^current_step:[[:space:]]*(ESTATE-NEXT-1-COMPLETE|COMPLETE)[[:space:]]*$'; then
              echo "ERROR: another DPRO NEXT STEP appears to be incomplete." >&2
              printf '%s\n' "$previous_progress" >&2
              exit 1
            fi
          fi

          echo "WORKFLOW_PATH=$WORKFLOW_PATH" >> "$GITHUB_ENV"
          echo "BASELINE_TAG=$BASELINE_TAG" >> "$GITHUB_ENV"
          echo "CURRENT_SHA=$CURRENT_SHA" >> "$GITHUB_ENV"
          echo "BASELINE_SHA=$BASELINE_SHA" >> "$GITHUB_ENV"
          echo "TARGET_BRANCH=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"

          echo "Current workflow commit: $CURRENT_SHA"
          echo "Protected application baseline: $BASELINE_SHA"
          echo "Previous STEP ESTATE-12 confirmation: PASS"

      - name: Create or verify backup tag
        shell: bash
        run: |
          set -Eeuo pipefail

          if git rev-parse -q --verify "refs/tags/$BASELINE_TAG" >/dev/null; then
            existing_sha="$(git rev-list -n 1 "$BASELINE_TAG")"
            if [ "$existing_sha" != "$BASELINE_SHA" ]; then
              echo "ERROR: $BASELINE_TAG already points to $existing_sha, expected $BASELINE_SHA" >&2
              exit 1
            fi
            echo "Backup tag already exists and matches the baseline."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$BASELINE_TAG" "$BASELINE_SHA" \
              -m "DPRO ESTATE normal version before NEXT: STEP ESTATE-12"
            git push origin "refs/tags/$BASELINE_TAG"
            echo "Created and pushed backup tag: $BASELINE_TAG"
          fi

      - name: Validate workflow YAML syntax
        shell: bash
        run: |
          set -Eeuo pipefail
          ruby -e 'require "yaml"; YAML.load_file(ARGV[0]); puts "YAML syntax: PASS"' "$WORKFLOW_PATH"

      - name: Inspect current system and generate baseline ledgers
        shell: bash
        env:
          REPOSITORY_NAME: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          mkdir -p dpro-next

          python3 <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import os
          import re
          import subprocess
          import sys
          import tempfile
          from collections import Counter
          from datetime import datetime
          from html.parser import HTMLParser
          from pathlib import Path
          from zoneinfo import ZoneInfo

          ROOT = Path.cwd()
          BASELINE_SHA = os.environ["BASELINE_SHA"]
          BASELINE_TAG = os.environ["BASELINE_TAG"]
          CURRENT_SHA = os.environ["CURRENT_SHA"]
          REPOSITORY_NAME = os.environ.get("REPOSITORY_NAME", "dpromstk2000-lab/dpro-estate-line-liff")
          WORKFLOW_PATH = os.environ["WORKFLOW_PATH"]
          JST = ZoneInfo("Asia/Tokyo")
          GENERATED_AT = datetime.now(JST).isoformat(timespec="seconds")

          REQUIRED_FILES = [
              "index.html",
              "property.html",
              "member.html",
              "owner.html",
              "owner-ipad.html",
              "owner-settings.html",
              "system-check.html",
              "reservation-test.html",
          ]

          PUBLIC_FILES = ["index.html", "property.html", "member.html"]
          ADMIN_FILES = ["owner.html", "owner-ipad.html", "owner-settings.html", "system-check.html"]

          def git(*args: str, text: bool = True) -> str | bytes:
              return subprocess.check_output(["git", *args], text=text)

          def baseline_bytes(path: str) -> bytes:
              return git("show", f"{BASELINE_SHA}:{path}", text=False)

          def baseline_text(path: str) -> str:
              return baseline_bytes(path).decode("utf-8", errors="replace")

          tracked = [
              line.strip()
              for line in git("ls-tree", "-r", "--name-only", BASELINE_SHA).splitlines()
              if line.strip()
          ]

          manifest = []
          for path in tracked:
              data = baseline_bytes(path)
              manifest.append(
                  {
                      "path": path,
                      "bytes": len(data),
                      "sha256": hashlib.sha256(data).hexdigest(),
                      "extension": Path(path).suffix.lower(),
                  }
              )

          class IdCollector(HTMLParser):
              def __init__(self) -> None:
                  super().__init__(convert_charrefs=True)
                  self.ids: list[str] = []

              def handle_starttag(self, tag: str, attrs: list[tuple[str, str | None]]) -> None:
                  for key, value in attrs:
                      if key.lower() == "id" and value:
                          self.ids.append(value)

          html_results = []
          duplicate_ids: dict[str, list[str]] = {}
          js_syntax_errors: list[dict[str, str | int]] = []

          script_re = re.compile(r"<script\b[^>]*>(.*?)</script\s*>", re.I | re.S)
          for path in [p for p in tracked if p.lower().endswith(".html")]:
              text = baseline_text(path)
              parser = IdCollector()
              try:
                  parser.feed(text)
                  parser.close()
                  parse_ok = True
                  parse_error = ""
              except Exception as exc:  # defensive; HTMLParser is deliberately tolerant
                  parse_ok = False
                  parse_error = str(exc)

              duplicates = sorted([item for item, count in Counter(parser.ids).items() if count > 1])
              if duplicates:
                  duplicate_ids[path] = duplicates

              scripts = script_re.findall(text)
              checked_scripts = 0
              for index, script in enumerate(scripts, start=1):
                  if not script.strip():
                      continue
                  checked_scripts += 1
                  with tempfile.NamedTemporaryFile("w", suffix=".js", encoding="utf-8", delete=False) as temp:
                      temp.write(script)
                      temp_path = temp.name
                  try:
                      proc = subprocess.run(
                          ["node", "--check", temp_path],
                          text=True,
                          capture_output=True,
                          check=False,
                      )
                      if proc.returncode != 0:
                          js_syntax_errors.append(
                              {
                                  "file": path,
                                  "script_index": index,
                                  "detail": (proc.stderr or proc.stdout).strip(),
                              }
                          )
                  finally:
                      Path(temp_path).unlink(missing_ok=True)

              html_results.append(
                  {
                      "file": path,
                      "html_parse_ok": parse_ok,
                      "html_parse_error": parse_error,
                      "id_count": len(parser.ids),
                      "duplicate_ids": duplicates,
                      "inline_scripts_checked": checked_scripts,
                  }
              )

          if duplicate_ids:
              print("Duplicate HTML IDs were found:", json.dumps(duplicate_ids, ensure_ascii=False), file=sys.stderr)
              sys.exit(1)

          if js_syntax_errors:
              print("JavaScript syntax errors were found:", json.dumps(js_syntax_errors, ensure_ascii=False, indent=2), file=sys.stderr)
              sys.exit(1)

          feature_rules: dict[str, list[str]] = {
              "index.html": [
                  "STEP ESTATE-12",
                  "/api/public/settings",
                  "/api/public/properties",
                  "submitReservation",
                  "memberSearchBtn",
              ],
              "owner.html": [
                  "/api/admin/dashboard",
                  "/api/admin/reservations",
                  "/api/admin/customers",
                  "/api/admin/properties",
                  "/api/admin/followups",
                  "prepareDemo",
              ],
              "owner-ipad.html": [
                  "/api/admin/dashboard",
                  "todayReservations",
                  "messagePreview",
                  "prepareDemo",
              ],
              "owner-settings.html": [
                  "saveBasicBtn",
                  "areaList",
                  "templateSelect",
                  "/api/admin/",
              ],
              "member.html": [
                  "/api/public/member",
                  "loadMember",
                  "normalizePhone",
                  "renderReservations",
              ],
              "property.html": [
                  "/api/public/properties",
                  "reserveProperty",
                  "propertyUrl",
                  "loadSlots",
              ],
              "system-check.html": [
                  "/api/health",
                  "/api/admin/system-check",
                  "runAllChecks",
                  "prepareDemo",
              ],
              "reservation-test.html": [
                  "dpro-estate-line-api.dpromstk2000.workers.dev",
                  "reservation",
              ],
          }

          feature_checks = []
          missing_features = []
          for path, fragments in feature_rules.items():
              text = baseline_text(path)
              for fragment in fragments:
                  ok = fragment in text
                  item = {"file": path, "fragment": fragment, "ok": ok}
                  feature_checks.append(item)
                  if not ok:
                      missing_features.append(item)

          if missing_features:
              print("Existing feature preservation check failed:", json.dumps(missing_features, ensure_ascii=False, indent=2), file=sys.stderr)
              sys.exit(1)

          combined = "\n".join(baseline_text(path) for path in REQUIRED_FILES)
          business_rules = {
              "customer_unit": ["customers", "customer_status"],
              "property_unit": ["properties", "property_status", "viewing_available"],
              "reservation_unit": ["reservations", "reservation_date", "reservation_time"],
              "followup_unit": ["followups", "followup_date"],
              "area_unit": ["areas", "area_name"],
              "message_template_unit": ["message_templates", "template_key"],
              "phone_handling": ["normalizePhone", "type=\"tel\""],
              "past_date_ui_guard": [".min = toYmd(today)", "type=\"date\""],
              "demo_prepare": ["/api/admin/demo/prepare", "prepareDemo"],
              "admin_system_check": ["/api/admin/system-check", "runAllChecks"],
              "copy_before_send": ["navigator.clipboard", "文面をコピー"],
          }

          business_checks = []
          for name, alternatives in business_rules.items():
              ok = any(fragment in combined for fragment in alternatives)
              business_checks.append({"name": name, "ok": ok, "evidence": alternatives})

          failed_business = [item for item in business_checks if not item["ok"]]
          if failed_business:
              print("Estate business logic baseline check failed:", json.dumps(failed_business, ensure_ascii=False, indent=2), file=sys.stderr)
              sys.exit(1)

          endpoint_re = re.compile(r"[\"'`](\/api\/[A-Za-z0-9_?=&{}\-./:]+)")
          url_re = re.compile(r"https://[^\s\"'<>`]+")
          limit_re = re.compile(r"(?:limit=|limit\s*:\s*)(\d+)")

          endpoints: dict[str, list[str]] = {}
          hardcoded_urls: dict[str, list[str]] = {}
          initial_limits: dict[str, list[int]] = {}
          internal_exposure: dict[str, list[str]] = {}
          admin_code_locations: dict[str, int] = {}

          exposure_patterns = [
              r"STEP ESTATE-12",
              r"dpro-estate-line-api\.dpromstk2000\.workers\.dev",
              r"\bAPI\s*:",
              r"管理コード\s*1234",
          ]

          for path in REQUIRED_FILES:
              text = baseline_text(path)
              endpoints[path] = sorted(set(endpoint_re.findall(text)))
              hardcoded_urls[path] = sorted(set(url_re.findall(text)))
              initial_limits[path] = [int(value) for value in limit_re.findall(text)]
              admin_code_locations[path] = len(re.findall(r"1234", text))
              if path in PUBLIC_FILES:
                  found = [pattern for pattern in exposure_patterns if re.search(pattern, text, re.I)]
                  if found:
                      internal_exposure[path] = found

          file_sizes = {item["path"]: item["bytes"] for item in manifest}
          large_files = [
              {"path": path, "bytes": size}
              for path, size in sorted(file_sizes.items(), key=lambda pair: pair[1], reverse=True)
              if size >= 150_000
          ]

          risks = [
              {
                  "level": "注意",
                  "key": "public_internal_information",
                  "detail": "公開画面にSTEP名・Worker URL・API表記が残っています。NEXT-2以降で非表示化します。",
                  "evidence": internal_exposure,
              },
              {
                  "level": "注意",
                  "key": "initial_bulk_loading",
                  "detail": "PC管理画面は予約・顧客・物件・追客を同時取得しています。NEXT-2以降でタブ別遅延読込へ変更します。",
                  "evidence": initial_limits,
              },
              {
                  "level": "注意",
                  "key": "member_phone_only_lookup",
                  "detail": "会員ページは電話番号検索を使用しています。NEXT-7でLIFF本人確認を優先します。",
                  "evidence": {"member_endpoint": "/api/public/member?phone="},
              },
              {
                  "level": "注意",
                  "key": "settings_layout",
                  "detail": "設定画面は縦長構成です。NEXT-2またはNEXT-6で左メニュー＋内容切替へ変更します。",
                  "evidence": {"file": "owner-settings.html"},
              },
              {
                  "level": "注意" if large_files else "OK",
                  "key": "file_size",
                  "detail": "150KB以上のファイルを記録しました。機能追加時も初期読込を増やさない方針です。",
                  "evidence": large_files,
              },
          ]

          baseline_ledger = {
              "system": "DPRO 不動産・賃貸内見 LINE",
              "repository": REPOSITORY_NAME,
              "baseline_step": "STEP ESTATE-12",
              "next_step_started": "ESTATE-NEXT-1",
              "generated_at_jst": GENERATED_AT,
              "workflow_commit_sha": CURRENT_SHA,
              "protected_baseline_sha": BASELINE_SHA,
              "backup_tag": BASELINE_TAG,
              "target_files": REQUIRED_FILES,
              "current_units": [
                  "顧客",
                  "物件",
                  "内見予約",
                  "追客",
                  "対応エリア",
                  "LINE文面テンプレート",
              ],
              "existing_features": [
                  "希望条件入力",
                  "物件検索・おすすめ3件表示",
                  "物件別詳細URL・QR導線",
                  "内見予約",
                  "PCオーナー画面",
                  "今日やること",
                  "顧客検索",
                  "物件ステータス変更",
                  "追客作成・完了",
                  "LINE文面コピー",
                  "iPadスタッフ画面",
                  "店舗・エリア・文面設定",
                  "LINE会員予約確認",
                  "system-check",
                  "demo_prepare",
              ],
              "preservation_policy": {
                  "application_files_changed_in_next_1": False,
                  "worker_changed": False,
                  "supabase_changed": False,
                  "api_changed": False,
                  "database_migration": False,
              },
              "backup_and_rollback": {
                  "normal_version_tag": BASELINE_TAG,
                  "inspect": f"git show {BASELINE_TAG}:index.html",
                  "restore_selected_file": f"git checkout {BASELINE_TAG} -- <file>",
                  "recommended_after_future_step": "問題のあるSTEPコミットをgit revertし、必要な場合だけタグから対象ファイルを復元する。",
              },
              "checks": {
                  "html": html_results,
                  "javascript_syntax": {"ok": not js_syntax_errors, "errors": js_syntax_errors},
                  "html_id_duplicates": {"ok": not duplicate_ids, "duplicates": duplicate_ids},
                  "existing_feature_preservation": {"ok": not missing_features, "items": feature_checks},
                  "estate_business_logic": {"ok": not failed_business, "items": business_checks},
              },
              "api_endpoints": endpoints,
              "hardcoded_urls": hardcoded_urls,
              "admin_code_occurrences": admin_code_locations,
              "risks": risks,
          }

          progress_yml = f"""system: DPRO 不動産・賃貸内見 LINE
          repository: {REPOSITORY_NAME}
          previous_version: STEP ESTATE-12
          current_step: ESTATE-NEXT-1-COMPLETE
          next_step: ESTATE-NEXT-2
          baseline_tag: {BASELINE_TAG}
          baseline_sha: {BASELINE_SHA}
          completed_at_jst: {GENERATED_AT}
          application_files_changed: false
          worker_changed: false
          supabase_changed: false
          api_changed: false
          existing_features_preserved: true
          html_syntax_check: PASS
          javascript_syntax_check: PASS
          workflow_yml_syntax_check: PASS
          html_id_duplicate_check: PASS
          estate_business_logic_check: PASS
          """
          progress_yml = "\n".join(line.strip() for line in progress_yml.strip().splitlines()) + "\n"

          feature_yml_lines = [
              "system: DPRO 不動産・賃貸内見 LINE",
              "baseline_version: STEP ESTATE-12",
              f"baseline_tag: {BASELINE_TAG}",
              "classification:",
              "  necessary:",
              "    - 今日やること",
              "    - 顧客・物件・内見予約・追客の維持",
              "    - 物件別QR導線",
              "    - 個別確認型LINE文面コピー",
              "    - PC・iPad・会員・設定・system-checkの役割分離",
              "  good_to_have:",
              "    - 申込案件単位",
              "    - 空室確認履歴",
              "    - 担当者と次アクション期限",
              "    - 前回希望条件で再相談",
              "  unnecessary_now:",
              "    - 家賃回収",
              "    - 入居者・修繕管理",
              "    - 電子契約・オンライン決済",
              "    - 一括自動LINE配信",
              "    - 大量画像の初期一括取得",
              "  future:",
              "    - 外部物件管理ソフト連携",
              "    - CSV顧客・物件取込",
              "    - 電子申込連携",
              "preserved_features:",
          ]
          for feature in baseline_ledger["existing_features"]:
              feature_yml_lines.append(f"  - {feature}")
          feature_yml_lines.extend(
              [
                  "change_record:",
                  "  worker: unchanged",
                  "  supabase: unchanged",
                  "  api: unchanged",
                  "  application_html: unchanged",
              ]
          )

          risk_lines = [
              "DPRO 不動産・賃貸内見 LINE / ESTATE-NEXT-1 危険箇所台帳",
              f"作成日時(JST): {GENERATED_AT}",
              f"保護タグ: {BASELINE_TAG}",
              f"保護SHA: {BASELINE_SHA}",
              "",
              "[変更禁止・慎重変更対象]",
              "- index.html: 希望条件・物件検索・内見予約・予約確認の既存導線",
              "- property.html: 物件別URL・QR・物件指定予約",
              "- owner.html: 予約・顧客・物件・追客の管理API呼出し",
              "- member.html: 電話番号検索と予約履歴表示",
              "- owner-settings.html: 店舗・エリア・文面設定",
              "- system-check.html: health・system-check・demo_prepare",
              "",
              "[現状の注意点]",
          ]
          for risk in risks:
              risk_lines.append(f"- {risk['level']} / {risk['key']}: {risk['detail']}")
          risk_lines.extend(
              [
                  "",
                  "[バックアップ・ロールバック]",
                  f"- 正常版タグ: {BASELINE_TAG}",
                  f"- 確認例: git show {BASELINE_TAG}:owner.html",
                  f"- 1ファイル復元例: git checkout {BASELINE_TAG} -- owner.html",
                  "- 将来STEPの取消しは、原則として該当STEPのコミットをgit revertする。",
                  "- Worker・Supabase・APIはNEXT-1では変更していない。",
              ]
          )

          (ROOT / "dpro-next/estate-baseline.json").write_text(
              json.dumps(baseline_ledger, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          (ROOT / "dpro-next/estate-file-manifest.json").write_text(
              json.dumps(
                  {
                      "repository": REPOSITORY_NAME,
                      "baseline_sha": BASELINE_SHA,
                      "baseline_tag": BASELINE_TAG,
                      "generated_at_jst": GENERATED_AT,
                      "file_count": len(manifest),
                      "files": manifest,
                  },
                  ensure_ascii=False,
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          (ROOT / "dpro-next/estate-feature-ledger.yml").write_text(
              "\n".join(feature_yml_lines) + "\n",
              encoding="utf-8",
          )
          (ROOT / "dpro-next/estate-risk-report.txt").write_text(
              "\n".join(risk_lines) + "\n",
              encoding="utf-8",
          )
          (ROOT / "dpro-next/estate-progress.yml").write_text(progress_yml, encoding="utf-8")

          print(f"Tracked baseline files: {len(manifest)}")
          print(f"HTML files checked: {len(html_results)}")
          print(f"Feature preservation checks: {len(feature_checks)} PASS")
          print(f"Estate business checks: {len(business_checks)} PASS")
          print("Worker changed: false")
          print("Supabase changed: false")
          print("API changed: false")
          PY

      - name: Verify ledgers and confirm application files are unchanged
        shell: bash
        run: |
          set -Eeuo pipefail

          required_ledgers=(
            dpro-next/estate-baseline.json
            dpro-next/estate-file-manifest.json
            dpro-next/estate-feature-ledger.yml
            dpro-next/estate-risk-report.txt
            dpro-next/estate-progress.yml
          )

          for file in "${required_ledgers[@]}"; do
            test -s "$file" || {
              echo "ERROR: generated ledger is missing or empty: $file" >&2
              exit 1
            }
          done

          python3 -m json.tool dpro-next/estate-baseline.json >/dev/null
          python3 -m json.tool dpro-next/estate-file-manifest.json >/dev/null
          ruby -e 'require "yaml"; ARGV.each { |f| YAML.load_file(f); puts "YAML ledger PASS: #{f}" }' \
            dpro-next/estate-feature-ledger.yml \
            dpro-next/estate-progress.yml

          application_files=(
            index.html
            property.html
            member.html
            owner.html
            owner-ipad.html
            owner-settings.html
            system-check.html
            reservation-test.html
          )

          for file in "${application_files[@]}"; do
            baseline_hash="$(git show "${BASELINE_SHA}:${file}" | sha256sum | awk '{print $1}')"
            current_hash="$(sha256sum "$file" | awk '{print $1}')"
            if [ "$baseline_hash" != "$current_hash" ]; then
              echo "ERROR: NEXT-1 must not modify application file: $file" >&2
              exit 1
            fi
          done

          echo "Application file preservation: PASS"
          echo "Generated baseline ledger validation: PASS"

      - name: Publish STEP result to Actions summary
        shell: bash
        run: |
          set -Eeuo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # DPRO 不動産 LINE / ESTATE-NEXT-1

          | 項目 | 結果 |
          |---|---|
          | 前STEP ESTATE-12確認 | PASS |
          | 正常版保護タグ | \`$BASELINE_TAG\` |
          | 保護SHA | \`$BASELINE_SHA\` |
          | HTML構文読込 | PASS |
          | JavaScript構文 | PASS |
          | YML構文 | PASS |
          | HTML ID重複 | PASS |
          | 既存機能維持 | PASS |
          | 不動産業務ロジック | PASS |
          | Worker変更 | なし |
          | Supabase変更 | なし |
          | API変更 | なし |
          | 次STEP | ESTATE-NEXT-2 |

          正常版台帳は \`dpro-next/\` に保存されます。成功後、この実行用YML自身を削除して自動Commit・Pushします。
          EOF

      - name: Delete this workflow and commit STEP completion
        shell: bash
        run: |
          set -Eeuo pipefail

          rm -f "$WORKFLOW_PATH"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- dpro-next "$WORKFLOW_PATH"

          mapfile -t staged_files < <(git diff --cached --name-only)
          if [ "${#staged_files[@]}" -eq 0 ]; then
            echo "ERROR: no STEP result files were staged." >&2
            exit 1
          fi

          for file in "${staged_files[@]}"; do
            case "$file" in
              dpro-next/*|.github/workflows/estate-next-1.yml)
                ;;
              *)
                echo "ERROR: unexpected staged file: $file" >&2
                exit 1
                ;;
            esac
          done

          git commit -m "chore(estate): complete ESTATE-NEXT-1 baseline protection"
          git push origin "HEAD:$TARGET_BRANCH"

          echo "ESTATE-NEXT-1 completed and workflow self-deleted."
