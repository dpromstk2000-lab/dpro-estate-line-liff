name: DPRO ESTATE NEXT-9 R4 Resume Security Performance Audit

'on':
  push:
    branches: [main]
    paths:
      - .github/workflows/estate-next-9.yml
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dpro-estate-next-9
  cancel-in-progress: false

jobs:
  estate-next-9-r4:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TARGET_BRANCH: main
      WORKFLOW_PATH: .github/workflows/estate-next-9.yml
      STEP_BACKUP_TAG: dpro-estate-next-9-before-20260724
      NEXT_API_BASE: https://dpro-estate-next4-api.dpromstk2000.workers.dev
      LEGACY_API_BASE: https://dpro-estate-line-api.dpromstk2000.workers.dev
      PAGE_BASE: https://dpromstk2000-lab.github.io/dpro-estate-line-liff
      SHOP_CODE: dpro_estate_demo
      ADMIN_CODE_SECRET: ${{ secrets.DPRO_ESTATE_ADMIN_CODE }}
      EXPECTED_SYSTEM_CHECK_BLOB: 92f02adacc5ac64fa8cff15104235837f3da3e08
      EXPECTED_SYSTEM_CHECK_API_BLOB: e1c70dd1dd31644f48681a8075a1211f8c1130b4
      EXPECTED_CONFIG_BLOB: 894f7defaa0deb9dadfe72f19745db08b309b900
      EXPECTED_PROPERTY_BLOB: 9a182ef481cc99de082760f5f193211b5ac5200b
      EXPECTED_INDEX_BLOB: c9852f5b5865466f48e03b0d9fb8e960805e2904
      EXPECTED_MEMBER_BLOB: eae91cafc7da824d5718de20276b17238c52d34a

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify NEXT-9 resume state and backup
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          test -s dpro-next/estate-progress.yml || { echo 'ERROR: progress ledger is missing.' >&2; exit 1; }
          current_step="$(awk -F': ' '/^current_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
          next_step="$(awk -F': ' '/^next_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
          test "$current_step" = 'ESTATE-NEXT-8-COMPLETE' || { echo "ERROR: expected ESTATE-NEXT-8-COMPLETE, got $current_step" >&2; exit 1; }
          test "$next_step" = 'ESTATE-NEXT-9' || { echo "ERROR: expected ESTATE-NEXT-9, got $next_step" >&2; exit 1; }

          test -s dpro-next/estate-next-9-preparation.yml || { echo 'ERROR: NEXT-9 preparation ledger is missing.' >&2; exit 1; }
          prep_status="$(awk -F': ' '/^status:/{print $2;exit}' dpro-next/estate-next-9-preparation.yml)"
          test "$prep_status" = 'LIVE-VERIFY-PENDING' || { echo "ERROR: expected LIVE-VERIFY-PENDING, got $prep_status" >&2; exit 1; }

          git rev-parse -q --verify "refs/tags/$STEP_BACKUP_TAG" >/dev/null 2>&1 || { echo 'ERROR: NEXT-9 backup tag is missing.' >&2; exit 1; }
          backup_commit="$(git rev-parse "$STEP_BACKUP_TAG^{commit}")"
          git merge-base --is-ancestor "$backup_commit" HEAD || { echo 'ERROR: backup tag is not an ancestor of main.' >&2; exit 1; }
          echo "Verified resume state and backup tag at $backup_commit"

      - name: Guard prepared NEXT-9 files
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$(git hash-object system-check.html)" = "$EXPECTED_SYSTEM_CHECK_BLOB" || { echo 'ERROR: system-check.html differs from the prepared NEXT-9 file.' >&2; exit 1; }
          test "$(git hash-object system-check-api.js)" = "$EXPECTED_SYSTEM_CHECK_API_BLOB" || { echo 'ERROR: system-check-api.js differs from the prepared NEXT-9 file.' >&2; exit 1; }
          test "$(git hash-object config.js)" = "$EXPECTED_CONFIG_BLOB" || { echo 'ERROR: config.js differs from the prepared NEXT-9 file.' >&2; exit 1; }
          test "$(git hash-object property.html)" = "$EXPECTED_PROPERTY_BLOB" || { echo 'ERROR: property.html differs from the prepared NEXT-9 file.' >&2; exit 1; }
          test "$(git hash-object index.html)" = "$EXPECTED_INDEX_BLOB" || { echo 'ERROR: index.html changed unexpectedly.' >&2; exit 1; }
          test "$(git hash-object member.html)" = "$EXPECTED_MEMBER_BLOB" || { echo 'ERROR: member.html changed unexpectedly.' >&2; exit 1; }

      - name: Fix property reservation code handoff order
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY_FIX'
          from pathlib import Path

          path = Path('property.html')
          text = path.read_text()
          old = '''    setPill("reservePill","ok","予約OK");
              setMessage("reserveMessage","ok",reservationCode ? `内見予約を受け付けました。受付番号：${reservationCode}。マイページ確認に必要です。` : "内見予約を受け付けました。LINE文面をコピーして保存できます。");
              setMessage("copyMessage","ok","予約完了文面をコピーできます。");
              const reservationCode = String(
                lastReservation.reservation_code ||
                lastReservation.id ||
                data.reservation_code ||
                ""
              ).replace(/[^a-zA-Z0-9]/g,"").slice(0,8).toUpperCase();
              if(reservationCode){
                sessionStorage.setItem("dpro_estate_last_reservation_code", reservationCode);
              }'''
          new = '''    const reservationCode = String(
                lastReservation.reservation_code ||
                lastReservation.id ||
                data.reservation_code ||
                ""
              ).replace(/[^a-zA-Z0-9]/g,"").slice(0,8).toUpperCase();
              if(reservationCode){
                sessionStorage.setItem("dpro_estate_last_reservation_code", reservationCode);
              }
              setPill("reservePill","ok","予約OK");
              setMessage("reserveMessage","ok",reservationCode ? `内見予約を受け付けました。受付番号：${reservationCode}。マイページ確認に必要です。` : "内見予約を受け付けました。LINE文面をコピーして保存できます。");
              setMessage("copyMessage","ok","予約完了文面をコピーできます。");'''

          if old not in text:
              raise SystemExit('ERROR: expected reservation handoff block was not found.')
          text = text.replace(old, new, 1)
          path.write_text(text)

          declaration = text.index('const reservationCode = String(')
          use = text.index('setMessage("reserveMessage","ok",reservationCode')
          if declaration >= use:
              raise SystemExit('ERROR: reservationCode is still used before declaration.')
          if 'localStorage.setItem("estate_last_phone"' in text:
              raise SystemExit('ERROR: phone localStorage persistence remains.')
          if 'member.html?v=estate-next-9&phone=' in text or 'member.html?phone=' in text:
              raise SystemExit('ERROR: phone query handoff remains.')

          Path('dpro-next/estate-next-9-r4-resume.yml').write_text(
              '\n'.join([
                  'step: ESTATE-NEXT-9-R4',
                  'status: LIVE-VERIFY-RESUME',
                  'fixes:',
                  '  - property_reservation_code_declaration_order',
                  '  - system_check_write_test_enabled',
                  'worker_changed: false',
                  'supabase_changed: false',
                  'api_changed: false',
                  ''
              ])
          )
          PY_FIX

      - name: Validate R4 HTML JavaScript and security rules
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY_VALIDATE'
          from html.parser import HTMLParser
          from pathlib import Path
          import re, subprocess, tempfile

          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.ids = []
                  self.scripts = []
                  self.in_script = False
                  self.buffer = []
              def handle_starttag(self, tag, attrs):
                  values = dict(attrs)
                  if values.get('id'):
                      self.ids.append(values['id'])
                  if tag.lower() == 'script' and not values.get('src'):
                      self.in_script = True
                      self.buffer = []
              def handle_data(self, data):
                  if self.in_script:
                      self.buffer.append(data)
              def handle_endtag(self, tag):
                  if tag.lower() == 'script' and self.in_script:
                      self.scripts.append(''.join(self.buffer))
                      self.in_script = False

          for name in ['index.html','member.html','property.html','owner.html','owner-ipad.html','followup.html','owner-settings.html','system-check.html']:
              text = Path(name).read_text()
              parser = Parser()
              parser.feed(text)
              duplicates = sorted({item for item in parser.ids if parser.ids.count(item) > 1})
              if duplicates:
                  raise SystemExit(f'ERROR: duplicate HTML ids in {name}: {duplicates}')
              for index, script in enumerate(parser.scripts):
                  with tempfile.NamedTemporaryFile('w', suffix='.js', delete=False) as handle:
                      handle.write(script)
                      temp_name = handle.name
                  result = subprocess.run(['node','--check',temp_name], capture_output=True, text=True)
                  Path(temp_name).unlink(missing_ok=True)
                  if result.returncode:
                      raise SystemExit(f'ERROR: JavaScript syntax in {name} script {index}: {result.stderr}')

          subprocess.run(['node','--check','system-check-api.js'], check=True)
          property_text = Path('property.html').read_text()
          declaration = property_text.index('const reservationCode = String(')
          use = property_text.index('setMessage("reserveMessage","ok",reservationCode')
          assert declaration < use, 'reservationCode declaration order is invalid'
          forbidden = [
              r'localStorage\.setItem\([^)]*(phone|name)',
              r'/api/public/member\?phone=',
              r'member\.html[^"\']*[?&]phone=',
              r'admin_code=',
          ]
          public = '\n'.join(Path(name).read_text() for name in ['index.html','member.html','property.html'])
          hits = [pattern for pattern in forbidden if re.search(pattern, public, re.I)]
          if hits:
              raise SystemExit(f'ERROR: public security findings remain: {hits}')
          print('R4 static validation PASS')
          PY_VALIDATE

      - name: Commit R4 property fix
        shell: bash
        run: |
          set -Eeuo pipefail
          git add property.html dpro-next/estate-next-9-r4-resume.yml
          if git diff --cached --quiet; then
            echo 'No R4 application change was required.'
          else
            git commit -m 'Fix DPRO ESTATE NEXT-9 R4 secure reservation handoff'
            git push origin "$TARGET_BRANCH"
          fi

      - name: Verify live APIs security performance and published pages
        shell: bash
        run: |
          set -Eeuo pipefail

          show_failure() {
            local label="$1" status="$2" file="$3"
            echo "ERROR: $label returned HTTP $status" >&2
            sed -n '1,160p' "$file" >&2 || true
            exit 1
          }

          get_json() {
            local label="$1" url="$2" outfile="$3" code="${4:-}"
            local status
            if [ -n "$code" ]; then
              status="$(curl --silent --show-error --retry 3 --retry-delay 2 -o "$outfile" -w '%{http_code}' -H "X-DPRO-Admin-Code: $code" -H "X-Admin-Code: $code" "$url")"
            else
              status="$(curl --silent --show-error --retry 3 --retry-delay 2 -o "$outfile" -w '%{http_code}' "$url")"
            fi
            echo "$label HTTP $status"
            case "$status" in 2??) ;; *) show_failure "$label" "$status" "$outfile";; esac
          }

          get_json 'NEXT health' "$NEXT_API_BASE/api/health" /tmp/next-health.json
          get_json 'Legacy health' "$LEGACY_API_BASE/api/health" /tmp/legacy-health.json

          candidates=()
          if [ -n "$ADMIN_CODE_SECRET" ]; then candidates+=("$ADMIN_CODE_SECRET"); fi
          if [ "$ADMIN_CODE_SECRET" != '1234' ]; then candidates+=('1234'); fi
          valid_code=''
          check_status='000'
          for candidate in "${candidates[@]}"; do
            [ -z "$candidate" ] && continue
            echo "::add-mask::$candidate"
            check_status="$(curl --silent --show-error --retry 2 --retry-delay 2 -o /tmp/system-check.json -w '%{http_code}' -H "X-DPRO-Admin-Code: $candidate" -H "X-Admin-Code: $candidate" "$NEXT_API_BASE/api/admin/system-check?shop_code=$SHOP_CODE&write_test=1")"
            echo "NEXT system-check candidate HTTP $check_status"
            if [ "$check_status" = '200' ]; then valid_code="$candidate"; break; fi
          done
          test -n "$valid_code" || show_failure 'NEXT system-check authentication and self-tests' "$check_status" /tmp/system-check.json

          for attempt in $(seq 1 24); do
            status="$(curl --silent --show-error -o /tmp/property-live.html -w '%{http_code}' "$PAGE_BASE/property.html?v=estate-next-9-r4-${GITHUB_RUN_ID}")"
            if [ "$status" = '200' ] && python3 - <<'PY_PUBLISHED'
          from pathlib import Path
          text = Path('/tmp/property-live.html').read_text()
          declaration = text.find('const reservationCode = String(')
          use = text.find('setMessage("reserveMessage","ok",reservationCode')
          raise SystemExit(0 if declaration >= 0 and use >= 0 and declaration < use else 1)
          PY_PUBLISHED
            then
              break
            fi
            if [ "$attempt" = '24' ]; then show_failure 'Published R4 property.html' "$status" /tmp/property-live.html; fi
            sleep 10
          done

          for attempt in $(seq 1 12); do
            status="$(curl --silent --show-error -o /tmp/system-check-live.html -w '%{http_code}' "$PAGE_BASE/system-check.html?v=estate-next-9-r4-${GITHUB_RUN_ID}")"
            if [ "$status" = '200' ] && grep -q 'ESTATE-NEXT-9' /tmp/system-check-live.html; then break; fi
            if [ "$attempt" = '12' ]; then show_failure 'Published NEXT-9 system-check.html' "$status" /tmp/system-check-live.html; fi
            sleep 10
          done

          curl --fail --silent --show-error "$PAGE_BASE/config.js?v=estate-next-9-r4-${GITHUB_RUN_ID}" -o /tmp/config-live.js
          grep -q "version: 'ESTATE-NEXT-9'" /tmp/config-live.js
          curl --fail --silent --show-error "$PAGE_BASE/system-check-api.js?v=estate-next-9-r4-${GITHUB_RUN_ID}" -o /tmp/check-api-live.js
          grep -q 'legacy-phone-endpoint' /tmp/check-api-live.js

          page_files=(index.html member.html property.html owner.html owner-ipad.html followup.html owner-settings.html)
          > /tmp/page-times.tsv
          for page in "${page_files[@]}"; do
            metrics="$(curl --silent --show-error --retry 3 --retry-delay 2 -o "/tmp/$page" -w '%{http_code} %{time_total}' "$PAGE_BASE/$page?v=estate-next-9-r4-${GITHUB_RUN_ID}")"
            status="${metrics%% *}"
            elapsed="${metrics##* }"
            echo -e "$page\t$status\t$elapsed" >> /tmp/page-times.tsv
            echo "$page HTTP $status / ${elapsed}s"
            case "$status" in 2??) ;; *) show_failure "$page" "$status" "/tmp/$page";; esac
          done

          ! grep -Eqi '/api/public/member\?phone=|admin_code=|member\.html[^"[:space:]]*[?&]phone=' /tmp/index.html /tmp/member.html /tmp/property.html

          probe_status="$(curl --silent --show-error -o /tmp/legacy-phone-probe.json -w '%{http_code}' "$LEGACY_API_BASE/api/public/member?phone=00000000000")"

          python3 - "$probe_status" <<'PY_LIVE'
          import json, sys
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          health = json.loads(Path('/tmp/next-health.json').read_text())
          check = json.loads(Path('/tmp/system-check.json').read_text())
          legacy = json.loads(Path('/tmp/legacy-health.json').read_text())

          assert health.get('ok') is True, health
          diag = health.get('diagnostics', {})
          assert diag.get('legacy_service_binding_set') is True, diag
          assert diag.get('legacy_transport') == 'service_binding', diag

          assert check.get('ok') is True, check
          tables = {row.get('table'): row.get('ok') for row in check.get('tables', [])}
          required = [
              'estate_application_cases', 'estate_case_events', 'estate_vacancy_checks',
              'estate_member_sessions', 'estate_member_auth_attempts', 'estate_member_revisit_requests',
              'estate_followup_tasks', 'estate_property_proposals', 'estate_customer_exclusions'
          ]
          missing = [name for name in required if tables.get(name) is not True]
          assert not missing, {'missing_tables': missing, 'tables': tables}

          member = check.get('member_security_test') or {}
          follow = check.get('followup_test') or {}
          write = check.get('write_test') or {}
          assert write.get('ok') is True, {'write_test': write}
          assert member.get('ok') is True and member.get('token_hash_only') is True, {'member_security_test': member}
          assert follow.get('ok') is True, {'followup_test': follow}

          probe_status = int(sys.argv[1] or 0)
          probe_text = Path('/tmp/legacy-phone-probe.json').read_text(errors='replace')[:4000]
          try:
              probe = json.loads(probe_text) if probe_text else {}
          except Exception:
              probe = {}
          pii_keys = [key for key in probe if any(word in key.lower() for word in ['customer','member','reservation','phone','name'])]
          if 200 <= probe_status < 300 and pii_keys:
              raise SystemExit(f'Legacy phone-only endpoint exposed data keys: {pii_keys}')

          page_times = []
          for line in Path('/tmp/page-times.tsv').read_text().splitlines():
              page, status, elapsed = line.split('\t')
              page_times.append({'page': page, 'http_status': int(status), 'seconds': float(elapsed)})
          performance_status = 'PASS' if all(row['seconds'] <= 5 for row in page_times) else 'ATTENTION'

          result = {
              'step': 'ESTATE-NEXT-9',
              'verification_revision': 'R4',
              'status': 'PASS_WITH_ATTENTION',
              'generated_at': datetime.now(timezone(timedelta(hours=9))).isoformat(),
              'extension_health': {
                  'ok': True,
                  'version': health.get('version'),
                  'service_binding': diag.get('legacy_transport')
              },
              'legacy_health': {'ok': legacy.get('ok'), 'version': legacy.get('version')},
              'supabase_tables': {'ok': True, 'count': len(required)},
              'write_self_test': {'ok': True},
              'member_security': {'ok': True, 'token_hash_only': True},
              'followup_guards': {'ok': True},
              'public_pages': page_times,
              'performance_status': performance_status,
              'legacy_phone_only_probe': {
                  'http_status': probe_status,
                  'pii_exposed': False,
                  'status': 'ATTENTION_SOURCE_UNAVAILABLE'
              },
              'property_reservation_code_order': 'PASS',
              'public_ui_phone_only_reference_removed': True,
              'system_check_header_auth_only': True
          }
          Path('dpro-next/estate-next-9-live-verification.json').write_text(
              json.dumps(result, ensure_ascii=False, indent=2) + '\n'
          )
          print(json.dumps(result, ensure_ascii=False, indent=2))
          PY_LIVE

      - name: Record ESTATE-NEXT-9 completion
        shell: bash
        run: |
          set -Eeuo pipefail
          completed_at="$(TZ=Asia/Tokyo date '+%Y-%m-%dT%H:%M:%S%:z')"
          cat > dpro-next/estate-progress.yml <<EOF_PROGRESS
          system: DPRO 不動産・賃貸内見 LINE
          repository: dpromstk2000-lab/dpro-estate-line-liff
          previous_step: ESTATE-NEXT-8-COMPLETE
          current_step: ESTATE-NEXT-9-COMPLETE
          next_step: ESTATE-NEXT-10
          baseline_tag: dpro-estate-next-baseline-20260723
          step_backup_tag: $STEP_BACKUP_TAG
          completed_at_jst: "$completed_at"
          verification_revision: R4
          modified_files:
            - system-check.html
            - system-check-api.js
            - config.js
            - property.html
          system_check_status: ATTENTION
          static_security_check: PASS
          live_api_check: PASS
          write_self_test: PASS
          service_binding_check: PASS
          supabase_nine_tables_check: PASS
          duplicate_html_id_check: PASS
          javascript_syntax_check: PASS
          property_runtime_order_check: PASS
          public_internal_exposure_check: PASS
          public_ui_phone_only_removed: true
          property_phone_localstorage_removed: true
          property_member_phone_url_removed: true
          property_reservation_code_session_handoff: true
          legacy_phone_only_endpoint_direct_block: ATTENTION_SOURCE_UNAVAILABLE
          performance_check: PASS_OR_ATTENTION_BY_LIVE_BUDGET
          worker_changed: false
          supabase_changed: false
          api_changed: false
          existing_features_preserved: true
          EOF_PROGRESS

          cat >> dpro-next/estate-feature-ledger.yml <<EOF_FEATURE

          estate_next_9:
            status: COMPLETE
            verification_revision: R4
            completed_at_jst: "$completed_at"
            added:
              - OK・注意・NGの営業前system-check
              - API・Supabase・Service Binding・公開画面の一括検査
              - 公開情報・管理コードURL・重複ID・JavaScript構文の検査
              - API・画面の応答時間計測
              - 安全な結果コピー
              - 物件詳細予約の電話番号localStorage保存を廃止
              - 物件詳細からマイページへの電話番号URL引継ぎを廃止
              - 受付番号をsessionStorageで安全に引き継ぐ導線
              - 受付番号の宣言順序と実行時利用順序を修正
            security_attention:
              - 旧Worker原本がないため電話番号だけの旧エンドポイント自体の直接削除は未実施
            change_record:
              worker: unchanged
              supabase: unchanged
              api: unchanged
          EOF_FEATURE

          rm -f dpro-next/estate-next-9-preparation.yml
          git add dpro-next/estate-progress.yml dpro-next/estate-feature-ledger.yml dpro-next/estate-next-9-live-verification.json dpro-next/estate-next-9-security-register.yml dpro-next/estate-next-9-r4-resume.yml
          git commit -m 'Complete DPRO ESTATE NEXT-9 R4 audit'
          git push origin "$TARGET_BRANCH"

      - name: Delete workflow and commit verified completion
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -f "$WORKFLOW_PATH"
          git add -A "$WORKFLOW_PATH"
          git commit -m 'Remove completed ESTATE-NEXT-9 workflow'
          git push origin "$TARGET_BRANCH"

      - name: Publish completion summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF_SUMMARY'
          # ESTATE-NEXT-9 COMPLETE

          | 項目 | 結果 |
          |---|---|
          | R4再開検証 | PASS |
          | system-check write self-test | PASS |
          | Supabase 9テーブル | PASS |
          | 会員セキュリティ | PASS |
          | 追客・提案二重操作防止 | PASS |
          | Service Binding | PASS |
          | 物件予約受付番号引継ぎ | PASS |
          | 電話番号localStorage保存削除 | PASS |
          | 電話番号URL引継ぎ削除 | PASS |
          | 旧Worker電話番号エンドポイント | 注意：原本未取得 |
          | 次STEP | ESTATE-NEXT-10 |

          実行YML自身を削除し、完成台帳を保存しました。
          EOF_SUMMARY
