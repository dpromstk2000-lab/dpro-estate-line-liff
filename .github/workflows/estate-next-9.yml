name: DPRO ESTATE NEXT-9 R3 Security Performance Audit

'on':
  push:
    branches: [main]
    paths:
      - .github/workflows/estate-next-9.yml
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dpro-estate-next-9
  cancel-in-progress: false

jobs:
  estate-next-9:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TARGET_BRANCH: main
      WORKFLOW_PATH: .github/workflows/estate-next-9.yml
      STEP_BACKUP_TAG: dpro-estate-next-9-before-20260724
      NEXT_API_BASE: https://dpro-estate-next4-api.dpromstk2000.workers.dev
      LEGACY_API_BASE: https://dpro-estate-line-api.dpromstk2000.workers.dev
      PAGE_BASE: https://dpromstk2000-lab.github.io/dpro-estate-line-liff
      SHOP_CODE: dpro_estate_demo
      ADMIN_CODE_SECRET: ${{ secrets.DPRO_ESTATE_ADMIN_CODE }}
      EXPECTED_SYSTEM_CHECK_BLOB: 7722c1414a97675210a9ecb077381ff0da76ece8
      EXPECTED_CONFIG_BLOB: 20517f6e6709b61b303934c85e9c4659fb11beac
      EXPECTED_INDEX_BLOB: c9852f5b5865466f48e03b0d9fb8e960805e2904
      EXPECTED_MEMBER_BLOB: eae91cafc7da824d5718de20276b17238c52d34a
      EXPECTED_PROPERTY_BLOB: 7126b5108a2097912b228b821b87228c0cb2cfaa

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify previous STEP and create backup tag
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          test -s dpro-next/estate-progress.yml || { echo 'ERROR: progress ledger is missing.' >&2; exit 1; }
          current_step="$(awk -F': ' '/^current_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
          next_step="$(awk -F': ' '/^next_step:/{print $2;exit}' dpro-next/estate-progress.yml)"
          test "$current_step" = 'ESTATE-NEXT-8-COMPLETE' || { echo "ERROR: expected ESTATE-NEXT-8-COMPLETE, got $current_step" >&2; exit 1; }
          test "$next_step" = 'ESTATE-NEXT-9' || { echo "ERROR: expected ESTATE-NEXT-9, got $next_step" >&2; exit 1; }
          if git rev-parse -q --verify "refs/tags/$STEP_BACKUP_TAG" >/dev/null 2>&1; then
            # Annotated tagはtag objectではなく、必ず参照先commitへdereferenceして検査します。
            backup_commit="$(git rev-parse "$STEP_BACKUP_TAG^{commit}")"
            git merge-base --is-ancestor "$backup_commit" HEAD || {
              echo 'ERROR: existing backup tag is not an ancestor of the current branch.' >&2
              exit 1
            }
            unexpected="$(git diff --name-only "$backup_commit"..HEAD | grep -vFx "$WORKFLOW_PATH" || true)"
            if [ -n "$unexpected" ]; then
              echo 'ERROR: files other than the execution workflow changed after the backup tag:' >&2
              printf '%s\n' "$unexpected" >&2
              exit 1
            fi
            echo "Reusing verified backup tag $STEP_BACKUP_TAG at $backup_commit"
          else
            tag_commit="$(git rev-parse HEAD)"
            while true; do
              changed="$(git diff-tree --no-commit-id --name-only -r "$tag_commit" | sed '/^$/d')"
              if [ "$changed" = "$WORKFLOW_PATH" ]; then
                tag_commit="$(git rev-parse "$tag_commit^")"
              else
                break
              fi
            done
            git tag -a "$STEP_BACKUP_TAG" "$tag_commit" -m 'DPRO ESTATE NEXT-9 backup'
            git push origin "$STEP_BACKUP_TAG"
            echo "Created backup tag $STEP_BACKUP_TAG at $tag_commit"
          fi

      - name: Guard current application version
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$(git hash-object system-check.html)" = "$EXPECTED_SYSTEM_CHECK_BLOB" || { echo 'ERROR: system-check.html changed after NEXT-8.' >&2; exit 1; }
          test "$(git hash-object config.js)" = "$EXPECTED_CONFIG_BLOB" || { echo 'ERROR: config.js changed after NEXT-8.' >&2; exit 1; }
          test "$(git hash-object index.html)" = "$EXPECTED_INDEX_BLOB" || { echo 'ERROR: index.html changed after NEXT-8.' >&2; exit 1; }
          test "$(git hash-object member.html)" = "$EXPECTED_MEMBER_BLOB" || { echo 'ERROR: member.html changed after NEXT-8.' >&2; exit 1; }
          test "$(git hash-object property.html)" = "$EXPECTED_PROPERTY_BLOB" || { echo 'ERROR: property.html changed after NEXT-8.' >&2; exit 1; }

      - name: Install NEXT-9 system-check and audit records
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 - <<'PY_INSTALL'
          from pathlib import Path
          import base64, json
          payloads = {
            'system-check.html': '',
            'system-check-api.js': '',
            'config.js': '',
          }
          for name, encoded in payloads.items():
              Path(name).write_bytes(base64.b64decode(encoded))

          # NEXT-9 R2: property.html に残っていた電話番号の永続保存とURL引継ぎを除去します。
          property_path = Path('property.html')
          property_text = property_path.read_text()
          required_fragments = [
              'localStorage.setItem("estate_last_phone", phone);',
              'location.href = `member.html?v=estate-12&phone=${encodeURIComponent(phone)}`;',
              '<title>STEP ESTATE-12｜物件詳細｜DPRO 不動産・賃貸内見 LINE</title>',
              '<span class="badge">STEP ESTATE-12</span>',
              'DPRO 不動産・賃貸内見 LINE ｜ STEP ESTATE-12 ｜ API: https://dpro-estate-line-api.dpromstk2000.workers.dev',
          ]
          missing = [fragment for fragment in required_fragments if fragment not in property_text]
          if missing:
              raise SystemExit(f'property.html secure handoff patch target missing: {missing}')

          property_text = property_text.replace(
              '<title>STEP ESTATE-12｜物件詳細｜DPRO 不動産・賃貸内見 LINE</title>',
              '<title>物件詳細｜DPRO 不動産・賃貸内見 LINE</title>',
          )
          property_text = property_text.replace('<span class="badge">STEP ESTATE-12</span>', '<span class="badge">物件詳細</span>')
          property_text = property_text.replace('<span class="badge">全体導線ブラッシュアップ</span>', '<span class="badge">公開物件</span>')
          property_text = property_text.replace('<span class="badge">物件詳細 property.html</span>', '<span class="badge">内見予約</span>')
          property_text = property_text.replace('<h2>物件QRで見せる流れ</h2>', '<h2>物件ページのご利用方法</h2>')
          property_text = property_text.replace(
              '営業デモでは「物件ごとにQRを作って、チラシや店頭POPから直接内見予約に誘導できます」と説明できます。',
              '物件情報を確認し、そのままご希望の内見日時を選択できます。',
          )
          property_text = property_text.replace('<span class="pill ok">営業向け</span>', '<span class="pill ok">ご利用方法</span>')
          property_text = property_text.replace('APIから公開物件を取得しています。', '公開中の物件情報を取得しています。')
          property_text = property_text.replace(
              '物件写真はデモ表示です。実運用では外観・室内写真に差し替えできます。',
              '外観・室内写真の詳細は店舗からご案内します。',
          )
          property_text = property_text.replace(' のデモ物件`;', ' の物件`;')
          property_text = property_text.replace('?v=estate-12', '?v=estate-next-9')
          property_text = property_text.replace(
              'DPRO 不動産・賃貸内見 LINE ｜ STEP ESTATE-12 ｜ API: https://dpro-estate-line-api.dpromstk2000.workers.dev',
              'DPRO 不動産・賃貸内見 LINE ｜ 物件詳細・内見予約',
          )
          reservation_block = '\n'.join([
              '    const reservationCode = String(',
              '      lastReservation.reservation_code ||',
              '      lastReservation.id ||',
              '      data.reservation_code ||',
              '      ""',
              '    ).replace(/[^a-zA-Z0-9]/g,"").slice(0,8).toUpperCase();',
              '    if(reservationCode){',
              '      sessionStorage.setItem("dpro_estate_last_reservation_code", reservationCode);',
              '    }',
          ])
          property_text = property_text.replace(
              '    localStorage.setItem("estate_last_phone", phone);',
              reservation_block,
          )
          property_text = property_text.replace(
              '    setMessage("reserveMessage","ok","内見予約を受け付けました。LINE文面をコピーして保存できます。");',
              '    setMessage("reserveMessage","ok",reservationCode ? `内見予約を受け付けました。受付番号：${reservationCode}。マイページ確認に必要です。` : "内見予約を受け付けました。LINE文面をコピーして保存できます。");',
          )
          old_go_member = '\n'.join([
              'function goMember(){',
              '  const phone = normalizePhone($("phone").value);',
              '  if(phone){',
              '    location.href = `member.html?v=estate-next-9&phone=${encodeURIComponent(phone)}`;',
              '  }else{',
              '    location.href = "member.html?v=estate-next-9";',
              '  }',
              '}',
          ])
          new_go_member = '\n'.join([
              'function goMember(){',
              '  location.href = "member.html?v=estate-next-9";',
              '}',
          ])
          if old_go_member not in property_text:
              raise SystemExit('property.html goMember secure handoff target missing after version update')
          property_text = property_text.replace(old_go_member, new_go_member)

          forbidden = [
              'localStorage.setItem("estate_last_phone"',
              'member.html?v=estate-next-9&phone=',
              'STEP ESTATE-12',
              '物件詳細 property.html',
              '営業デモでは',
          ]
          remaining = [marker for marker in forbidden if marker in property_text]
          if remaining:
              raise SystemExit(f'property.html secure handoff markers remain: {remaining}')
          property_path.write_text(property_text)

          Path('dpro-next').mkdir(exist_ok=True)
          performance = {
            'step': 'ESTATE-NEXT-9',
            'budgets_ms': {'health': 2000, 'admin_system_check': 5000, 'public_api': 3500, 'page': 5000},
            'hard_failure_ms': 15000,
            'notes': ['CI network variance is treated as ATTENTION before hard failure.']
          }
          Path('dpro-next/estate-performance-budget.json').write_text(json.dumps(performance, ensure_ascii=False, indent=2) + '\n')
          security = '\n'.join([
              'step: ESTATE-NEXT-9-R3',
              'status: ATTENTION',
              'public_ui_phone_only_reference_removed: true',
              'property_phone_localstorage_removed: true',
              'property_member_phone_url_removed: true',
              'property_reservation_code_session_handoff: true',
              'admin_code_query_parameter_removed: true',
              'system_check_header_auth_only: true',
              'service_binding_required: true',
              'legacy_phone_only_endpoint:',
              '  status: ATTENTION',
              '  direct_block_verified: false',
              '  reason: legacy Worker source is not stored in this repository',
              '  current_mitigation:',
              '    - production member UI uses secure session and reservation code',
              '    - public pages do not call the legacy phone-only endpoint',
              '    - random anonymous probe is checked during live verification',
              '  next_action: recover or retire the legacy Worker source before changing the old endpoint itself',
          ]) + '\n'
          Path('dpro-next/estate-next-9-security-register.yml').write_text(security)
          PY_INSTALL

      - name: Validate HTML JavaScript YML IDs and security rules
        shell: bash
        run: |
          set -Eeuo pipefail
          python3 -m pip install --quiet pyyaml
          python3 - <<'PY_VALIDATE'
          from html.parser import HTMLParser
          from pathlib import Path
          import json, re, subprocess, tempfile, yaml

          class Parser(HTMLParser):
              def __init__(self):
                  super().__init__(); self.ids=[]; self.scripts=[]; self._script=False; self._buf=[]
              def handle_starttag(self, tag, attrs):
                  attrs=dict(attrs)
                  if attrs.get('id'): self.ids.append(attrs['id'])
                  if tag=='script' and not attrs.get('src'): self._script=True; self._buf=[]
              def handle_endtag(self, tag):
                  if tag=='script' and self._script:
                      self.scripts.append(''.join(self._buf)); self._script=False; self._buf=[]
              def handle_data(self, data):
                  if self._script: self._buf.append(data)

          yaml.safe_load(Path('.github/workflows/estate-next-9.yml').read_text())
          html_files=list(Path('.').glob('*.html'))
          duplicate_report={}
          script_count=0
          for path in html_files:
              parser=Parser(); parser.feed(path.read_text(errors='replace'))
              duplicates=sorted({x for x in parser.ids if parser.ids.count(x)>1})
              if duplicates: duplicate_report[str(path)]=duplicates
              for index, script in enumerate(parser.scripts):
                  if not script.strip(): continue
                  temp=Path(tempfile.gettempdir())/f'next9-{path.stem}-{index}.js'
                  temp.write_text(script)
                  subprocess.run(['node','--check',str(temp)],check=True)
                  script_count += 1
          if duplicate_report:
              raise SystemExit(f'Duplicate HTML IDs: {duplicate_report}')
          for path in Path('.').glob('*.js'):
              subprocess.run(['node','--check',str(path)],check=True)

          public_files=[Path('index.html'),Path('member.html'),Path('property.html')]
          critical=[]
          patterns=[
              (re.compile(r'/api/public/member\?phone=',re.I),'legacy phone-only endpoint reference'),
              (re.compile(r'admin_code=',re.I),'admin code query parameter'),
              (re.compile(r'localStorage\.setItem\([^)]*(phone|name)',re.I),'PII localStorage persistence'),
              (re.compile(r"member\.html[^\n\"'`]*[?&]phone=",re.I),'phone number in member page URL'),
          ]
          for path in public_files:
              text=path.read_text(errors='replace')
              for pattern,label in patterns:
                  if pattern.search(text): critical.append({'file':str(path),'finding':label})
              if path.name == 'property.html':
                  for marker,label in [
                      ('STEP ESTATE-12','legacy STEP marker in public UI'),
                      ('物件詳細 property.html','internal filename in public UI'),
                      ('営業デモでは','internal sales copy in public UI'),
                  ]:
                      if marker in text: critical.append({'file':str(path),'finding':label})
          system=Path('system-check.html').read_text()
          if re.search(r'value=["\']1234["\']',system,re.I): critical.append({'file':'system-check.html','finding':'fixed demo code in normal UI'})
          if re.search(r'admin_code=',system,re.I): critical.append({'file':'system-check.html','finding':'admin code in URL'})
          if 'ESTATE-NEXT-9' not in system or 'system-check-api.js' not in system: critical.append({'file':'system-check.html','finding':'NEXT-9 marker missing'})
          if critical: raise SystemExit(json.dumps(critical,ensure_ascii=False,indent=2))

          sizes={str(p):p.stat().st_size for p in [Path('system-check.html'),Path('system-check-api.js'),Path('config.js')]}
          if sizes['system-check.html'] > 160000 or sizes['system-check-api.js'] > 140000:
              raise SystemExit(f'NEXT-9 file size budget exceeded: {sizes}')
          report={
            'step':'ESTATE-NEXT-9','html_files_checked':len(html_files),'inline_scripts_checked':script_count,
            'duplicate_ids':'PASS','javascript_syntax':'PASS','public_security_scan':'PASS','property_secure_handoff':'PASS',
            'legacy_worker_source_present':Path('worker.js').exists(), 'sizes_bytes':sizes,
            'status':'PASS_WITH_ATTENTION',
            'attention':['Legacy Worker source is unavailable; the old phone-only endpoint cannot be directly removed in this STEP.']
          }
          Path('dpro-next/estate-next-9-static-audit.json').write_text(json.dumps(report,ensure_ascii=False,indent=2)+'\n')
          print(json.dumps(report,ensure_ascii=False,indent=2))
          PY_VALIDATE

      - name: Confirm allowed change scope and existing features
        shell: bash
        run: |
          set -Eeuo pipefail
          test "$(git hash-object index.html)" = "$EXPECTED_INDEX_BLOB"
          test "$(git hash-object member.html)" = "$EXPECTED_MEMBER_BLOB"
          test "$(git hash-object property.html)" != "$EXPECTED_PROPERTY_BLOB"
          grep -q 'followup.html' owner.html
          grep -q 'secure_session' dpro-next/estate-next-8-live-verification.json
          grep -q 'property_candidate_endpoint' dpro-next/estate-next-8-live-verification.json
          changed="$(git status --short | awk '{print $2}' | sort)"
          allowed="$(printf '%s\n' config.js property.html system-check-api.js system-check.html dpro-next/estate-next-9-security-register.yml dpro-next/estate-next-9-static-audit.json dpro-next/estate-performance-budget.json | sort)"
          test "$changed" = "$allowed" || { echo 'ERROR: unexpected change scope.' >&2; diff -u <(echo "$allowed") <(echo "$changed") || true; exit 1; }

      - name: Commit NEXT-9 application files
        shell: bash
        run: |
          set -Eeuo pipefail
          cat > dpro-next/estate-next-9-preparation.yml <<'EOF_PREP'
          step: ESTATE-NEXT-9
          status: LIVE-VERIFY-PENDING
          next_step: ESTATE-NEXT-9-VERIFY
          modified_files:
            - system-check.html
            - system-check-api.js
            - config.js
            - property.html
          worker_changed: false
          supabase_changed: false
          api_changed: false
          public_ui_phone_only_removed: true
          property_phone_localstorage_removed: true
          property_member_phone_url_removed: true
          property_reservation_code_session_handoff: true
          legacy_phone_only_direct_block: attention_source_unavailable
          EOF_PREP
          git add config.js property.html system-check.html system-check-api.js dpro-next/estate-performance-budget.json dpro-next/estate-next-9-security-register.yml dpro-next/estate-next-9-static-audit.json dpro-next/estate-next-9-preparation.yml
          git commit -m 'DPRO ESTATE NEXT-9 R3 secure property handoff and audit'
          git push origin "$TARGET_BRANCH"

      - name: Verify live APIs security performance and published pages
        shell: bash
        run: |
          set -Eeuo pipefail
          show_failure() {
            local label="$1" status="$2" file="$3"
            echo "ERROR: $label returned HTTP $status" >&2
            sed -n '1,120p' "$file" >&2 || true
            exit 1
          }
          get_json() {
            local label="$1" url="$2" outfile="$3" code="${4:-}"
            local status
            if [ -n "$code" ]; then
              status="$(curl --silent --show-error --retry 3 --retry-delay 2 -o "$outfile" -w '%{http_code}' -H "X-DPRO-Admin-Code: $code" -H "X-Admin-Code: $code" "$url")"
            else
              status="$(curl --silent --show-error --retry 3 --retry-delay 2 -o "$outfile" -w '%{http_code}' "$url")"
            fi
            echo "$label HTTP $status"
            case "$status" in 2??) ;; *) show_failure "$label" "$status" "$outfile";; esac
          }

          get_json 'NEXT health' "$NEXT_API_BASE/api/health" /tmp/next-health.json
          get_json 'Legacy health' "$LEGACY_API_BASE/api/health" /tmp/legacy-health.json

          candidates=()
          if [ -n "$ADMIN_CODE_SECRET" ]; then candidates+=("$ADMIN_CODE_SECRET"); fi
          if [ "$ADMIN_CODE_SECRET" != '1234' ]; then candidates+=('1234'); fi
          valid_code=''
          check_status='000'
          for candidate in "${candidates[@]}"; do
            [ -z "$candidate" ] && continue
            echo "::add-mask::$candidate"
            check_status="$(curl --silent --show-error -o /tmp/system-check.json -w '%{http_code}' -H "X-DPRO-Admin-Code: $candidate" -H "X-Admin-Code: $candidate" "$NEXT_API_BASE/api/admin/system-check?shop_code=$SHOP_CODE&write_test=0")"
            if [ "$check_status" = '200' ]; then valid_code="$candidate"; break; fi
          done
          test -n "$valid_code" || show_failure 'NEXT system-check authentication' "$check_status" /tmp/system-check.json

          for attempt in $(seq 1 18); do
            status="$(curl --silent --show-error -o /tmp/system-check-live.html -w '%{http_code}' "$PAGE_BASE/system-check.html?v=estate-next-9-${GITHUB_RUN_ID}")"
            if [ "$status" = '200' ] && grep -q 'ESTATE-NEXT-9' /tmp/system-check-live.html; then break; fi
            if [ "$attempt" = '18' ]; then show_failure 'Published NEXT-9 system-check.html' "$status" /tmp/system-check-live.html; fi
            sleep 10
          done
          curl --fail --silent --show-error "$PAGE_BASE/config.js?v=estate-next-9-${GITHUB_RUN_ID}" -o /tmp/config-live.js
          grep -q "version: 'ESTATE-NEXT-9'" /tmp/config-live.js
          curl --fail --silent --show-error "$PAGE_BASE/system-check-api.js?v=estate-next-9-${GITHUB_RUN_ID}" -o /tmp/check-api-live.js
          grep -q 'legacy-phone-endpoint' /tmp/check-api-live.js

          page_files=(index.html member.html property.html owner.html owner-ipad.html followup.html owner-settings.html)
          > /tmp/page-times.tsv
          for page in "${page_files[@]}"; do
            metrics="$(curl --silent --show-error --retry 3 --retry-delay 2 -o "/tmp/$page" -w '%{http_code} %{time_total}' "$PAGE_BASE/$page?v=estate-next-9-${GITHUB_RUN_ID}")"
            status="${metrics%% *}"; elapsed="${metrics##* }"
            echo -e "$page\t$status\t$elapsed" >> /tmp/page-times.tsv
            case "$status" in 2??) ;; *) show_failure "$page" "$status" "/tmp/$page";; esac
          done
          ! grep -Eqi '/api/public/member\?phone=|admin_code=' /tmp/index.html /tmp/member.html /tmp/property.html

          probe_status="$(curl --silent --show-error -o /tmp/legacy-phone-probe.json -w '%{http_code}' "$LEGACY_API_BASE/api/public/member?phone=00000000000")"
          python3 - "$probe_status" <<'PY_LIVE'
          import json,sys
          from datetime import datetime, timezone, timedelta
          from pathlib import Path
          health=json.loads(Path('/tmp/next-health.json').read_text())
          check=json.loads(Path('/tmp/system-check.json').read_text())
          legacy=json.loads(Path('/tmp/legacy-health.json').read_text())
          assert health.get('ok') is True,health
          diag=health.get('diagnostics',{})
          assert diag.get('legacy_service_binding_set') is True,diag
          assert diag.get('legacy_transport')=='service_binding',diag
          assert check.get('ok') is True,check
          tables={row.get('table'):row.get('ok') for row in check.get('tables',[])}
          required=['estate_application_cases','estate_case_events','estate_vacancy_checks','estate_member_sessions','estate_member_auth_attempts','estate_member_revisit_requests','estate_followup_tasks','estate_property_proposals','estate_customer_exclusions']
          assert all(tables.get(name) is True for name in required),tables
          member=check.get('member_security_test',{})
          follow=check.get('followup_test',{})
          assert member.get('ok') is True and member.get('token_hash_only') is True,member
          assert follow.get('ok') is True,follow
          probe_status=int(sys.argv[1] or 0)
          probe_text=Path('/tmp/legacy-phone-probe.json').read_text(errors='replace')[:4000]
          try: probe=json.loads(probe_text) if probe_text else {}
          except Exception: probe={}
          pii_keys=[key for key in probe if any(word in key.lower() for word in ['customer','member','reservation','phone','name'])]
          if 200 <= probe_status < 300 and pii_keys:
              raise SystemExit(f'Legacy phone-only endpoint exposed data keys: {pii_keys}')
          page_times=[]
          for line in Path('/tmp/page-times.tsv').read_text().splitlines():
              page,status,elapsed=line.split('\t')
              page_times.append({'page':page,'http_status':int(status),'seconds':float(elapsed)})
